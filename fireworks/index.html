<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireworks VFX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "SF Pro", "PingFang TC", "Microsoft JhengHei", sans-serif; }
  #stage { position: absolute; inset: 0; display: block; }

  /* ===== 控制面板：左側縱向抽屜 ===== */
  #panel {
    position: fixed; left: 12px; top: 64px; bottom: 12px; width: 340px;
    overflow-y: auto;
    background: rgba(16, 10, 14, 0.86); backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 150, 60, 0.25); border-radius: 12px;
    color: #e8d8cf; padding: 14px 16px 18px; z-index: 10;
    box-shadow: 4px 0 30px rgba(0,0,0,0.6);
    transition: transform .25s ease, opacity .25s ease;
  }
  #panel.collapsed { transform: translateX(calc(-100% - 24px)); opacity: 0; pointer-events: none; }
  #panel::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-thumb { background: rgba(255,150,60,.3); border-radius: 3px; }

  #toggleBtn {
    position: fixed; top: 12px; right: 12px; z-index: 11;
    background: rgba(16,10,14,.85); color: #ffb36c;
    border: 1px solid rgba(255,150,60,.35); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
  }
  #toggleBtn:hover { background: rgba(255,150,60,.15); }

  #homeBtn {
    position: fixed; top: 12px; left: 12px; z-index: 11;
    background: rgba(16,10,14,.85); color: #ffb36c; text-decoration: none;
    border: 1px solid rgba(255,150,60,.35); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  #homeBtn:hover { background: rgba(255,150,60,.15); }

  #playCtl {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 11;
    background: rgba(16,10,14,.85); color: #ffcf8f;
    border: 1px solid rgba(255,150,60,.35); border-radius: 999px;
    padding: 8px 20px; cursor: pointer; font-size: 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #playCtl:hover { background: rgba(255,150,60,.18); }

  html.preview-mode #homeBtn,
  html.preview-mode #toggleBtn,
  html.preview-mode #playCtl,
  html.preview-mode #panel { display: none !important; }
  @media (max-width: 760px) {
    #panel { left: 8px; top: 56px; bottom: 8px; width: calc(100vw - 16px); max-width: 340px; }
  }

  #panel h2 { font-size: 14px; letter-spacing: 2px; color: #ffb07b; margin-bottom: 4px; font-weight: 600; }
  #panel .sub { font-size: 11px; color: #8f7d6f; margin-bottom: 12px; }
  .groups { display: block; }
  .group { margin-bottom: 8px; border-top: 1px solid rgba(255,150,60,.12); padding-top: 6px; }
  .group h3 { font-size: 11px; color: #d9a055; letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
  .group .note { font-size: 10px; color: #7e6d5f; margin: -4px 0 8px; line-height: 1.4; }
  .row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; min-width: 0; }
  .row label { flex: 0 0 78px; font-size: 12px; color: #d6c4b8; white-space: nowrap; }
  .row input[type=range] { flex: 1 1 110px; min-width: 60px; accent-color: #e0842e; height: 14px; cursor: pointer; }
  .row .val { flex: 0 0 44px; text-align: right; font-size: 11px; color: #ffb07b; font-variant-numeric: tabular-nums; }
  .row input[type=checkbox] { accent-color: #e0842e; width: 15px; height: 15px; cursor: pointer; }
  .btns { display: flex; gap: 8px; margin-top: 12px; }
  .btns button {
    flex: 1; background: rgba(255,150,60,.1); color: #ffcf8f;
    border: 1px solid rgba(255,150,60,.3); border-radius: 7px;
    padding: 7px 0; font-size: 12px; cursor: pointer;
  }
  .btns button:hover { background: rgba(255,150,60,.22); }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<a id="homeBtn" href="../index.html">← 首頁</a>

<div id="panel">
  <h2>FIREWORKS</h2>
  <div class="sub">璀璨烟火特效 — 點擊畫面任意處發射</div>

  <div class="groups">
  <div class="group">
    <h3>發射 Launch</h3>
    <div class="row"><label>自動頻率</label><input type="range" id="autoRate" min="0" max="4" step="0.05" value="1.1"><span class="val" id="autoRate_v"></span></div>
    <div class="row"><label>同時最大數</label><input type="range" id="maxRockets" min="1" max="16" step="1" value="6"><span class="val" id="maxRockets_v"></span></div>
    <div class="row"><label>升空速度</label><input type="range" id="launchSpeed" min="0.5" max="1.6" step="0.01" value="1"><span class="val" id="launchSpeed_v"></span></div>
  </div>

  <div class="group">
    <h3>爆炸 Burst</h3>
    <div class="note">爆炸型態隨機：球形／環形／柳枝／雙層／愛心</div>
    <div class="row"><label>粒子數</label><input type="range" id="particleCount" min="30" max="300" step="5" value="150"><span class="val" id="particleCount_v"></span></div>
    <div class="row"><label>爆炸半徑</label><input type="range" id="burstRadius" min="0.3" max="2" step="0.01" value="1"><span class="val" id="burstRadius_v"></span></div>
    <div class="row"><label>重力</label><input type="range" id="gravity" min="0" max="400" step="5" value="130"><span class="val" id="gravity_v"></span></div>
    <div class="row"><label>拖尾殘影</label><input type="range" id="trail" min="0" max="0.95" step="0.01" value="0.82"><span class="val" id="trail_v"></span></div>
    <div class="row"><label>二段爆炸機率</label><input type="range" id="doubleProb" min="0" max="1" step="0.01" value="0.25"><span class="val" id="doubleProb_v"></span></div>
  </div>

  <div class="group">
    <h3>色彩 Color</h3>
    <div class="row"><label>隨機彩色</label><input type="checkbox" id="randColor" checked><span class="val"></span></div>
    <div class="row"><label>單色相</label><input type="range" id="hue" min="0" max="360" step="1" value="30"><span class="val" id="hue_v"></span></div>
    <div class="row"><label>飽和度</label><input type="range" id="sat" min="0" max="100" step="1" value="100"><span class="val" id="sat_v"></span></div>
    <div class="row"><label>閃爍</label><input type="range" id="flicker" min="0" max="1" step="0.01" value="0.6"><span class="val" id="flicker_v"></span></div>
  </div>

  <div class="group">
    <h3>環境 Ambience</h3>
    <div class="row"><label>星空數量</label><input type="range" id="starCount" min="0" max="400" step="5" value="140"><span class="val" id="starCount_v"></span></div>
    <div class="row"><label>天際線</label><input type="checkbox" id="skyline" checked><span class="val"></span></div>
  </div>
  </div>

  <div class="btns">
    <button id="resetBtn">↺ 重設</button>
  </div>
</div>
<button id="toggleBtn">⚙ 面板</button>
<button id="playCtl">⏸ 暫停</button>

<script>
'use strict';

/* ===== 預覽嵌入模式（?preview=1）===== */
const PREVIEW = new URLSearchParams(location.search).has('preview');
if (PREVIEW) document.documentElement.classList.add('preview-mode');

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

let skylinePath = null; // 快取的天際線多邊形，尺寸改變時重建
let starField = null;   // 快取的星空，數量或尺寸改變時重建

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.max(1, W * DPR); canvas.height = Math.max(1, H * DPR);
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  skylinePath = null; starField = null;
}
window.addEventListener('resize', resize);
resize();

/* ===== 參數 ===== */
const DEFAULTS = {
  autoRate: PREVIEW ? 1.8 : 1.1,
  maxRockets: 6,
  launchSpeed: 1,
  particleCount: PREVIEW ? 80 : 150,
  burstRadius: 1,
  gravity: 130,
  trail: 0.82,
  doubleProb: 0.25,
  hue: 30, sat: 100, flicker: 0.6,
  starCount: PREVIEW ? 70 : 140,
};
const BOOL_DEFAULTS = { randColor: true, skyline: true };
const P = { ...DEFAULTS, ...BOOL_DEFAULTS };

const fmt = {
  autoRate: v => v.toFixed(2) + '/s',
  launchSpeed: v => 'x' + v.toFixed(2),
  burstRadius: v => 'x' + v.toFixed(2),
  hue: v => v + '°', sat: v => v + '%',
};
function bindControls() {
  for (const key of Object.keys(DEFAULTS)) {
    const el = document.getElementById(key);
    const valEl = document.getElementById(key + '_v');
    const update = () => {
      P[key] = parseFloat(el.value);
      if (valEl) valEl.textContent = (fmt[key] || (v => +v.toFixed(2)))(P[key]);
    };
    el.value = P[key];
    if (!el._bound) { el.addEventListener('input', update); el._bound = true; }
    update();
  }
  for (const key of Object.keys(BOOL_DEFAULTS)) {
    const el = document.getElementById(key);
    el.checked = P[key];
    if (!el._bound) {
      el.addEventListener('change', () => { P[key] = el.checked; if (key === 'skyline') skylinePath = null; });
      el._bound = true;
    }
  }
}
bindControls();

document.getElementById('resetBtn').addEventListener('click', () => {
  Object.assign(P, DEFAULTS, BOOL_DEFAULTS);
  bindControls();
  starField = null;
});

/* ===== 播放/暫停：面板按鈕、postMessage（vfx-pause / vfx-play）、分頁隱藏三者共同決定 ===== */
let userPaused = false, extPaused = false;
let rafId = 0, last = 0;
const pauseBtn = document.getElementById('playCtl');
function isPaused() { return userPaused || extPaused || document.hidden; }
function syncLoop() {
  if (isPaused()) {
    if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
  } else if (!rafId) {
    last = performance.now();
    rafId = requestAnimationFrame(frame);
  }
}
pauseBtn.addEventListener('click', () => {
  userPaused = !userPaused;
  pauseBtn.textContent = userPaused ? '▶ 播放' : '⏸ 暫停';
  syncLoop();
});
window.addEventListener('message', e => {
  if (e.data === 'vfx-pause') { extPaused = true; syncLoop(); }
  else if (e.data === 'vfx-play') { extPaused = false; syncLoop(); }
});
document.addEventListener('visibilitychange', syncLoop);

/* ===== 面板開合 ===== */
const panel = document.getElementById('panel');
document.getElementById('toggleBtn').addEventListener('click', () => panel.classList.toggle('collapsed'));

/* ===== 工具 ===== */
const rand = (a, b) => a + Math.random() * (b - a);
const TWO_PI = Math.PI * 2;
function pickHue() { return P.randColor ? Math.floor(Math.random() * 360) : P.hue; }

/* ===== 星空（離屏快取，微閃爍用透明度調變）===== */
const starCanvas = document.createElement('canvas');
const starCtx = starCanvas.getContext('2d');
function buildStars() {
  starCanvas.width = Math.max(1, W * DPR); starCanvas.height = Math.max(1, H * DPR);
  starCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  starCtx.clearRect(0, 0, W, H);
  const n = Math.round(P.starCount);
  starField = [];
  for (let i = 0; i < n; i++) {
    const x = Math.random() * W, y = Math.random() * H * 0.85;
    const r = rand(0.3, 1.4), a = rand(0.2, 0.9);
    starCtx.fillStyle = `rgba(255,255,255,${a})`;
    starCtx.beginPath(); starCtx.arc(x, y, r, 0, TWO_PI); starCtx.fill();
  }
  starField.count = n;
}

/* ===== 天際線剪影 ===== */
function buildSkyline() {
  skylinePath = new Path2D();
  const base = H;
  skylinePath.moveTo(0, base);
  let x = 0;
  // 用固定種子式的隨機也可以，但天際線只在 resize 時重建一次，直接隨機即可
  while (x < W) {
    const bw = rand(24, 70);
    const bh = rand(H * 0.04, H * 0.14);
    skylinePath.lineTo(x, base - bh);
    skylinePath.lineTo(Math.min(x + bw, W), base - bh);
    // 偶爾加個天線
    if (Math.random() < 0.18) {
      const ax = x + bw * 0.5;
      if (ax < W) {
        skylinePath.lineTo(ax - 1, base - bh);
        skylinePath.lineTo(ax - 1, base - bh - rand(8, 26));
        skylinePath.lineTo(ax + 1, base - bh - rand(8, 26));
        skylinePath.lineTo(ax + 1, base - bh);
        skylinePath.lineTo(Math.min(x + bw, W), base - bh);
      }
    }
    x += bw;
  }
  skylinePath.lineTo(W, base);
  skylinePath.closePath();
}

/* ===== 火箭與粒子 ===== */
const rockets = [];
const particles = [];
const MAX_PARTICLES = PREVIEW ? 2200 : 6000;

const BURST_TYPES = ['peony', 'ring', 'willow', 'double', 'heart'];

function launchRocket(targetX, targetY) {
  if (rockets.length >= P.maxRockets) return;
  const sx = targetX !== undefined ? targetX + rand(-30, 30) : rand(W * 0.12, W * 0.88);
  const apexY = targetY !== undefined ? targetY : rand(H * 0.12, H * 0.45);
  // 由「到達 apexY 時 vy=0」反推初速：v0 = sqrt(2 g h)
  const g = Math.max(40, P.gravity);
  const h = Math.max(60, H - apexY);
  const v0 = Math.sqrt(2 * g * h) * P.launchSpeed;
  rockets.push({
    x: sx, y: H + 6,
    vx: rand(-14, 14),
    vy: -v0,
    hue: pickHue(),
    type: BURST_TYPES[Math.floor(Math.random() * BURST_TYPES.length)],
    sparkAcc: 0,
    prevVy: -v0,
  });
}

function spawnParticle(p) {
  if (particles.length >= MAX_PARTICLES) return;
  particles.push(p);
}

function explode(x, y, hue, type, scale = 1, generation = 0) {
  const n = Math.round(P.particleCount * scale);
  const R = P.burstRadius;
  const baseSpeed = 190 * R * scale;
  const sat = P.sat;

  // 中心閃光
  spawnParticle({ x, y, vx: 0, vy: 0, life: 0, maxLife: 0.18, hue, sat: 20,
    size: 26 * R, drag: 1, flash: true, glow: true });

  for (let i = 0; i < n; i++) {
    const ang = (i / n) * TWO_PI + rand(-0.03, 0.03);
    let sp, vx, vy, drag, maxLife, size, isWillow = false;
    switch (type) {
      case 'ring': {
        sp = baseSpeed * rand(0.95, 1.05);
        vx = Math.cos(ang) * sp; vy = Math.sin(ang) * sp;
        drag = 2.2; maxLife = rand(1.1, 1.7); size = rand(1.6, 2.6);
        break;
      }
      case 'willow': {
        sp = baseSpeed * 0.75 * Math.pow(Math.random(), 0.4);
        vx = Math.cos(ang) * sp; vy = Math.sin(ang) * sp;
        drag = 3.2; maxLife = rand(2.4, 3.6); size = rand(1.2, 2.2);
        isWillow = true;
        break;
      }
      case 'heart': {
        // 心形參數式，t 均勻取樣，速度正比於離心距離 → 爆開後保持心形
        const t = (i / n) * TWO_PI;
        const hx = 16 * Math.pow(Math.sin(t), 3);
        const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        const k = baseSpeed / 17;
        vx = hx * k * rand(0.96, 1.04); vy = hy * k * rand(0.96, 1.04);
        drag = 2.4; maxLife = rand(1.2, 1.8); size = rand(1.6, 2.6);
        break;
      }
      default: { // peony / double 的第一段
        sp = baseSpeed * Math.pow(Math.random(), 0.55) * rand(0.9, 1.1);
        vx = Math.cos(ang) * sp; vy = Math.sin(ang) * sp;
        drag = 1.9; maxLife = rand(1.0, 1.9); size = rand(1.5, 2.8);
      }
    }
    const p = {
      x, y, vx, vy,
      life: 0, maxLife, size, drag,
      hue: hue + rand(-14, 14), sat,
      willow: isWillow,
      glow: Math.random() < 0.12,
    };
    // 雙層爆炸：第一代的部分粒子在生命中段再炸出一小圈
    if (generation === 0 && type === 'double' && Math.random() < 0.18) {
      p.secondary = rand(0.35, 0.6) * p.maxLife;
      p.maxLife = p.secondary + 0.05;
    } else if (generation === 0 && type !== 'double' && Math.random() < P.doubleProb * 0.12) {
      // 其他型態也依「二段爆炸機率」少量點綴
      p.secondary = rand(0.4, 0.7) * p.maxLife;
      p.maxLife = p.secondary + 0.05;
    }
    spawnParticle(p);
  }
}

/* ===== 點擊/觸控發射 ===== */
canvas.addEventListener('pointerdown', e => {
  if (isPaused()) return;
  launchRocket(e.clientX, e.clientY);
});

/* ===== 主迴圈 ===== */
let autoAcc = 0;

function frame(now) {
  rafId = requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  update(dt);
  render(dt, now / 1000);
}

function update(dt) {
  const g = P.gravity;

  // 自動發射
  autoAcc += dt * P.autoRate;
  while (autoAcc >= 1) { autoAcc -= 1; launchRocket(); }

  // 火箭
  for (let i = rockets.length - 1; i >= 0; i--) {
    const r = rockets[i];
    r.prevVy = r.vy;
    r.vy += g * dt;
    r.x += r.vx * dt; r.y += r.vy * dt;

    // 上升火花尾跡
    r.sparkAcc += dt * 90;
    while (r.sparkAcc >= 1) {
      r.sparkAcc -= 1;
      spawnParticle({
        x: r.x + rand(-1.5, 1.5), y: r.y + rand(0, 6),
        vx: rand(-18, 18), vy: rand(10, 55),
        life: 0, maxLife: rand(0.25, 0.7),
        size: rand(0.7, 1.6), drag: 2.5,
        hue: 38, sat: 90, riser: true,
      });
    }

    // 到達頂點（速度轉正）或極慢時爆炸
    if (r.vy >= -20 || r.y < H * 0.06) {
      explode(r.x, r.y, r.hue, r.type);
      rockets.splice(i, 1);
    }
  }

  // 粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt;
    if (p.life >= p.maxLife) {
      // 二段爆炸
      if (p.secondary !== undefined) {
        explode(p.x, p.y, pickHue(), 'peony', 0.22, 1);
      }
      particles.splice(i, 1);
      continue;
    }
    const dragK = Math.exp(-p.drag * dt);
    p.vx *= dragK; p.vy *= dragK;
    if (!p.flash) p.vy += g * dt * (p.willow ? 0.55 : 1);
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
}

function render(dt, t) {
  /* --- 拖尾殘影：半透明黑覆蓋 --- */
  const fade = 1 - P.trail;
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgba(0,0,0,${Math.max(0.03, fade)})`;
  ctx.fillRect(0, 0, W, H);

  /* --- 星空（獨立圖層快取，避免被殘影拖糊太多）--- */
  if (P.starCount > 0) {
    if (!starField || starField.count !== Math.round(P.starCount)) buildStars();
    ctx.globalAlpha = 0.5 + 0.15 * Math.sin(t * 1.3);
    ctx.drawImage(starCanvas, 0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  ctx.globalCompositeOperation = 'lighter';

  /* --- 火箭本體 --- */
  for (const r of rockets) {
    const gr = ctx.createRadialGradient(r.x, r.y, 0, r.x, r.y, 8);
    gr.addColorStop(0, 'rgba(255,240,210,0.95)');
    gr.addColorStop(0.4, `hsla(${r.hue},100%,65%,0.5)`);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(r.x, r.y, 8, 0, TWO_PI); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath(); ctx.arc(r.x, r.y, 1.6, 0, TWO_PI); ctx.fill();
  }

  /* --- 粒子 --- */
  const flickAmt = P.flicker;
  for (const p of particles) {
    const q = p.life / p.maxLife;      // 0..1 年齡
    let alpha = 1 - q * q;
    // 生命末段閃爍/眨眼
    if (flickAmt > 0 && q > 0.55 && !p.flash) {
      const tw = Math.sin((p.life * (18 + (p.size * 7)) + p.hue) * 3.1);
      alpha *= 1 - flickAmt * (q - 0.55) / 0.45 * (0.5 + 0.5 * tw);
    }
    if (alpha <= 0.01) continue;

    if (p.flash) {
      // 爆心閃光：大而短促的白光球
      const rr = p.size * (1 + q * 2.2);
      const gf = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rr);
      gf.addColorStop(0, `rgba(255,255,255,${0.85 * alpha})`);
      gf.addColorStop(0.5, `hsla(${p.hue},100%,75%,${0.35 * alpha})`);
      gf.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gf;
      ctx.beginPath(); ctx.arc(p.x, p.y, rr, 0, TWO_PI); ctx.fill();
      continue;
    }

    const light = p.riser ? 75 : (q < 0.15 ? 85 - q * 160 : 62 - q * 12);
    ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${light}%,${alpha})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, TWO_PI); ctx.fill();

    // 少數粒子加一圈柔光
    if (p.glow) {
      ctx.fillStyle = `hsla(${p.hue},${p.sat}%,60%,${alpha * 0.16})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 3.5, 0, TWO_PI); ctx.fill();
    }
  }

  /* --- 天際線剪影（不透明覆蓋，蓋掉底部殘影）--- */
  if (P.skyline) {
    ctx.globalCompositeOperation = 'source-over';
    if (!skylinePath) buildSkyline();
    ctx.fillStyle = '#05060a';
    ctx.fill(skylinePath);
  }
}

/* 開場先熱鬧一下 */
launchRocket();
launchRocket();
syncLoop();
</script>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thin Film Bubble VFX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "SF Pro", "PingFang TC", "Microsoft JhengHei", sans-serif; }
  #stage { position: absolute; inset: 0; display: block; touch-action: none; }

  /* ===== 控制面板：左側縱向抽屜（沿用 aurora 風格）===== */
  #panel {
    position: fixed; left: 12px; top: 64px; bottom: 12px; width: 340px;
    overflow-y: auto;
    background: rgba(8, 10, 16, 0.86); backdrop-filter: blur(10px);
    border: 1px solid rgba(150, 180, 255, 0.25); border-radius: 12px;
    color: #d6ddf0; padding: 14px 16px 18px; z-index: 10;
    box-shadow: 4px 0 30px rgba(0,0,0,0.6);
    transition: transform .25s ease, opacity .25s ease;
  }
  #panel.collapsed { transform: translateX(calc(-100% - 24px)); opacity: 0; pointer-events: none; }
  #panel::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-thumb { background: rgba(150,180,255,.3); border-radius: 3px; }

  #toggleBtn {
    position: fixed; top: 12px; right: 12px; z-index: 11;
    background: rgba(8,10,16,.85); color: #a9c2ff;
    border: 1px solid rgba(150,180,255,.35); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
  }
  #toggleBtn:hover { background: rgba(150,180,255,.15); }

  #homeBtn {
    position: fixed; top: 12px; left: 12px; z-index: 11;
    background: rgba(8,10,16,.85); color: #a9c2ff; text-decoration: none;
    border: 1px solid rgba(150,180,255,.35); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
  }
  #homeBtn:hover { background: rgba(150,180,255,.15); }

  #playCtl {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 11;
    background: rgba(8,10,16,.85); color: #c3d3ff;
    border: 1px solid rgba(150,180,255,.35); border-radius: 999px;
    padding: 8px 20px; cursor: pointer; font-size: 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #playCtl:hover { background: rgba(150,180,255,.18); }

  html.preview-mode #homeBtn,
  html.preview-mode #toggleBtn,
  html.preview-mode #playCtl,
  html.preview-mode #panel { display: none !important; }
  @media (max-width: 760px) {
    #panel { left: 8px; top: 56px; bottom: 8px; width: calc(100vw - 16px); max-width: 340px; }
  }

  #panel h2 { font-size: 14px; letter-spacing: 2px; color: #9fb8ff; margin-bottom: 4px; font-weight: 600; }
  #panel .sub { font-size: 11px; color: #7784a5; margin-bottom: 12px; }
  .group { margin-bottom: 8px; border-top: 1px solid rgba(150,180,255,.12); padding-top: 6px; }
  .group h3 { font-size: 11px; color: #7fa0e6; letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
  .row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; min-width: 0; }
  .row label { flex: 0 0 78px; font-size: 12px; color: #c6cfe4; white-space: nowrap; }
  .row input[type=range] { flex: 1 1 110px; min-width: 60px; accent-color: #5b7cff; height: 14px; cursor: pointer; }
  .row input[type=color] { flex: 1 1 110px; min-width: 60px; height: 24px; padding: 0; border: 1px solid rgba(150,180,255,.3); border-radius: 6px; background: none; cursor: pointer; }
  .row .val { flex: 0 0 46px; text-align: right; font-size: 11px; color: #9fb8ff; font-variant-numeric: tabular-nums; }
  .btns { display: flex; gap: 8px; margin-top: 12px; }
  .btns button {
    flex: 1; background: rgba(150,180,255,.1); color: #c3d3ff;
    border: 1px solid rgba(150,180,255,.3); border-radius: 7px;
    padding: 7px 0; font-size: 12px; cursor: pointer;
  }
  .btns button:hover { background: rgba(150,180,255,.22); }
  .hint { font-size: 10px; color: #66739a; margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<a id="homeBtn" href="../index.html">← 首頁</a>

<div id="panel">
  <h2>THIN FILM DROPLETS</h2>
  <div class="sub">Three.js + GLSL 薄膜彩虹水滴 — Metaball 融合/分裂・拖曳可旋轉</div>

  <div class="group">
    <h3>外觀 Appearance</h3>
    <div class="row"><label>背景顏色</label><input type="color" id="bgColor" value="#000000"><span class="val"></span></div>
    <div class="row"><label>薄膜厚度</label><input type="range" id="thickness" min="120" max="760" step="5" value="385"><span class="val" id="thickness_v"></span></div>
    <div class="row"><label>花紋強度</label><input type="range" id="thickVar" min="0" max="400" step="5" value="55"><span class="val" id="thickVar_v"></span></div>
    <div class="row"><label>花紋尺度</label><input type="range" id="noiseScale" min="0.5" max="6" step="0.1" value="0.7"><span class="val" id="noiseScale_v"></span></div>
    <div class="row"><label>色散</label><input type="range" id="dispersion" min="0" max="1" step="0.01" value="0.8"><span class="val" id="dispersion_v"></span></div>
    <div class="row"><label>彩度</label><input type="range" id="saturation" min="0" max="2" step="0.02" value="1.38"><span class="val" id="saturation_v"></span></div>
  </div>

  <div class="group">
    <h3>水滴 Droplets</h3>
    <div class="row"><label>水滴數量</label><input type="range" id="count" min="1" max="8" step="1" value="2"><span class="val" id="count_v"></span></div>
    <div class="row"><label>水滴大小</label><input type="range" id="radius" min="0.25" max="1.1" step="0.01" value="0.54"><span class="val" id="radius_v"></span></div>
    <div class="row"><label>黏性融合</label><input type="range" id="viscosity" min="0" max="1.2" step="0.01" value="0.74"><span class="val" id="viscosity_v"></span></div>
    <div class="row"><label>漂浮範圍</label><input type="range" id="spread" min="0.6" max="2.4" step="0.05" value="0.75"><span class="val" id="spread_v"></span></div>
  </div>

  <div class="group">
    <h3>環境 Environment</h3>
    <div class="row"><label>邊緣光</label><input type="range" id="fresnel" min="0" max="3" step="0.05" value="2.6"><span class="val" id="fresnel_v"></span></div>
    <div class="row"><label>重力黑膜</label><input type="range" id="gravity" min="0" max="1" step="0.01" value="1"><span class="val" id="gravity_v"></span></div>
  </div>

  <div class="group">
    <h3>動態 Motion</h3>
    <div class="row"><label>漂浮速度</label><input type="range" id="flowSpeed" min="0" max="1.5" step="0.01" value="0.3"><span class="val" id="flowSpeed_v"></span></div>
    <div class="row"><label>自轉速度</label><input type="range" id="spin" min="0" max="1" step="0.01" value="0.08"><span class="val" id="spin_v"></span></div>
  </div>

  <div class="btns">
    <button id="resetBtn">↺ 重設</button>
  </div>
  <div class="hint">水滴在空中漂浮，靠近時因表面張力（smooth-min）融合成一體，飄開時分裂。<br>拖曳可旋轉視角；黏性越高越容易黏在一起。</div>
</div>
<button id="toggleBtn">⚙ 面板</button>
<button id="playCtl">⏸ 暫停</button>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
'use strict';
import * as THREE from 'three';

/* ===== 預覽嵌入模式（?preview=1）===== */
const PREVIEW = new URLSearchParams(location.search).has('preview');
if (PREVIEW) document.documentElement.classList.add('preview-mode');

const canvas = document.getElementById('stage');

/* ===== 參數 ===== */
const DEFAULTS = {
  thickness: 385,
  thickVar: 55,
  noiseScale: 0.7,
  dispersion: 0.8,
  saturation: 1.38,
  count: 2,
  radius: 0.54,
  viscosity: 0.74,
  spread: 0.75,
  fresnel: 2.6,
  gravity: 1,
  flowSpeed: 0.3,
  spin: 0.08,
};
const COLOR_DEFAULTS = { bgColor: '#000000' };
const P = { ...DEFAULTS, ...COLOR_DEFAULTS };

const fmt = {
  thickness: v => v.toFixed(0) + 'nm',
  thickVar: v => '±' + v.toFixed(0),
  noiseScale: v => 'x' + v.toFixed(1),
  count: v => v.toFixed(0),
  radius: v => v.toFixed(2),
  viscosity: v => v.toFixed(2),
  spread: v => v.toFixed(2),
  flowSpeed: v => 'x' + v.toFixed(2),
  spin: v => 'x' + v.toFixed(2),
};

/* ===== 著色器 ===== */
const NOISE_GLSL = `
vec3 mod289(vec3 x){return x - floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x - floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
float snoise(vec3 v){
  const vec2 C = vec2(1.0/6.0, 1.0/3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;
  i = mod289(i);
  vec4 p = permute(permute(permute(
             i.z + vec4(0.0, i1.z, i2.z, 1.0))
           + i.y + vec4(0.0, i1.y, i2.y, 1.0))
           + i.x + vec4(0.0, i1.x, i2.x, 1.0));
  float n_ = 0.142857142857;
  vec3 ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);
  vec4 x = x_ * ns.x + ns.yyyy;
  vec4 y = y_ * ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}
float fbm(vec3 p){
  float s = 0.0, a = 0.5;
  for (int i = 0; i < 4; i++) { s += a * snoise(p); p *= 2.02; a *= 0.5; }
  return s;
}
`;

// 全螢幕：頂點著色器直接輸出 clip 座標（忽略相機），frag 內自建相機射線做 raymarch
const VERT = `
varying vec2 vUv;
void main(){
  vUv = uv;
  gl_Position = vec4(position.xy, 0.0, 1.0);
}
`;

const FRAG = `
precision highp float;
varying vec2 vUv;

uniform float uTime;
uniform vec2  uResolution;
uniform mat3  uRot;         // 拖曳/自轉：旋轉相機環繞水滴群

uniform int   uCount;
uniform float uRadius;
uniform float uViscosity;   // smooth-min 融合半徑（黏性）
uniform float uSpread;      // 漂浮範圍

uniform float uThickness;
uniform float uThickVar;
uniform float uNoiseScale;
uniform float uDispersion;
uniform float uSaturation;
uniform float uFresnel;
uniform float uGravity;
uniform float uFlowSpeed;

const int   MAXN = 8;
const float IOR  = 1.33;
const float TAU  = 6.28318530718;

${NOISE_GLSL}

float hash11(float n){ return fract(sin(n * 127.1) * 43758.5453123); }

// 每顆水滴的漂浮軌跡（Lissajous，頻率互質 → 偶爾交會後分開）
vec3 dropCenter(int ii, float t){
  float i = float(ii);
  float h1 = hash11(i + 1.0), h2 = hash11(i + 7.0), h3 = hash11(i + 13.0);
  vec3 freq  = vec3(0.55 + h1 * 0.5, 0.47 + h2 * 0.5, 0.51 + h3 * 0.5);
  vec3 phase = vec3(h1, h2, h3) * TAU;
  float s = t * uFlowSpeed;
  vec3 c = vec3(
    sin(s * freq.x + phase.x),
    sin(s * freq.y + phase.y + 1.7),
    sin(s * freq.z + phase.z + 3.1)
  );
  return c * uSpread;
}

// 多項式 smooth-min：a、b 兩距離場靠近時平滑相接（表面張力頸縮）
float smin(float a, float b, float k){
  if (k <= 0.0001) return min(a, b);
  float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
  return mix(b, a, h) - k * h * (1.0 - h);
}

float mapScene(vec3 p){
  float d = 1e9;
  for (int i = 0; i < MAXN; i++){
    if (i >= uCount) break;
    vec3 c = dropCenter(i, uTime);
    float r = uRadius * (0.72 + 0.55 * hash11(float(i) * 3.17 + 5.0));
    d = smin(d, length(p - c) - r, uViscosity);
  }
  return d;
}

// 四點四面體法線（省一次取樣）
vec3 calcNormal(vec3 p){
  const vec2 k = vec2(1.0, -1.0);
  const float h = 0.0009;
  return normalize(
    k.xyy * mapScene(p + k.xyy * h) +
    k.yyx * mapScene(p + k.yyx * h) +
    k.yxy * mapScene(p + k.yxy * h) +
    k.xxx * mapScene(p + k.xxx * h));
}

// 薄膜干涉上色（透明玻璃泡：body 清透、彩虹集中在邊緣與細帶）
// 回傳 rgb + alpha，讓 body 半透明露出背景
vec4 thinFilm(vec3 p, vec3 N, vec3 V){
  float cosTheta = clamp(dot(N, V), 0.0, 1.0);

  vec3 sp = p * uNoiseScale;
  float flow = uTime * uFlowSpeed;
  vec3 warp = vec3(
    fbm(sp + vec3(0.0, 0.0, flow)),
    fbm(sp + vec3(5.2, 1.3, flow)),
    fbm(sp + vec3(1.7, 9.2, flow))
  );
  float n = fbm(sp + warp * 0.6 + vec3(0.0, flow * 0.5, 0.0));
  float thickness = uThickness + n * uThickVar;

  // 重力排水：朝上表面變薄 → 近黑
  float top = clamp(N.y * 0.5 + 0.5, 0.0, 1.0);
  thickness -= pow(top, 2.5) * uGravity * uThickness * 0.95;
  thickness = max(thickness, 0.0);

  // 光程差用「膜內折射角」(Snell)：掠射角時 cosT 仍可觀 → 邊緣才有彩虹
  float sinI = sqrt(max(0.0, 1.0 - cosTheta * cosTheta));
  float cosT = sqrt(max(0.0, 1.0 - (sinI / IOR) * (sinI / IOR)));
  float opd = 2.0 * IOR * thickness * cosT;
  vec3 lambda = mix(vec3(550.0), vec3(650.0, 550.0, 450.0), uDispersion);
  vec3 interf = 0.5 - 0.5 * cos(TAU * opd / lambda);

  float lum = dot(interf, vec3(0.3333));
  interf = mix(vec3(lum), interf, uSaturation);

  // Fresnel：邊緣權重（掠射角）。薄膜反射本就在邊緣最強 → 彩虹集中在輪廓
  float fres = pow(1.0 - cosTheta, 3.0);
  float rim  = fres * uFresnel;

  // 薄膜色只在邊緣/細帶顯著，body 幾乎不上色（保持清透）
  vec3 film = interf * (0.08 + 1.3 * rim);

  // 玻璃光澤：一寬一窄兩道高光
  vec3 R = reflect(-V, N);
  vec3 L1 = normalize(vec3(0.5, 0.72, 0.45));
  vec3 L2 = normalize(vec3(-0.45, -0.2, 0.6));
  float broad = pow(max(dot(R, L1), 0.0), 7.0);   // 寬柔片光
  float sharp = pow(max(dot(R, L2), 0.0), 160.0); // 銳利亮點
  vec3 spec = vec3(broad * 0.28 + sharp * 1.0);

  // 極淡的冷色 body 底，讓透明處不至於全黑
  vec3 bodyTint = vec3(0.02, 0.03, 0.05) * (0.4 + 0.6 * lum);

  vec3 col = film + spec + bodyTint;
  col = 1.0 - exp(-col * 1.7);

  // alpha：body 透明（露出背景），邊緣與高光處不透明
  float alpha = clamp(0.05 + rim * 0.95 + broad * 0.25 + sharp + dot(film, vec3(0.4)), 0.0, 1.0);
  return vec4(col, alpha);
}

void main(){
  vec2 uv = (vUv * 2.0 - 1.0);
  uv.x *= uResolution.x / uResolution.y;
  float tanHalfFov = 0.364; // fov ~40°

  // 相機射線，經 uRot 環繞水滴群
  vec3 ro = uRot * vec3(0.0, 0.0, 5.6);
  vec3 rd = uRot * normalize(vec3(uv * tanHalfFov, -1.0));

  // 球體追蹤
  float t = 0.0;
  bool hit = false;
  for (int i = 0; i < 110; i++){
    vec3 p = ro + rd * t;
    float d = mapScene(p);
    if (d < 0.0008){ hit = true; break; }
    t += d;
    if (t > 14.0) break;
  }

  if (!hit) discard;

  vec3 p = ro + rd * t;
  vec3 N = calcNormal(p);
  vec3 V = -rd;
  gl_FragColor = thinFilm(p, N, V);
}
`;

/* ===== WebGL 場景（延遲初始化，規避預覽時的 context 上限）===== */
let renderer = null, scene = null, camera = null, mesh = null, uniforms = null;
let inited = false;

// 旋轉狀態（拖曳 + 慣性 + 自轉）
const rot = { x: 0.1, y: 0.3 };
const vel = { x: 0, y: 0 };
let dragging = false, lastX = 0, lastY = 0;
const rotM4 = new THREE.Matrix4();
const tmpX = new THREE.Matrix4();

function initGL() {
  if (inited) return;
  inited = true;

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

  scene = new THREE.Scene();
  camera = new THREE.Camera(); // 全螢幕 raymarch 不用相機投影

  uniforms = {
    uTime:       { value: 0 },
    uResolution: { value: new THREE.Vector2(1, 1) },
    uRot:        { value: new THREE.Matrix3() },
    uCount:      { value: Math.round(P.count) },
    uRadius:     { value: P.radius },
    uViscosity:  { value: P.viscosity },
    uSpread:     { value: P.spread },
    uThickness:  { value: P.thickness },
    uThickVar:   { value: P.thickVar },
    uNoiseScale: { value: P.noiseScale },
    uDispersion: { value: P.dispersion },
    uSaturation: { value: P.saturation },
    uFresnel:    { value: P.fresnel },
    uGravity:    { value: P.gravity },
    uFlowSpeed:  { value: P.flowSpeed },
  };

  const geo = new THREE.PlaneGeometry(2, 2);
  const mat = new THREE.ShaderMaterial({
    uniforms, vertexShader: VERT, fragmentShader: FRAG,
    depthTest: false, depthWrite: false,
    transparent: true, blending: THREE.NormalBlending,
  });
  mesh = new THREE.Mesh(geo, mat);
  mesh.frustumCulled = false;
  scene.add(mesh);

  applyBg();
  resize();
  window.addEventListener('resize', resize);
  bindPointer();
}

function applyBg() {
  if (renderer) renderer.setClearColor(new THREE.Color(P.bgColor), 1);
  document.body.style.background = P.bgColor;
}

function resize() {
  if (!renderer) return;
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, true);
  uniforms.uResolution.value.set(w, h);
}

/* ===== 拖曳旋轉 ===== */
function bindPointer() {
  canvas.addEventListener('pointerdown', e => {
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    rot.y += dx * 0.006; rot.x += dy * 0.006;
    vel.y = dx * 0.006; vel.x = dy * 0.006;
  });
  const end = e => { dragging = false; try { canvas.releasePointerCapture(e.pointerId); } catch (_) {} };
  canvas.addEventListener('pointerup', end);
  canvas.addEventListener('pointercancel', end);
}

/* ===== 面板綁定 ===== */
function bindControls() {
  for (const key of Object.keys(DEFAULTS)) {
    const el = document.getElementById(key);
    const valEl = document.getElementById(key + '_v');
    const uName = 'u' + key.charAt(0).toUpperCase() + key.slice(1);
    const update = () => {
      P[key] = parseFloat(el.value);
      if (valEl) valEl.textContent = (fmt[key] || (v => +v.toFixed(2)))(P[key]);
      if (uniforms && uniforms[uName]) uniforms[uName].value = (key === 'count') ? Math.round(P[key]) : P[key];
    };
    el.value = P[key];
    if (!el._bound) { el.addEventListener('input', update); el._bound = true; }
    update();
  }
  const bg = document.getElementById('bgColor');
  const bgUpdate = () => { P.bgColor = bg.value; applyBg(); };
  bg.value = P.bgColor;
  if (!bg._bound) { bg.addEventListener('input', bgUpdate); bg._bound = true; }
  bgUpdate();
}

document.getElementById('resetBtn').addEventListener('click', () => {
  Object.assign(P, DEFAULTS, COLOR_DEFAULTS);
  bindControls();
});

/* ===== 播放/暫停：面板按鈕、postMessage、分頁隱藏三者共同決定 ===== */
let userPaused = false, extPaused = PREVIEW; // 預覽預設暫停，直到 gallery 送 vfx-play 才啟動
let rafId = 0, last = 0;
const pauseBtn = document.getElementById('playCtl');
function isPaused() { return userPaused || extPaused || document.hidden; }
function syncLoop() {
  if (isPaused()) {
    if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
  } else {
    if (!inited) initGL();      // 首次真正播放時才建立 WebGL context
    if (!rafId) { last = performance.now(); rafId = requestAnimationFrame(frame); }
  }
}
pauseBtn.addEventListener('click', () => {
  userPaused = !userPaused;
  pauseBtn.textContent = userPaused ? '▶ 播放' : '⏸ 暫停';
  syncLoop();
});
window.addEventListener('message', e => {
  if (e.data === 'vfx-pause') { extPaused = true; syncLoop(); }
  else if (e.data === 'vfx-play') { extPaused = false; syncLoop(); }
});
document.addEventListener('visibilitychange', syncLoop);

/* ===== 面板開合 ===== */
const panel = document.getElementById('panel');
document.getElementById('toggleBtn').addEventListener('click', () => panel.classList.toggle('collapsed'));

/* ===== 主迴圈 ===== */
let simT = 0;
function frame(now) {
  rafId = requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  simT += dt;

  // 慣性 + 自轉
  if (!dragging) {
    vel.x *= 0.94; vel.y *= 0.94;
    rot.x += vel.x; rot.y += vel.y;
    rot.y += P.spin * dt * 0.35;
  }
  rot.x = Math.max(-1.2, Math.min(1.2, rot.x));

  // 相機環繞旋轉矩陣：Ry(yaw) * Rx(pitch)
  rotM4.makeRotationY(rot.y);
  tmpX.makeRotationX(rot.x);
  rotM4.multiply(tmpX);
  uniforms.uRot.value.setFromMatrix4(rotM4);

  uniforms.uTime.value = simT;
  renderer.render(scene, camera);
}

bindControls();
syncLoop();
if (!PREVIEW) syncLoop();
</script>
</body>

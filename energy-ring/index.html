<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Ring VFX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "SF Pro", "PingFang TC", "Microsoft JhengHei", sans-serif; }
  #stage { position: absolute; inset: 0; display: block; }

  /* ===== 控制面板：左側縱向抽屜。開啟時特效會自動把圓心往右偏，避開面板佔用的區域 ===== */
  #panel {
    position: fixed; left: 12px; top: 64px; bottom: 12px; width: 340px;
    overflow-y: auto;
    background: rgba(10, 16, 12, 0.86); backdrop-filter: blur(10px);
    border: 1px solid rgba(0, 255, 120, 0.25); border-radius: 12px;
    color: #cfe8d8; padding: 14px 16px 18px; z-index: 10;
    box-shadow: 4px 0 30px rgba(0,0,0,0.6);
    transition: transform .25s ease, opacity .25s ease;
  }
  #panel.collapsed { transform: translateX(calc(-100% - 24px)); opacity: 0; pointer-events: none; }
  #panel::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-thumb { background: rgba(0,255,120,.3); border-radius: 3px; }

  #toggleBtn {
    position: fixed; top: 12px; right: 12px; z-index: 11;
    background: rgba(10,16,12,.85); color: #6cf3a0;
    border: 1px solid rgba(0,255,120,.35); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
  }
  #toggleBtn:hover { background: rgba(0,255,120,.15); }

  #homeBtn {
    position: fixed; top: 12px; left: 12px; z-index: 11;
    background: rgba(10,16,12,.85); color: #6cf3a0; text-decoration: none;
    border: 1px solid rgba(0,255,120,.35); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  #homeBtn:hover { background: rgba(0,255,120,.15); }

  /* ===== 獨立浮動的播放/暫停 —— 隨時可點，不跟著設定面板一起收合 ===== */
  #playCtl {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 11;
    background: rgba(10,16,12,.85); color: #8fffbe;
    border: 1px solid rgba(0,255,120,.35); border-radius: 999px;
    padding: 8px 20px; cursor: pointer; font-size: 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #playCtl:hover { background: rgba(0,255,120,.18); }

  html.preview-mode #homeBtn,
  html.preview-mode #toggleBtn,
  html.preview-mode #playCtl,
  html.preview-mode #panel { display: none !important; }
  @media (max-width: 760px) {
    #panel { left: 8px; top: 56px; bottom: 8px; width: calc(100vw - 16px); max-width: 340px; }
  }

  #panel h2 { font-size: 14px; letter-spacing: 2px; color: #7bffb0; margin-bottom: 4px; font-weight: 600; }
  #panel .sub { font-size: 11px; color: #6f8f7d; margin-bottom: 12px; }
  /* 左側縱向面板：群組直向堆疊成單欄 */
  .groups { display: block; }
  .group { margin-bottom: 8px; border-top: 1px solid rgba(0,255,120,.12); padding-top: 6px; }
  .group h3 { font-size: 11px; color: #55d98a; letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
  .row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; min-width: 0; }
  .row label { flex: 0 0 78px; font-size: 12px; color: #b8d6c4; white-space: nowrap; }
  .row input[type=range] { flex: 1 1 110px; min-width: 60px; accent-color: #2ee06f; height: 14px; cursor: pointer; }
  .row .val { flex: 0 0 44px; text-align: right; font-size: 11px; color: #7bffb0; font-variant-numeric: tabular-nums; }
  .row input[type=checkbox] { accent-color: #2ee06f; width: 15px; height: 15px; cursor: pointer; }
  .row input[type=number] {
    width: 70px; background: rgba(0,255,120,.08); color: #cfe8d8;
    border: 1px solid rgba(0,255,120,.3); border-radius: 5px;
    padding: 3px 6px; font-size: 12px;
  }
  .group button.mini {
    width: 100%; background: rgba(0,255,120,.1); color: #8fffbe;
    border: 1px solid rgba(0,255,120,.3); border-radius: 7px;
    padding: 6px 0; font-size: 12px; cursor: pointer; margin-top: 2px;
  }
  .group button.mini:hover { background: rgba(0,255,120,.22); }
  .group button.mini:disabled { opacity: .5; cursor: default; }
  #exportStatus { font-size: 11px; color: #7bffb0; display: block; margin-top: 5px; min-height: 14px; }
  .linkbtn {
    background: none; border: 1px solid rgba(0,255,120,.3); color: #8fffbe;
    border-radius: 5px; cursor: pointer; padding: 2px 6px; font-size: 12px; flex: 0 0 auto;
  }
  .linkbtn.off { opacity: .35; }
  .row input.dim { width: 62px; }
  .btns { display: flex; gap: 8px; margin-top: 12px; }
  .btns button {
    flex: 1; background: rgba(0,255,120,.1); color: #8fffbe;
    border: 1px solid rgba(0,255,120,.3); border-radius: 7px;
    padding: 7px 0; font-size: 12px; cursor: pointer;
  }
  .btns button:hover { background: rgba(0,255,120,.22); }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<a id="homeBtn" href="../index.html">← 首頁</a>

<div id="panel">
  <h2>ENERGY RING</h2>
  <div class="sub">旋轉能量光環特效 — 參數調整</div>

  <div class="groups">
  <div class="group">
    <h3>旋轉 Rotation</h3>
    <div class="row"><label>轉速 (圈/秒)</label><input type="range" id="speed" min="0" max="2" step="0.01" value="0.25"><span class="val" id="speed_v"></span></div>
    <div class="row"><label>逆時針</label><input type="checkbox" id="ccw"><span class="val"></span></div>
    <div class="row"><label>速度脈動</label><input type="range" id="pulse" min="0" max="1" step="0.01" value="0"><span class="val" id="pulse_v"></span></div>
    <div class="row"><label>循環秒數</label><input type="range" id="loopSec" min="1" max="30" step="0.5" value="5"><span class="val" id="loopSec_v"></span></div>
    <div class="row"><label style="opacity:.6">實際轉速</label><span id="effSpeedHint" style="font-size:11px;color:#7bffb0;">—</span></div>
  </div>

  <div class="group">
    <h3>環體 Ring</h3>
    <div class="row"><label>半徑</label><input type="range" id="radius" min="0.1" max="0.48" step="0.005" value="0.33"><span class="val" id="radius_v"></span></div>
    <div class="row"><label>環數</label><input type="range" id="ringCount" min="1" max="20" step="1" value="4"><span class="val" id="ringCount_v"></span></div>
    <div class="row"><label>環距</label><input type="range" id="ringGap" min="0" max="30" step="1" value="12"><span class="val" id="ringGap_v"></span></div>
    <div class="row"><label>線寬</label><input type="range" id="thickness" min="0.1" max="12" step="0.1" value="3.5"><span class="val" id="thickness_v"></span></div>
    <div class="row"><label>不均勻感</label><input type="range" id="wobble" min="0" max="1" step="0.01" value="0.5"><span class="val" id="wobble_v"></span></div>
    <div class="row"><label>扭曲變形</label><input type="range" id="warp" min="0" max="1" step="0.01" value="0.35"><span class="val" id="warp_v"></span></div>
    <div class="row"><label>粗細變化</label><input type="range" id="widthVar" min="0" max="1" step="0.01" value="0.5"><span class="val" id="widthVar_v"></span></div>
    <div class="row"><label>絲線數</label><input type="range" id="filaments" min="1" max="6" step="1" value="3"><span class="val" id="filaments_v"></span></div>
    <div class="row"><label>細節毛絲感</label><input type="range" id="fray" min="0" max="1" step="0.01" value="0.45"><span class="val" id="fray_v"></span></div>
    <div class="row"><label>裂紋斷點</label><input type="range" id="crackle" min="0" max="1" step="0.01" value="0.35"><span class="val" id="crackle_v"></span></div>
    <div class="row"><label>放射毛刺</label><input type="range" id="spikeAmount" min="0" max="1" step="0.01" value="0"><span class="val" id="spikeAmount_v"></span></div>
    <div class="row"><label>毛刺長度</label><input type="range" id="spikeLength" min="0" max="1" step="0.01" value="0.5"><span class="val" id="spikeLength_v"></span></div>
    <div class="row"><label>毛刺粗細</label><input type="range" id="spikeWidth" min="0.2" max="4" step="0.1" value="1"><span class="val" id="spikeWidth_v"></span></div>
    <div class="row"><label>毛刺柔邊</label><input type="range" id="spikeBlur" min="0" max="1" step="0.01" value="0.5"><span class="val" id="spikeBlur_v"></span></div>
  </div>

  <div class="group">
    <h3>輸出 Export</h3>
    <div class="row"><label>FPS 上限</label><input type="number" id="fps" min="1" max="240" step="1" value="60"><span class="val"></span></div>
    <div class="row"><label>輸出秒數</label><input type="number" id="exportSec" min="0.1" max="30" step="0.1" value="3"><button class="linkbtn" id="syncLoopBtn" title="設為循環秒數，確保輸出無縫循環">= 循環</button></div>
    <div class="row"><label>尺寸 W×H</label><input type="number" class="dim" id="expW" min="16" max="4096" step="1" value="1080"><button class="linkbtn" id="linkBtn" title="連動長寬比">🔗</button><input type="number" class="dim" id="expH" min="16" max="4096" step="1" value="1080"></div>
    <button class="mini" id="exportBtn">⬇ 匯出去背 PNG 序列 (zip)</button>
    <span id="exportStatus"></span>
  </div>

  <div class="group">
    <h3>光感 Glow</h3>
    <div class="row"><label>光暈強度</label><input type="range" id="glow" min="0" max="2" step="0.01" value="1"><span class="val" id="glow_v"></span></div>
    <div class="row"><label>白熱亮點</label><input type="range" id="hotspots" min="0" max="5" step="1" value="2"><span class="val" id="hotspots_v"></span></div>
    <div class="row"><label>亮點大小</label><input type="range" id="hotspotSize" min="0.2" max="3" step="0.05" value="1"><span class="val" id="hotspotSize_v"></span></div>
    <div class="row"><label>閃爍</label><input type="range" id="flicker" min="0" max="1" step="0.01" value="0.25"><span class="val" id="flicker_v"></span></div>
    <div class="row"><label>拖尾殘影</label><input type="range" id="trail" min="0" max="0.95" step="0.01" value="0.55"><span class="val" id="trail_v"></span></div>
  </div>

  <div class="group">
    <h3>色彩 Color</h3>
    <div class="row"><label>主色相</label><input type="range" id="hue" min="0" max="360" step="1" value="130"><span class="val" id="hue_v"></span></div>
    <div class="row"><label>副色相偏移</label><input type="range" id="hueShift" min="-90" max="90" step="1" value="-45"><span class="val" id="hueShift_v"></span></div>
    <div class="row"><label>飽和度</label><input type="range" id="sat" min="0" max="100" step="1" value="100"><span class="val" id="sat_v"></span></div>
  </div>

  <div class="group">
    <h3>電漿火花 Plasma</h3>
    <div class="row"><label>火花數量</label><input type="range" id="sparkAmount" min="0" max="1" step="0.01" value="0.6"><span class="val" id="sparkAmount_v"></span></div>
    <div class="row"><label>火花轉速</label><input type="range" id="sparkSpeed" min="0" max="2" step="0.01" value="0.2"><span class="val" id="sparkSpeed_v"></span></div>
    <div class="row"><label>噴發範圍°</label><input type="range" id="sparkArc" min="10" max="360" step="5" value="110"><span class="val" id="sparkArc_v"></span></div>
    <div class="row"><label>飄散距離</label><input type="range" id="sparkReach" min="0.2" max="2" step="0.05" value="1"><span class="val" id="sparkReach_v"></span></div>
    <div class="row"><label>紊流</label><input type="range" id="turbulence" min="0" max="2" step="0.05" value="1"><span class="val" id="turbulence_v"></span></div>
  </div>

  <div class="group">
    <h3>電弧 Arc</h3>
    <div class="row"><label>電弧數量</label><input type="range" id="arcAmount" min="0" max="1" step="0.01" value="0.5"><span class="val" id="arcAmount_v"></span></div>
    <div class="row"><label>跨幅</label><input type="range" id="arcSpan" min="0.1" max="1" step="0.01" value="0.45"><span class="val" id="arcSpan_v"></span></div>
    <div class="row"><label>鋸齒感</label><input type="range" id="arcJag" min="0" max="1" step="0.01" value="0.6"><span class="val" id="arcJag_v"></span></div>
    <div class="row"><label>粗細</label><input type="range" id="arcThickness" min="0.3" max="3" step="0.05" value="1"><span class="val" id="arcThickness_v"></span></div>
  </div>

  <div class="group">
    <h3>脈衝波 Shockwave</h3>
    <div class="row"><label>強度</label><input type="range" id="waveAmount" min="0" max="1" step="0.01" value="0.5"><span class="val" id="waveAmount_v"></span></div>
    <div class="row"><label>亮度</label><input type="range" id="waveBrightness" min="0" max="2" step="0.05" value="1"><span class="val" id="waveBrightness_v"></span></div>
    <div class="row"><label>每循環波數</label><input type="range" id="waveCount" min="1" max="8" step="1" value="2"><span class="val" id="waveCount_v"></span></div>
    <div class="row"><label>速度</label><input type="range" id="waveSpeed" min="0.1" max="4" step="0.05" value="1"><span class="val" id="waveSpeed_v"></span></div>
    <div class="row"><label>擴散距離</label><input type="range" id="waveReach" min="0.1" max="1.5" step="0.05" value="0.6"><span class="val" id="waveReach_v"></span></div>
    <div class="row"><label>波環寬度</label><input type="range" id="waveWidth" min="0.1" max="2" step="0.05" value="0.5"><span class="val" id="waveWidth_v"></span></div>
  </div>

  <div class="group">
    <h3>星辰 Starfield</h3>
    <div class="row"><label>數量</label><input type="range" id="starCount" min="0" max="400" step="1" value="120"><span class="val" id="starCount_v"></span></div>
    <div class="row"><label>最小顆粒</label><input type="range" id="starMinSize" min="0.2" max="6" step="0.1" value="0.6"><span class="val" id="starMinSize_v"></span></div>
    <div class="row"><label>最大顆粒</label><input type="range" id="starMaxSize" min="0.2" max="10" step="0.1" value="2.5"><span class="val" id="starMaxSize_v"></span></div>
    <div class="row"><label>清晰度</label><input type="range" id="starSharpness" min="0" max="1" step="0.01" value="0.5"><span class="val" id="starSharpness_v"></span></div>
    <div class="row"><label>散布範圍</label><input type="range" id="starSpread" min="0.05" max="1.5" step="0.01" value="0.4"><span class="val" id="starSpread_v"></span></div>
    <div class="row"><label>星辰轉速</label><input type="range" id="starSpeed" min="0" max="2" step="0.01" value="0.2"><span class="val" id="starSpeed_v"></span></div>
  </div>

  <div class="group">
    <h3>太陽米粒 Granule</h3>
    <div class="row"><label>強度</label><input type="range" id="granule" min="0" max="1" step="0.01" value="0"><span class="val" id="granule_v"></span></div>
    <div class="row"><label>米粒大小</label><input type="range" id="granuleSize" min="0.1" max="1" step="0.01" value="0.5"><span class="val" id="granuleSize_v"></span></div>
    <div class="row"><label>翻騰速度</label><input type="range" id="granuleSpeed" min="0.1" max="3" step="0.05" value="1"><span class="val" id="granuleSpeed_v"></span></div>
  </div>

  <div class="group">
    <h3>流體煙霧 Fluid</h3>
    <div class="row"><label>強度</label><input type="range" id="smoke" min="0" max="1" step="0.01" value="0.45"><span class="val" id="smoke_v"></span></div>
    <div class="row"><label>紋理尺寸</label><input type="range" id="smokeScale" min="0.2" max="2" step="0.01" value="1"><span class="val" id="smokeScale_v"></span></div>
    <div class="row"><label>流速</label><input type="range" id="smokeSpeed" min="0.1" max="3" step="0.05" value="1"><span class="val" id="smokeSpeed_v"></span></div>
    <div class="row"><label>擴散範圍</label><input type="range" id="smokeReach" min="0.3" max="2" step="0.05" value="1"><span class="val" id="smokeReach_v"></span></div>
  </div>
  </div>

  <div class="btns">
    <button id="resetBtn">↺ 重設</button>
  </div>
</div>
<button id="toggleBtn">⚙ 面板</button>
<button id="playCtl">⏸ 暫停</button>

<script>
'use strict';

// 預覽嵌入模式（?preview=1）：供首頁卡片用 iframe 嵌入，隱藏面板與導覽按鈕，只留純畫面
if (new URLSearchParams(location.search).has('preview')) {
  document.documentElement.classList.add('preview-mode');
}

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

/* ===== 參數 ===== */
const DEFAULTS = {
  speed: 1, pulse: 0, loopSec: 5,
  radius: 0.26, ringCount: 7, ringGap: 2, thickness: 1.0, wobble: 0.79, warp: 0.5, widthVar: 1, filaments: 1, fray: 0, crackle: 0,
  spikeAmount: 0, spikeLength: 0.5, spikeWidth: 1, spikeBlur: 0.5,
  glow: 0.5, hotspots: 2, hotspotSize: 2, flicker: 0.26, trail: 0.34,
  granule: 0, granuleSize: 0.5, granuleSpeed: 1,
  smoke: 0, smokeScale: 1, smokeSpeed: 1, smokeReach: 1,
  fps: 30, exportSec: 3,
  hue: 116, hueShift: -33, sat: 100,
  sparkAmount: 0, sparkSpeed: 0.2, sparkArc: 25, sparkReach: 0.25, turbulence: 1,
  arcAmount: 0.5, arcSpan: 0.45, arcJag: 0.6, arcThickness: 1,
  waveAmount: 0.5, waveBrightness: 1, waveCount: 2, waveSpeed: 1, waveReach: 0.6, waveWidth: 0.5,
  starCount: 15, starMinSize: 0.4, starMaxSize: 2.5, starSharpness: 0.5, starSpread: 0.4, starSpeed: 0.2,
};
const P = { ...DEFAULTS, ccw: false };
// Q 是渲染程式碼實際讀取的參數來源：即時預覽時等於 P；匯出時暫時指向一份快照，
// 這樣使用者在匯出途中調整滑桿只會改到 P，不會污染正在進行中的那次匯出（見 exportBtn 的處理）。
let Q = P;
// 暫停中調整參數時標記為 true，讓主迴圈用同一個凍結的時間點重畫一張反映新參數的靜態畫面
let paramsDirty = false;

const fmt = {
  speed: v => v.toFixed(2), radius: v => v.toFixed(2), thickness: v => v.toFixed(1),
  hue: v => v + '°', hueShift: v => v + '°', sat: v => v + '%', sparkArc: v => v + '°',
  loopSec: v => v.toFixed(1) + 's',
};
function bindControls() {
  for (const key of Object.keys(DEFAULTS)) {
    const el = document.getElementById(key);
    const valEl = document.getElementById(key + '_v');
    const update = () => {
      P[key] = parseFloat(el.value);
      if (valEl) valEl.textContent = (fmt[key] || (v => v.toFixed ? +v.toFixed(2) : v))(P[key]);
      paramsDirty = true;
    };
    el.addEventListener('input', update);
    el.value = P[key];
    update();
  }
  document.getElementById('ccw').addEventListener('change', e => { P.ccw = e.target.checked; paramsDirty = true; });
  updateEffSpeedHint();
}
// 顯示轉速滑桿貼齊整數圈之後的實際數值，滑桿寫的是「目標值」，這裡才是真正跑出來的速度
function updateEffSpeedHint() {
  const el = document.getElementById('effSpeedHint');
  if (!el) return;
  const turns = P.speed > 0 ? Math.max(1, Math.round(P.speed * P.loopSec)) : 0;
  const eff = turns / P.loopSec;
  const diffPct = P.speed > 0 ? Math.abs(eff - P.speed) / P.speed * 100 : 0;
  el.textContent = `${eff.toFixed(3)} 圈/秒（每循環 ${turns} 圈）` + (diffPct > 3 ? ` ⚠ 偏離 ${diffPct.toFixed(0)}%` : '');
}
bindControls();
document.getElementById('speed').addEventListener('input', updateEffSpeedHint);
document.getElementById('loopSec').addEventListener('input', updateEffSpeedHint);

document.getElementById('resetBtn').addEventListener('click', () => {
  Object.assign(P, DEFAULTS);
  document.getElementById('ccw').checked = P.ccw = false;
  bindControls();
});

let paused = false;
const pauseBtn = document.getElementById('playCtl');
pauseBtn.addEventListener('click', () => {
  paused = !paused;

/* ===== 雜訊工具（層疊正弦，穩定又便宜）===== */
function n1(x) { // 1D pseudo-noise, ~[-1,1]
  return Math.sin(x) * 0.55 + Math.sin(x * 2.13 + 1.7) * 0.3 + Math.sin(x * 4.7 + 0.4) * 0.15;
}
// 沿環方向專用：整數諧波 → 以 2π 為週期，繞一圈首尾必定無縫接合
function pn(t, f, seed) {
  return Math.sin(t * f + seed) * 0.55 +
         Math.sin(t * f * 2 + seed * 1.7 + 1.7) * 0.3 +
         Math.sin(t * f * 5 + seed * 2.3 + 0.4) * 0.15;
}

/* ===== Loop Animation 核心：把「一直往前跑的時間」換成「繞一圈精確歸零的相位」=====
   loopPhase 每經過 P.loopSec 秒就精確增加 2π，只要所有雜訊呼叫都用它的整數倍當引數，
   動畫在 t=0 與 t=loopSec 的畫面就會逐像素完全相同 → 天生無縫循環，不用再找「第幾幀開始重複」。 */
const TWO_PI = Math.PI * 2;
// CASE 1／3：時間項直接當 pn()/vn4() 的「t」或「角度」引數 → 只需是 loopPhase 的整數倍即可安全循環
function loopN(loopSec, coef) {
  return Math.max(1, Math.round(coef * loopSec / TWO_PI));
}
// CASE 2：時間項是加進 pn() 的「seed」引數（seed 內部會被乘上 1.7 / 2.3 兩個諧波係數）
// 兩者的最小公倍分母是 10，因此時間項必須是 20π 的整數倍，才能讓三個諧波同時精確回到原值
function loopSeedTerm(loopSec, loopPhase, coef) {
  const n = Math.max(1, Math.round(Math.abs(coef) * loopSec / (TWO_PI * 10)));
  return Math.sign(coef || 1) * loopPhase * 10 * n;
}

/* ===== 環的每一圈固定屬性（避免每幀隨機跳動）===== */
const RING_SEEDS = Array.from({ length: 24 }, (_, i) => ({
  radiusJitter: (Math.random() - 0.5) * 2,     // 半徑微偏
  phase: Math.random() * Math.PI * 2,          // 亮度相位
  speedMul: 0.75 + Math.random() * 0.55,       // 各環轉速略不同 → 流動感
  freq: 2 + Math.floor(Math.random() * 3),     // 亮度波瓣數
  widthMul: 0.7 + Math.random() * 0.7,
}));

/* ===== 電漿火花粒子（確定性排程版：可無縫循環）=====
   不用 Math.random() 即時噴發，改用固定種子預先生成一批「虛擬火花」：
   每顆有固定的出生時刻（均勻散佈在循環內）與壽命，渲染時以 (目前時間 mod 循環秒數) 算年齡，
   位置用封閉式公式從年齡直接算出（不逐幀積分）→ 每一循環的火花軌跡逐幀完全相同。 */
function mulberry32(seed) {
  let a = seed >>> 0;
  return () => {
    a = (a + 0x6D2B79F5) >>> 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const SPARK_MAX_RATE = 360; // sparkAmount=1 時每秒的火花數（對齊舊版「每幀 6 顆 × 60fps」的密度）
let sparkPool = [], sparkPoolKey = '';
function getSparkPool(loopSec) {
  const key = loopSec.toFixed(3);
  if (sparkPoolKey === key) return sparkPool;
  sparkPoolKey = key;
  const count = Math.ceil(SPARK_MAX_RATE * loopSec);
  const rnd = mulberry32(1234567);
  sparkPool = Array.from({ length: count }, (_, i) => ({
    birth: (i + rnd() * 0.9) / count * loopSec, // 均勻散佈 + 些許抖動
    maxLife: 0.7 + rnd() * 1.4,
    size: 1.5 + rnd() * 4.5,
    seed: rnd() * 100,
    angJitter: rnd() - 0.5,          // 在噴發扇區內的位置（-0.5..0.5，乘上即時的扇區角）
    speed0: 20 + rnd() * 60,         // 徑向初速（未乘 sparkReach）
    velScale: 0.4 + rnd() * 0.8,
    tangent: (rnd() - 0.5) * 40,     // 切線加速 → 掃過去的感覺
  }));
  return sparkPool;
}

/* ===== 環間電弧（確定性排程版：可無縫循環）=====
   跟火花同一套思路：固定種子池預生成整循環的電弧事件，每道有固定出生時刻與短壽命，
   渲染時以年齡取模判斷是否活著。鋸齒路徑的「重擲」用 floor(age × 頻率) 當亂數種子 →
   同一道電弧在生命期內會頻閃換形，但形狀只取決於年齡，天生無縫循環。 */
const ARC_MAX_RATE = 5; // arcAmount=1 時每秒的電弧數
let arcPool = [], arcPoolKey = '';
function getArcPool(loopSec) {
  const key = loopSec.toFixed(3);
  if (arcPoolKey === key) return arcPool;
  arcPoolKey = key;
  const count = Math.ceil(ARC_MAX_RATE * loopSec);
  const rnd = mulberry32(9182736);
  arcPool = Array.from({ length: count }, (_, i) => ({
    birth: (i + rnd() * 0.9) / count * loopSec, // 均勻散佈 + 些許抖動
    maxLife: 0.15 + rnd() * 0.25,
    angle0: rnd() * Math.PI * 2,
    spanT: 0.4 + rnd() * 0.6,        // 個體跨幅差異（乘上跨幅滑桿）
    ringA: rnd(), ringB: rnd(),      // 0..1，映射到當下的環索引（環數改變也不用重生池）
    seed: Math.floor(rnd() * 1e9),
  }));
  return arcPool;
}

/* ===== 星辰粒子（固定不消散版）=====
   跟電漿火花是獨立的一層：沒有生命週期，單純固定分佈在環外側、跟著環旋轉。
   同樣用固定種子池 + 封閉式角度公式 → 每顆星星的位置只取決於「目前時間」，天生無縫循環。 */
// 星辰的獨立畫布：每幀清空重畫，跟主畫布的拖尾殘影完全隔離（見下方渲染區塊的說明）
const starCanvas = document.createElement('canvas');
const starCtx = starCanvas.getContext('2d');
let starPool = [], starPoolKey = -1;
function getStarPool(count) {
  if (starPoolKey === count) return starPool;
  starPoolKey = count;
  const rnd = mulberry32(7654321);
  starPool = Array.from({ length: count }, () => ({
    angle0: rnd() * Math.PI * 2,
    radiusFactor: Math.sqrt(rnd()),   // 開根號 → 面積均勻分布，不會擠在內圈
    sizeT: rnd(),                     // 0..1，配合當下的最小/最大顆粒插值
    briT: 0.35 + rnd() * 0.65,        // 每顆星星固定的亮度差異（靜態，不影響循環）
    seed: rnd() * 100,
  }));
  return starPool;
}

/* ===== 放射狀光芒（god rays）：從環面往外放射的錐形光束，基部亮、往外收尖淡出 =====
   數量是密度滑桿（0-1），所以池子固定生成夠多筆，密度只決定要畫前面幾筆，不需要重新生成。 */
const SPIKE_POOL_MAX = 260;
const SPIKE_POOL = (() => {
  const rnd = mulberry32(2468013);
  return Array.from({ length: SPIKE_POOL_MAX }, () => ({
    angle0: rnd() * Math.PI * 2,
    // 長度用非線性分布：多數中短、少數特別長 → 放射光芒的長短交錯質感
    lenT: Math.pow(rnd(), 2.2),
    widT: rnd(),                    // 0..1，基部粗細的個體差異
    baseJitter: (rnd() - 0.5) * 2,  // 基部沿半徑的微偏，讓起點不是死板同一圈
    briT: 0.35 + rnd() * 0.65,
  }));
})();
// 放射光芒的獨立緩衝畫布：先畫銳利的錐形，再整層模糊做出柔邊 god-ray 質感
const spikeCanvas = document.createElement('canvas');
const spikeCtx = spikeCanvas.getContext('2d');

/* ===== 太陽米粒組織：低解析 3D FBM 雜訊逐格重算 → 放大成翻騰的對流紋理 ===== */
const SUN_N = 128; // 雜訊紋理解析度（放大後靠平滑內插，故意低解析以求效能與柔和感）
const sunCanvas = document.createElement('canvas');
sunCanvas.width = sunCanvas.height = SUN_N;
const sunCtx = sunCanvas.getContext('2d');
const sunImg = sunCtx.createImageData(SUN_N, SUN_N);

// 4D value noise（時間用 (cos,sin) 兩維繞圓圈取樣 → 對流胞會融合、分裂、翻騰而非平移，且可無縫循環）
const PERM = new Uint8Array(512);
{
  const p = Array.from({ length: 256 }, (_, i) => i);
  for (let i = 255; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [p[i], p[j]] = [p[j], p[i]]; }
  for (let i = 0; i < 512; i++) PERM[i] = p[i & 255];
}
// 4D value noise：多一維 w，時間可用 (cos θ, sin θ) 當 (z,w) 沿圓圈取樣 → 繞一圈後座標精確歸位，
// 天生無縫循環（比起讓 z 隨時間一直增加，繞圈取樣不需要「回頭銜接」，起點終點本來就是同一點）。
function vn4(x, y, z, w) {
  const xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z), wi = Math.floor(w);
  const xf = x - xi, yf = y - yi, zf = z - zi, wf = w - wi;
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  const s = zf * zf * (3 - 2 * zf), t = wf * wf * (3 - 2 * wf);
  const h = (a, b, c, d) => PERM[(PERM[(PERM[(PERM[a & 255] + b) & 255] + c) & 255] + d) & 255] / 255;
  const l = (a, b, k) => a + (b - a) * k;
  const corner = (dz, dw) => l(
    l(h(xi, yi, zi + dz, wi + dw),     h(xi + 1, yi, zi + dz, wi + dw),     u),
    l(h(xi, yi + 1, zi + dz, wi + dw), h(xi + 1, yi + 1, zi + dz, wi + dw), u),
    v
  );
  return l(l(corner(0, 0), corner(1, 0), s), l(corner(0, 1), corner(1, 1), s), t);
}

// 亮度 → RGB 色階表（暗紅 → 橙 → 亮黃白），色相跟主色走，換色時才重算
let sunLUT = null, sunLUTKey = '';
function hsl2rgb(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1)); };
  return [f(0) * 255, f(8) * 255, f(4) * 255];
}
function buildSunLUT() {
  const key = Q.hue + '_' + Q.sat;
  if (sunLUTKey === key) return;
  sunLUTKey = key;
  sunLUT = new Uint8ClampedArray(256 * 3);
  for (let i = 0; i < 256; i++) {
    const q = i / 255;
    // 暗部偏深色低亮度、亮部色相微偏暖並拉高亮度 → 對流胞的立體感
    const [r, g, b] = hsl2rgb(Q.hue + q * 18 - 6, Q.sat, 8 + q * 64);
    sunLUT[i * 3] = r; sunLUT[i * 3 + 1] = g; sunLUT[i * 3 + 2] = b;
  }
}

const SUN_EXT = 1.38; // 紋理涵蓋範圍（環半徑的倍數）
const SUN_TURNS = [3, 5, 8]; // 3 個八度各自每循環繞的圈數（取相異整數避免同步重複）
function drawSunTexture(rotA, loopPhase) {
  buildSunLUT();
  const data = sunImg.data;
  const freq = 3.5 + (1 - Q.granuleSize) * 10.5; // 米粒大小 → 雜訊頻率（越大顆頻率越低）
  const inten = Math.min(1, Q.granule);
  const ca = Math.cos(rotA), sa = Math.sin(rotA); // 表層跟著環旋轉
  // 對流翻騰的時間軸改成繞圓圈取樣（circle-embedding）：半徑決定一次循環內變化的幅度（翻騰速度）
  const gRad = 1.6 * Math.max(0.15, Q.granuleSpeed);
  const octCirc = SUN_TURNS.map(nT => { const a = loopPhase * nT; return [Math.cos(a) * gRad, Math.sin(a) * gRad]; });
  for (let py = 0; py < SUN_N; py++) {
    const ny = ((py / SUN_N) * 2 - 1) * SUN_EXT;
    for (let px = 0; px < SUN_N; px++) {
      const idx = (py * SUN_N + px) * 4;
      const nx = ((px / SUN_N) * 2 - 1) * SUN_EXT;
      // 帶狀遮罩：貼著環表面（rho=1），內側收得快、外側像日冕拖尾較長
      const rho = Math.sqrt(nx * nx + ny * ny);
      const dR = rho - 1.0;
      const prof = Math.exp(-(dR * dR) / (dR < 0 ? 0.010 : 0.050));
      if (prof < 0.02) { data[idx + 3] = 0; continue; }
      // 取樣座標隨環旋轉 → 對流層跟著環轉動
      const rx = nx * ca + ny * sa, ry = -nx * sa + ny * ca;
      // 3 個八度的 billow 亂流：亮胞平原 + 細窄暗縫（米粒組織的特徵）
      let tv = 0, amp = 0.55, f = 1;
      for (let o = 0; o < 3; o++) {
        const [zc, zs] = octCirc[o];
        tv += amp * Math.abs(2 * vn4(rx * freq * f + 37, ry * freq * f + 19, zc, zs) - 1);
        f *= 2.15; amp *= 0.5;
      }
      let c = 1 - tv * 1.4;          // 反轉：胞內亮、縫隙暗
      c = (c - 0.22) * 1.75;         // 拉對比
      if (c < 0) c = 0; else if (c > 1) c = 1;
      c *= 0.35 + 0.65 * prof;       // 離表面越遠越暗
      const q = (c * 255) | 0;
      data[idx] = sunLUT[q * 3]; data[idx + 1] = sunLUT[q * 3 + 1]; data[idx + 2] = sunLUT[q * 3 + 2];
      data[idx + 3] = 255 * inten * prof;
    }
  }
  sunCtx.putImageData(sunImg, 0, 0);
}

/* ===== 流體煙霧：domain warping（雜訊扭曲雜訊座標）→ 墨水般的流體紋理 ===== */
const SMOKE_N = 192, SMOKE_EXT = 2.3;
const smokeCanvas = document.createElement('canvas');
smokeCanvas.width = smokeCanvas.height = SMOKE_N;
const smokeCtx = smokeCanvas.getContext('2d');
const smokeImg = smokeCtx.createImageData(SMOKE_N, SMOKE_N);
let smokeTick = 0;
const SMOKE_TURNS = [4, 6, 10, 13]; // fbm4 四個八度各自每循環繞的圈數（大略對應原本 1x/1.6x/2.4x/3.2x 的相對演化速度)

function fbm4(x, y, circles) { // 4 個八度的平滑雜訊（末段高頻讓絲縷更銳利），時間軸皆為圓圈取樣
  return vn4(x, y, circles[0][0], circles[0][1]) * 0.5 +
         vn4(x * 2.1, y * 2.1, circles[1][0], circles[1][1]) * 0.27 +
         vn4(x * 4.3, y * 4.3, circles[2][0], circles[2][1]) * 0.15 +
         vn4(x * 8.7, y * 8.7, circles[3][0], circles[3][1]) * 0.08;
}

function drawSmokeTexture(rotA, loopPhase) {
  buildSunLUT(); // 共用色階表
  const data = smokeImg.data;
  const sc = 1.6 * Q.smokeScale;
  const inten = Math.min(1, Q.smoke);
  const kDecay = 1.7 / Math.max(0.2, Q.smokeReach); // 擴散範圍 → 徑向衰減
  const ca = Math.cos(rotA), sa = Math.sin(rotA);
  const spd = Math.max(0.15, Q.smokeSpeed);
  // domain warping 與 fbm 的時間軸都改成繞圓圈取樣，半徑＝一次循環內的變化幅度（取代原本的翻騰速度）
  const wRad = 1.2 * spd, fRad = 1.3 * spd;
  const wAngX = loopPhase * 5, wAngY = loopPhase * 6 + 13;
  const wcx = Math.cos(wAngX) * wRad, wcy = Math.sin(wAngX) * wRad;
  const wdx = Math.cos(wAngY) * wRad, wdy = Math.sin(wAngY) * wRad;
  const fCircles = SMOKE_TURNS.map(nT => { const a = loopPhase * nT; return [Math.cos(a) * fRad, Math.sin(a) * fRad]; });
  for (let py = 0; py < SMOKE_N; py++) {
    const ny = ((py / SMOKE_N) * 2 - 1) * SMOKE_EXT;
    for (let px = 0; px < SMOKE_N; px++) {
      const idx = (py * SMOKE_N + px) * 4;
      const nx = ((px / SMOKE_N) * 2 - 1) * SMOKE_EXT;
      const rho = Math.sqrt(nx * nx + ny * ny);
      if (rho < 0.7 || rho > SMOKE_EXT - 0.05) { data[idx + 3] = 0; continue; }
      // 徑向包絡：環表面外側升起、越遠越淡
      const rise = rho < 1 ? Math.max(0, (rho - 0.7) / 0.3) : Math.exp(-(rho - 1) * kDecay);
      if (rise < 0.03) { data[idx + 3] = 0; continue; }
      const rx = nx * ca + ny * sa, ry = -nx * sa + ny * ca;
      // domain warping：先取一次低頻雜訊當座標偏移 → 流體的拉絲、捲曲感
      const wx = vn4(rx * sc * 0.9 + 11, ry * sc * 0.9 + 71, wcx, wcy);
      const wy = vn4(rx * sc * 0.9 + 41, ry * sc * 0.9 + 23, wdx, wdy);
      let v = fbm4(rx * sc + (wx - 0.5) * 2.6, ry * sc + (wy - 0.5) * 2.6, fCircles);
      v = (v - 0.32) * 2.2;
      if (v < 0) v = 0; else if (v > 1) v = 1;
      const a = v * rise * inten;
      if (a < 0.015) { data[idx + 3] = 0; continue; }
      // 用色階表的中低段 → 暗色霧狀（不會蓋過主環的亮度）
      const q = (40 + v * 130) | 0;
      data[idx] = sunLUT[q * 3]; data[idx + 1] = sunLUT[q * 3 + 1]; data[idx + 2] = sunLUT[q * 3 + 2];
      data[idx + 3] = 255 * a * 0.55;
    }
  }
  smokeCtx.putImageData(smokeImg, 0, 0);
}

/* ===== 主迴圈 ===== */
let last = performance.now(), noiseT = 0, lastDraw = 0, exporting = false;

function frame(now) {
  requestAnimationFrame(frame);
  if (exporting) return; // 輸出中暫停即時繪製，避免共用狀態被打亂
  const interval = 1000 / Math.max(1, P.fps || 60);
  if (now - lastDraw < interval - 1) return; // FPS 上限
  lastDraw = now;
  const realDt = Math.min((now - last) / 1000, 0.25);
  last = now;
  let dt = paused ? 0 : realDt;
  // 面板開合時，畫面圓心平滑地滑往目標偏移（跟面板的滑動動畫節奏一致），避免瞬間跳動。
  // 用 realDt（不受暫停影響）驅動，暫停時也能繼續完成這個純 UI 過渡
  panelInsetX += (panelInsetTarget - panelInsetX) * Math.min(1, realDt * 10);
  const insetSettled = Math.abs(panelInsetTarget - panelInsetX) < 0.05;
  // 暫停、畫面已經完全靜止、而且沒有人在調參數時，直接跳過整幀重繪 —— 反正 dt=0 算出來的結果
  // 會跟上一幀逐像素相同，沒必要每 1/FPS 秒就重算一次幾百個漸層跟環束多邊形，白白吃 GPU/CPU。
  // 但暫停中調整滑桿會把 paramsDirty 標記起來，讓它用同一個凍結的時間點重畫「這一張」反映新參數的畫面，
  // 畫完立刻清掉標記，畫面依然停在原地，不會恢復播放
  if (paused && insetSettled && !paramsDirty) return;
  paramsDirty = false;
  renderFrame(ctx, W, H, dt, false, undefined, panelInsetX);
}

/* ===== 拖尾持久緩衝區 =====
   環/火花/煙霧等「應該有拖尾流動感」的內容都畫在這張獨立、跨幀保留內容的畫布上；
   星辰則完全不進來，畫完直接疊在最終輸出畫布上，兩者的持久性從架構上就分開，
   不必依賴「清得夠不夠快」這種容易漏洞的做法（見星辰殘影問題的最終修法）。
   用 WeakMap 依照輸出目標（即時預覽的 ctx／每次匯出新建的 ectx）各自保留一份，
   避免即時預覽和匯出共用同一份緩衝區而互相污染。 */
const TRAIL_BUFFERS = new WeakMap();
function getTrailBuffer(outputCtx) {
  let buf = TRAIL_BUFFERS.get(outputCtx);
  const ow = outputCtx.canvas.width, oh = outputCtx.canvas.height;
  if (!buf) {
    const canvas = document.createElement('canvas');
    canvas.width = ow; canvas.height = oh;
    buf = { canvas, ctx: canvas.getContext('2d') };
    TRAIL_BUFFERS.set(outputCtx, buf);
  } else if (buf.canvas.width !== ow || buf.canvas.height !== oh) {
    buf.canvas.width = ow; buf.canvas.height = oh; // 尺寸變動時視窗本來就會重置畫面，跟現有 resize() 行為一致
  }
  buf.ctx.setTransform(outputCtx.getTransform());
  return buf.ctx;
}

// transparent=true 時以去背模式繪製（拖尾用 destination-out 淡出而非疊黑）
// atTime 有給值時（匯出用）：直接用「幀索引/幀率」精確設定時間，不用累加 dt，完全沒有浮點誤差累積
// centerOffsetX：即時預覽在面板開啟時，把畫面圓心往右偏移避開面板；匯出時永遠是 0（維持正中央）
function renderFrame(outputCtx, W, H, dt, transparent, atTime, centerOffsetX = 0) {
  if (W <= 0 || H <= 0) return; // 畫布尚未有尺寸（例如分頁在背景 innerWidth=0）時直接跳過，避免對 0×0 畫布操作
  const ctx = getTrailBuffer(outputCtx); // 以下所有 ctx.xxx 都畫在持久緩衝區上，星辰除外（見函式尾端）
  noiseT = atTime !== undefined ? atTime : noiseT + dt;

  // 循環相位：每經過 loopSec 秒精確繞完一圈 2π，之後所有雜訊都用它的整數倍當引數 → 無縫循環
  const LOOP_SEC = Math.max(0.5, Q.loopSec || 5);
  const loopPhase = (noiseT / LOOP_SEC) * TWO_PI;
  const lst = coef => loopSeedTerm(LOOP_SEC, loopPhase, coef); // CASE2 用（嵌入 pn 的 seed 引數）
  const ltN = coef => loopN(LOOP_SEC, coef);                    // CASE1/3 用（直接當 t/角度引數）

  const cx = W / 2 + centerOffsetX, cy = H / 2;
  const minDim = Math.min(W, H);
  const R = Q.radius * minDim;
  const dir = Q.ccw ? -1 : 1;

  // 轉速對齊循環：四捨五入成整數圈，確保旋轉在循環邊界完全銜接（無縫循環的必要條件）。
  // 轉速 > 0 時至少 1 圈，避免「短循環 × 慢轉速」被四捨五入成 0 圈而完全靜止
  const turnsPerLoop = Q.speed > 0 ? Math.max(1, Math.round(Q.speed * LOOP_SEC)) : 0;
  // 速度脈動：以角度擺盪（而非速度累加）表示，在整數圈內平均為 0，不影響每循環的總圈數，
  // 且是 loopPhase 的封閉式函數 → 天生無縫，不需要逐幀累加
  const pulseWobble = Q.pulse > 0 ? Q.pulse * 0.5 * pn(loopPhase * ltN(1.5), 1, 0) : 0;
  // 任何「旋轉的倍率」（各環自轉速度差異、煙霧/太陽紋理跟轉、白熱亮點公轉）都要各自對齊整數圈，
  // 否則個別倍率非整數時，該元素在循環邊界會轉到不同角度，看起來就是接縫跳動
  const ringAngle = mult => {
    const turns = Math.round(turnsPerLoop * mult);
    return loopPhase * dir * turns + dir * pulseWobble * turns;
  };

  // 整體閃爍
  const flick = 1 + Q.flicker * 0.35 * pn(loopPhase * ltN(13.7), 1, 0);

  /* --- 拖尾：trail 越高殘影越長；去背模式用 destination-out 淡出 --- */
  ctx.globalCompositeOperation = transparent ? 'destination-out' : 'source-over';
  ctx.fillStyle = `rgba(0,0,0,${1 - Q.trail})`;
  ctx.fillRect(0, 0, W, H);

  ctx.globalCompositeOperation = 'lighter';

  /* --- 外圈柔光暈 --- */
  if (Q.glow > 0.01) {
    const g = ctx.createRadialGradient(cx, cy, R * 0.55, cx, cy, R * 1.5);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(0.45, `hsla(${Q.hue},${Q.sat}%,50%,${0.10 * Q.glow * flick})`);
    g.addColorStop(0.62, `hsla(${Q.hue},${Q.sat}%,45%,${0.05 * Q.glow * flick})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(cx - R * 1.6, cy - R * 1.6, R * 3.2, R * 3.2);
  }

  /* --- 流體煙霧：環外圍漂流的墨霧（畫在最底層，讓主環蓋在上面）--- */
  if (Q.smoke > 0.005) {
    smokeTick++;
    if (smokeTick % 2 === 1) drawSmokeTexture(ringAngle(0.35), loopPhase); // 隔幀重算（煙霧流動慢，看不出差異）
    const sext = R * SMOKE_EXT;
    ctx.drawImage(smokeCanvas, cx - sext, cy - sext, sext * 2, sext * 2);
  }

  /* --- 太陽米粒組織：翻騰的對流層貼在環的外層表面 --- */
  if (Q.granule > 0.005) {
    drawSunTexture(ringAngle(0.6), loopPhase);
    const ext = R * SUN_EXT;
    ctx.drawImage(sunCanvas, cx - ext, cy - ext, ext * 2, ext * 2);
  }

  /* --- 能量脈衝波：從核心向外擴散的柔邊圓形波紋（畫在環的下層）---
     waveCount 顆波以等間隔相位錯開，同時獨立擴散 → 畫面上真的會同時看到 N 圈，
     不是同一顆波更頻繁重播。每顆波的進度仍是 loopPhase 的封閉式函數 → 天生無縫循環。
     畫在拖尾緩衝區上，殘影會自然留下一點「波過去了」的餘韻。 --- */
  if (Q.waveAmount > 0.005) {
    const wc = Math.max(1, Math.round(Q.waveCount));
    const rStart = R * 0.22;
    const rEnd = R * (1 + Q.waveReach);
    // 速度：把「每秒幾次擴散-淡出」對齊成每循環整數次，跟轉速對齊循環的做法（turnsPerLoop）同理，
    // 確保循環邊界精確銜接，不會在接縫處看到波紋位置跳動
    const waveTurns = Math.max(1, Math.round(Q.waveSpeed * LOOP_SEC));
    const basePhase = ((loopPhase / TWO_PI) * waveTurns) % 1; // 0..1
    for (let wi = 0; wi < wc; wi++) {
      const prog0 = (basePhase + wi / wc) % 1; // 每顆波錯開 1/wc 個循環起跑
      // 進度用 ease-out：出生時衝很快、遠處減速淡出（爆發感）
      const eased = 1 - Math.pow(1 - prog0, 2.2);
      const wr = rStart + (rEnd - rStart) * eased;
      // 淡入極快、隨距離淡出；乘 flick 跟全域閃爍同步
      const aIn = Math.min(1, prog0 * 12);
      const wAlpha = Q.waveAmount * 0.55 * Q.waveBrightness * aIn * Math.pow(1 - prog0, 1.6) * flick;
      if (wAlpha <= 0.01) continue;
      const band = R * 0.05 * Q.waveWidth * (0.6 + eased * 1.4); // 波環越遠越寬、越淡
      const g = ctx.createRadialGradient(cx, cy, Math.max(0, wr - band), cx, cy, wr + band);
      g.addColorStop(0, 'rgba(0,0,0,0)');
      g.addColorStop(0.45, `hsla(${Q.hue},${Q.sat}%,60%,${wAlpha * 0.5})`);
      g.addColorStop(0.55, `hsla(${Q.hue},${Math.max(0, Q.sat - 30)}%,85%,${wAlpha})`);
      g.addColorStop(0.65, `hsla(${Q.hue},${Q.sat}%,55%,${wAlpha * 0.4})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      const ext = wr + band;
      ctx.fillRect(cx - ext, cy - ext, ext * 2, ext * 2);
    }
  }

  /* --- 多層旋轉光弧（多絲線 + 細節毛絲 + 裂紋斷點） --- */
  const SEGS = 220;
  const segA = (Math.PI * 2) / SEGS;
  ctx.lineCap = 'round';
  const jitterAmp = Q.fray * R * 0.022;

  for (let ri = 0; ri < Q.ringCount; ri++) {
    const s = RING_SEEDS[ri];
    const rr = R + (ri - (Q.ringCount - 1) / 2) * Q.ringGap + s.radiusJitter * 3;
    const ringRot = ringAngle(s.speedMul);

    // 顏色沿著環的角度變化，跟亮度共用同一條曲線：亮部（跟白熱亮核同源）偏向副色相，暗部維持主色相，
    // 呼應參考圖那種「同一條線本身沿途變色」而非整條線固定一色的效果。
    // 用 conic gradient 一次性做完整圈的顏色分佈（起始角對齊 ringRot，天生跟著環旋轉且無縫循環），
    // 不用像亮度/寬度那樣逐段（220 個點）計算，效能開銷幾乎跟原本的單色 fillStyle 一樣。
    const colorBrightnessAt = (t, freq, fSeed) => {
      let bf = 0.5 + 0.5 * Math.sin(t * freq + fSeed);
      bf = Math.pow(Math.max(0, bf), 1.6);
      bf *= 0.55 + 0.45 * pn(t, 3, fSeed * 2 + lst(0.6));
      return Math.max(0, Math.min(1, bf));
    };
    const HUE_GRAD_STOPS = 32;
    const makeHueGradient = (freq, fSeed, hueOffset, styleFn) => {
      const grad = ctx.createConicGradient(ringRot, cx, cy);
      for (let i = 0; i <= HUE_GRAD_STOPS; i++) {
        const frac = i / HUE_GRAD_STOPS;
        const bf = colorBrightnessAt(frac * Math.PI * 2, freq, fSeed);
        const hue = (Q.hue + bf * Q.hueShift + hueOffset + 360) % 360;
        grad.addColorStop(frac, styleFn(hue));
      }
      return grad;
    };

    // 低頻形變：讓環不是正圓，微微歪扭（noise texture 感）
    // 以 t（環座標）索引 → 形變跟著環一起旋轉；循環相位讓形狀緩慢演化且首尾無縫
    const warpAmp = Q.warp * R * 0.045;
    const wSeed = s.phase * 5.3 + ri * 7.1;
    const warpFn = t =>
      warpAmp * (
        pn(t, 2, wSeed + lst(0.18)) * 0.6 +
        pn(t, 5, -wSeed * 1.4 + lst(0.12)) * 0.4
      );

    // 整環柔光暈：一次性 shadowBlur，取代逐段外光暈，效能較佳（沿形變路徑）
    if (Q.glow > 0.01) {
      ctx.save();
      ctx.shadowColor = `hsla(${Q.hue},${Q.sat}%,50%,0.9)`;
      ctx.shadowBlur = Q.thickness * 3.2 * Q.glow;
      ctx.strokeStyle = makeHueGradient(s.freq, s.phase * 3.7, 0,
        hue => `hsla(${hue},${Q.sat}%,50%,${0.16 * Q.glow * flick})`);
      ctx.lineWidth = Q.thickness * 1.6;
      ctx.beginPath();
      const GSEGS = 72;
      for (let i = 0; i <= GSEGS; i++) {
        const t = i * (Math.PI * 2 / GSEGS);
        const gr = rr + warpFn(t);
        const a = t + ringRot;
        const gx = cx + Math.cos(a) * gr, gy = cy + Math.sin(a) * gr;
        i === 0 ? ctx.moveTo(gx, gy) : ctx.lineTo(gx, gy);
      }
      ctx.closePath(); ctx.stroke();
      ctx.restore();
    }

    const fCount = Q.filaments;
    for (let k = 0; k < fCount; k++) {
      const fSeed = s.phase * 3.7 + k * 11.3;
      const fSpread = fCount > 1 ? (k / (fCount - 1) - 0.5) : 0; // -0.5..0.5
      const strandBase = rr + fSpread * Q.thickness * 1.3;
      const freq = s.freq + (k % 3);
      const hueOffset = fSpread * 10;

      // 先算出整條絲線的路徑點與每點半寬 → 再填成連續變寬絲帶（避免逐段圓頭造成珠珠感）
      const pts = new Array(SEGS + 1);
      const wBase = Q.thickness * (0.85 / Math.max(1, Math.sqrt(fCount)));
      for (let i = 0; i <= SEGS; i++) {
        const t = i * segA;
        const a0 = t + ringRot;

        // 沿圓周的亮度分佈：波瓣 + 雜訊 → 不均勻的流光
        let b = 0.5 + 0.5 * Math.sin(t * freq + fSeed);
        b = Math.pow(Math.max(0, b), 1.6);
        b *= 0.55 + 0.45 * pn(t, 3, fSeed * 2 + lst(0.6));
        b = Math.max(0, b) * flick;
        b = b * Q.wobble + (1 - Q.wobble) * 0.65 * flick; // wobble=0 → 均勻圓環

        // 裂紋斷點：把寬度掐到近乎 0，形成細小暗縫
        if (Q.crackle > 0.01) {
          let gap = 0.5 + 0.5 * pn(t, 42, fSeed * 5 + lst(0.15));
          gap = Math.pow(Math.max(0, gap), 4);
          b *= (1 - Q.crackle) + Q.crackle * gap;
        }

        // 細節毛絲：徑向微抖動，讓路徑不是完美圓，模擬手繪流線
        const jitter = jitterAmp * (
          pn(t, 26, fSeed * 4.1 + lst(0.5)) * 0.7 +
          pn(t, 61, fSeed * 7.7 - lst(0.3)) * 0.3
        );
        // 每條絲線對整環形變的跟隨程度略不同 → 絲線間會微微分岔再合攏
        const rj = strandBase + warpFn(t) * (0.85 + fSpread * 0.5) + jitter;

        // 粗細變化：低頻雜訊沿環調變寬度，同一環有粗有細（筆觸壓力感）。
        // widthVar=1 時最細處逼近 0（幾乎看不見線），最粗處變 2 倍，差距拉到最大
        const wn = 1 + Q.widthVar * 0.98 * pn(t, 3, fSeed * 2.9 + lst(0.25));
        const hw = wBase * (0.5 + b * 0.9) * Math.max(0, wn) * 0.95;

        pts[i] = { cos: Math.cos(a0), sin: Math.sin(a0), r: rj, hw: Math.max(0.01, hw) };
      }

      // 絲帶填色：外緣順走 + 內緣倒走圍成封閉多邊形 → 寬度連續平滑無接縫
      const ribbon = scale => {
        ctx.beginPath();
        for (let i = 0; i <= SEGS; i++) {
          const p = pts[i], r2 = p.r + p.hw * scale;
          const x = cx + p.cos * r2, y = cy + p.sin * r2;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        for (let i = SEGS; i >= 0; i--) {
          const p = pts[i], r2 = p.r - p.hw * scale;
          ctx.lineTo(cx + p.cos * r2, cy + p.sin * r2);
        }
        ctx.closePath();
        ctx.fill();
      };

      // 同一條絲帶畫三層：外圈微光 → 主體 → 白熱核心，三層都套用同一條沿角度變化的色彩漸層
      ctx.fillStyle = makeHueGradient(freq, fSeed, hueOffset,
        hue => `hsla(${hue},${Q.sat}%,50%,${0.22 * flick})`);
      ribbon(1.9);
      ctx.fillStyle = makeHueGradient(freq, fSeed, hueOffset,
        hue => `hsla(${hue},${Q.sat}%,58%,${0.5 * flick})`);
      ribbon(1.0);
      ctx.fillStyle = makeHueGradient(freq, fSeed, hueOffset,
        hue => `hsla(${hue},${Math.max(0, Q.sat - 45)}%,92%,${0.55 * flick})`);
      ribbon(0.32);
    }
  }

  /* --- 白熱亮點（沿環移動的過曝高光）：全部共用同一個轉速基準，只用角度均分區分彼此，
     確保任何時刻都精確等距（2 顆永遠對角、3 顆永遠 120° 等分），不會各自飄移而散開。
     高光本體改成沿著環的真實弧線取樣多個小光斑疊起來（而不是單一壓扁橢圓），
     這樣尺寸開很大時形狀會跟著環的弧度彎曲，不會變成一條戳出去的直線切線。 --- */
  const hotspotRot = ringAngle(1);
  const HOTSPOT_SUB = 10; // 弧形高光的取樣點數，越多過渡越平滑
  for (let h = 0; h < Q.hotspots; h++) {
    const a = hotspotRot + h * (Math.PI * 2 / Math.max(1, Q.hotspots));
    const rr = R + (h % Math.max(1, Q.ringCount) - (Q.ringCount - 1) / 2) * Q.ringGap;
    const len = R * 0.35 * Q.hotspotSize; // 高光沿弧長方向的總長度
    const angHalfWidth = Math.min(Math.PI * 0.8, len / rr); // 弧長換算成半張角，避免包裹超過半圈

    for (let si = 0; si <= HOTSPOT_SUB; si++) {
      const off = (si / HOTSPOT_SUB) * 2 - 1; // -1..1
      const sa = a + off * angHalfWidth;
      const sx = cx + Math.cos(sa) * rr, sy = cy + Math.sin(sa) * rr;
      const fall = Math.exp(-(off * off) * 2.2); // 中心最亮、往兩端淡出
      if (fall < 0.02) continue;
      const subLen = Math.max(1, len * 0.5);
      const sTa = sa + Math.PI / 2 * (Q.ccw ? -1 : 1); // 這一點自己的切線方向，讓壓扁跟著弧度轉

      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, subLen);
      grad.addColorStop(0, `hsla(${Q.hue},30%,97%,${0.75 * flick * fall})`);
      grad.addColorStop(0.25, `hsla(${Q.hue},${Q.sat}%,70%,${0.4 * flick * fall})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(sTa);
      ctx.scale(1, 0.3); // 沿當地切線方向壓扁，垂直於弧線的方向收窄
      ctx.rotate(-sTa);
      ctx.translate(-sx, -sy);
      ctx.fillStyle = grad;
      ctx.fillRect(sx - subLen, sy - subLen, subLen * 2, subLen * 2);
      ctx.restore();
    }
  }

  /* --- 星辰：固定不消散、散布在環外側、跟著環轉的粒子層（與電漿火花是獨立系統）---
     畫在獨立畫布上、每幀清空重畫。這裡只準備好這一幀的星辰圖案，實際疊到畫面上是在
     函式最尾端直接畫在「輸出畫布」上，完全繞過持久緩衝區的拖尾 —— 之前只是把星辰畫在
     獨立畫布上還不夠，因為最後仍是疊回會拖尾的那張畫布，舊星星還是會被拖尾疊加殘留
     （使用者回報的匯出殘影就是這個原因）；現在星辰從架構上就不會進入拖尾緩衝區。*/
  if (Q.starCount > 0) {
    // 用跟輸出畫布相同的實際像素尺寸與縮放矩陣（含 DPR），避免疊上去時被二次縮放而模糊
    if (starCanvas.width !== outputCtx.canvas.width || starCanvas.height !== outputCtx.canvas.height) {
      starCanvas.width = outputCtx.canvas.width; starCanvas.height = outputCtx.canvas.height;
    }
    starCtx.setTransform(outputCtx.getTransform());
    starCtx.clearRect(0, 0, W, H);
    starCtx.globalCompositeOperation = 'lighter';

    const stars = getStarPool(Math.round(Q.starCount));
    const starTurns = Q.starSpeed > 0 ? Math.max(1, Math.round(Q.starSpeed * LOOP_SEC)) : 0;
    const starRot = loopPhase * dir * starTurns;
    // 清晰度：0 = 柔和瀰漫的光暈點；1 = 邊緣分明的銳利小光點
    const haloMul = 1.2 + (1 - Q.starSharpness) * 4.8;
    const coreStop = Math.min(0.92, 0.15 + Q.starSharpness * 0.55);
    const minSz = Math.min(Q.starMinSize, Q.starMaxSize);
    const maxSz = Math.max(Q.starMinSize, Q.starMaxSize);

    for (let i = 0; i < stars.length; i++) {
      const st = stars[i];
      const a = st.angle0 + starRot;
      const sr = R * (1 + Q.starSpread * st.radiusFactor);
      const x = cx + Math.cos(a) * sr, y = cy + Math.sin(a) * sr;
      const size = minSz + (maxSz - minSz) * st.sizeT;
      const alpha = st.briT * flick;
      if (alpha <= 0.01 || size <= 0.02) continue;
      const rad = size * haloMul;
      const g = starCtx.createRadialGradient(x, y, 0, x, y, rad);
      g.addColorStop(0, `hsla(${Q.hue},${Math.max(0, Q.sat - 20)}%,92%,${alpha})`);
      g.addColorStop(coreStop, `hsla(${Q.hue},${Q.sat}%,65%,${alpha * 0.7})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      starCtx.fillStyle = g;
      starCtx.fillRect(x - rad, y - rad, rad * 2, rad * 2);
    }
    // 注意：這裡刻意不疊回 ctx（拖尾緩衝區），星辰圖案先留在 starCanvas 裡，
    // 等函式最尾端把緩衝區貼到輸出畫布之後，再直接畫在輸出畫布上（見函式最後）
  }

  /* --- 電漿火花（確定性排程：年齡取模循環，位置由封閉式公式算出）--- */
  if (Q.sparkAmount > 0.005) {
    const pool = getSparkPool(LOOP_SEC);
    const activeCount = Math.round(Q.sparkAmount * SPARK_MAX_RATE * LOOP_SEC);
    const tLoop = ((noiseT % LOOP_SEC) + LOOP_SEC) % LOOP_SEC;
    const arcRad = (Q.sparkArc * Math.PI / 180);
    const turb = Q.turbulence * 60;
    // 火花羽流有獨立轉速（與環的轉速脫鉤），同樣貼齊整數圈以維持無縫循環
    const sparkTurns = Q.sparkSpeed > 0 ? Math.max(1, Math.round(Q.sparkSpeed * LOOP_SEC)) : 0;

    for (let i = 0; i < activeCount && i < pool.length; i++) {
      const sp = pool[i];
      const age = ((tLoop - sp.birth) % LOOP_SEC + LOOP_SEC) % LOOP_SEC;
      if (age > sp.maxLife) continue;
      const lt = age / sp.maxLife;

      // 出生角：出生時刻的羽流旋轉角（每循環轉整數圈 → 模 2π 後每一循環都相同）+ 扇區內抖動
      const birthRot = dir * sparkTurns * TWO_PI * (sp.birth / LOOP_SEC);
      const a = birthRot + Math.PI * 0.15 + sp.angJitter * arcRad;
      const cosA = Math.cos(a), sinA = Math.sin(a);

      // 封閉式位置：起點(環上) + 徑向等速漂移 + 切線等加速(0.5·k·age²) + 紊流擾動(年齡驅動、可循環)
      const drift = sp.speed0 * Q.sparkReach * sp.velScale * age;
      const tanDisp = sp.tangent * 0.05 * age * age;
      const turbX = pn(age * 2.4, 1, sp.seed) * turb * age * 0.5;
      const turbY = pn(age * 2.1, 1, sp.seed * 1.7) * turb * age * 0.5;
      const x = cx + cosA * (R + drift) - sinA * tanDisp + turbX;
      const y = cy + sinA * (R + drift) + cosA * tanDisp + turbY;

      const alpha = (1 - lt) * (0.5 + 0.5 * pn(age * 8, 1, sp.seed)) * flick;
      if (alpha <= 0.02) continue;
      const size = sp.size * (1 + lt * 2.5) * Q.sparkReach;
      const g = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
      g.addColorStop(0, `hsla(${Q.hue},${Q.sat}%,85%,${alpha * 0.5})`);
      g.addColorStop(0.35, `hsla(${Q.hue},${Q.sat}%,55%,${alpha * 0.3})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(x - size * 3, y - size * 3, size * 6, size * 6);
    }
  }

  /* --- 環間電弧：相鄰兩環之間閃現的鋸齒閃電（確定性排程，無縫循環）---
     路徑端點釘在兩個環的半徑上，中段用亂數中點位移出鋸齒；亂數種子含 floor(age×45)，
     所以同一道電弧在短短的生命期內會頻閃換形好幾次 —— 閃電的抖動感。 --- */
  if (Q.arcAmount > 0.005) {
    const pool = getArcPool(LOOP_SEC);
    const activeArcs = Math.round(Q.arcAmount * ARC_MAX_RATE * LOOP_SEC);
    const tLoop = ((noiseT % LOOP_SEC) + LOOP_SEC) % LOOP_SEC;
    const arcRot = ringAngle(1); // 電弧的出生角跟著主環旋轉
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    const NSEG = 16;
    for (let i = 0; i < activeArcs && i < pool.length; i++) {
      const arc = pool[i];
      const age = ((tLoop - arc.birth) % LOOP_SEC + LOOP_SEC) % LOOP_SEC;
      if (age > arc.maxLife) continue;
      const lt = age / arc.maxLife;

      // 端點所在的兩個環：從池子的 0..1 值映射到目前環數，取相鄰一對；單環時往外跳一小段
      const nRings = Math.max(1, Math.round(Q.ringCount));
      const ringRadius = ri => R + (ri - (nRings - 1) / 2) * Q.ringGap;
      let r1, r2;
      if (nRings > 1) {
        const riA = Math.min(nRings - 2, Math.floor(arc.ringA * (nRings - 1)));
        r1 = ringRadius(riA); r2 = ringRadius(riA + 1);
      } else {
        r1 = R; r2 = R + (arc.ringB > 0.5 ? 1 : -1) * R * 0.12;
      }
      // 環距太小時電弧會扁到看不見 → 保底一個最小徑向落差
      if (Math.abs(r2 - r1) < R * 0.05) r2 = r1 + Math.sign(r2 - r1 || 1) * R * 0.05;

      const span = arc.spanT * Q.arcSpan * 1.1; // 角度跨幅（弧度）
      const a0 = arc.angle0 + arcRot;
      // 亮度包絡：快進快出 + 頻閃（種子隨 floor(age×45) 重擲 → 生命期內閃爍換形）
      const strobe = Math.floor(age * 45);
      const rnd = mulberry32(arc.seed + strobe * 131);
      const env = Math.pow(Math.sin(Math.PI * Math.min(1, lt)), 0.5);
      const alpha = env * (0.55 + rnd() * 0.45) * flick;
      if (alpha < 0.03) continue;

      // 鋸齒路徑：角度線性走完跨幅，半徑從 r1 走到 r2，徑向抖動兩端釘死、中段最大
      const jagAmp = Q.arcJag * (Math.abs(r2 - r1) * 0.9 + R * 0.03);
      let path = new Array(NSEG + 1);
      for (let sIdx = 0; sIdx <= NSEG; sIdx++) {
        const t = sIdx / NSEG;
        const ang = a0 + span * (t - 0.5);
        const pin = Math.sin(Math.PI * t); // 端點釘死
        const rj = r1 + (r2 - r1) * t + (rnd() - 0.5) * 2 * jagAmp * pin;
        path[sIdx] = [cx + Math.cos(ang) * rj, cy + Math.sin(ang) * rj];
      }
      const trace = () => {
        ctx.beginPath();
        ctx.moveTo(path[0][0], path[0][1]);
        for (let sIdx = 1; sIdx <= NSEG; sIdx++) ctx.lineTo(path[sIdx][0], path[sIdx][1]);
        ctx.stroke();
      };
      // 外層光暈 → 白熱核心，兩筆
      ctx.strokeStyle = `hsla(${Q.hue},${Q.sat}%,65%,${alpha * 0.3})`;
      ctx.lineWidth = Q.arcThickness * 4.5;
      trace();
      ctx.strokeStyle = `hsla(${Q.hue},${Math.max(0, Q.sat - 55)}%,95%,${alpha})`;
      ctx.lineWidth = Q.arcThickness * 1.3;
      trace();
      // 兩端接觸點的小閃光
      for (const [ex, ey] of [path[0], path[NSEG]]) {
        const fr = Q.arcThickness * 7;
        const g = ctx.createRadialGradient(ex, ey, 0, ex, ey, fr);
        g.addColorStop(0, `hsla(${Q.hue},30%,97%,${alpha * 0.8})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(ex - fr, ey - fr, fr * 2, fr * 2);
      }
    }
  }

  // 把拖尾緩衝區（環、火花、煙霧、太陽米粒等會拖尾流動的內容）貼到真正的輸出畫布上；
  // 星辰在這之後才畫，直接畫在輸出畫布上、完全不進入緩衝區，所以永遠不會被拖尾疊加殘影。
  // 注意：貼圖要用 1:1 實際像素（歸零變形矩陣），貼完務必還原成原本的 DPR 縮放矩陣，
  // 否則下一幀開始所有座標都會少縮放一次 DPR，環會越畫越小、拖尾也只淡到畫布左上角一小塊
  // （這正是稍早發現的「兩個環+黑色矩形接縫」那個 bug 的成因）。
  const outputTransform = outputCtx.getTransform();
  outputCtx.setTransform(1, 0, 0, 1, 0, 0);
  outputCtx.globalCompositeOperation = 'source-over';
  outputCtx.clearRect(0, 0, outputCtx.canvas.width, outputCtx.canvas.height);
  outputCtx.drawImage(ctx.canvas, 0, 0);

  // 放射光芒：先在獨立緩衝畫銳利的錐形光束，再整層模糊 → 柔邊 god-ray 質感。
  // 跟星辰一樣不進拖尾緩衝區，直接疊在輸出畫布上（旋轉時才不會被拖尾抹成一圈糊光）。
  if (Q.spikeAmount > 0.005) {
    if (spikeCanvas.width !== outputCtx.canvas.width || spikeCanvas.height !== outputCtx.canvas.height) {
      spikeCanvas.width = outputCtx.canvas.width; spikeCanvas.height = outputCtx.canvas.height;
    }
    spikeCtx.setTransform(outputTransform);
    spikeCtx.clearRect(0, 0, W, H);
    spikeCtx.globalCompositeOperation = 'lighter';
    const activeSpikes = Math.round(Q.spikeAmount * SPIKE_POOL_MAX);
    const spikeRot = ringAngle(1); // 跟主環同步旋轉
    for (let i = 0; i < activeSpikes; i++) {
      const sp = SPIKE_POOL[i];
      const a = sp.angle0 + spikeRot;
      const cosA = Math.cos(a), sinA = Math.sin(a);
      const tanX = -sinA, tanY = cosA; // 切線方向（錐形基部沿此展開）
      // 基部緊貼環面（帶微偏），往外放射；長度非線性分布，有長有短
      const rBase = R + sp.baseJitter * Q.thickness * 1.5;
      const outLen = R * (0.04 + Q.spikeLength * (0.12 + 0.9 * sp.lenT));
      const rTip = rBase + outLen;
      const halfW = Q.spikeWidth * (0.5 + 0.8 * sp.widT);
      const bx = cx + cosA * rBase, by = cy + sinA * rBase;
      const tx = cx + cosA * rTip, ty = cy + sinA * rTip;
      const alpha = sp.briT * flick;
      const grad = spikeCtx.createLinearGradient(bx, by, tx, ty);
      grad.addColorStop(0, `hsla(${Q.hue},${Q.sat}%,88%,${alpha})`);   // 基部最亮
      grad.addColorStop(0.35, `hsla(${Q.hue},${Q.sat}%,72%,${alpha * 0.5})`);
      grad.addColorStop(1, `hsla(${Q.hue},${Q.sat}%,65%,0)`);          // 尖端淡出
      spikeCtx.fillStyle = grad;
      // 錐形：基部寬、尖端收成一點
      spikeCtx.beginPath();
      spikeCtx.moveTo(bx - tanX * halfW, by - tanY * halfW);
      spikeCtx.lineTo(bx + tanX * halfW, by + tanY * halfW);
      spikeCtx.lineTo(tx, ty);
      spikeCtx.closePath();
      spikeCtx.fill();
    }
    // 整層模糊做出柔邊；柔邊=0 時完全銳利，往上調越糊越像光暈。
    // 用實際畫布縮放（outputTransform.a）換算成物理像素，讓即時預覽與匯出的模糊比例一致
    const pxScale = outputTransform.a || 1;
    const blurPx = Q.spikeBlur * Math.min(W, H) * 0.012 * pxScale;
    outputCtx.globalCompositeOperation = 'lighter';
    outputCtx.filter = blurPx > 0.3 ? `blur(${blurPx}px)` : 'none';
    outputCtx.drawImage(spikeCanvas, 0, 0);
    outputCtx.filter = 'none';
  }

  if (Q.starCount > 0) {
    outputCtx.globalCompositeOperation = 'lighter';
    outputCtx.drawImage(starCanvas, 0, 0);
  }
  outputCtx.setTransform(outputTransform);
}
requestAnimationFrame(frame);

/* ===== PNG 序列輸出（去背）+ 極簡 ZIP（store 無壓縮）===== */
const CRC_TABLE = new Uint32Array(256).map((_, n) => {
  let c = n;
  for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
  return c;
});
function crc32(u8) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < u8.length; i++) c = CRC_TABLE[(c ^ u8[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
function makeZip(files) {
  const enc = new TextEncoder();
  let offset = 0;
  const chunks = [], central = [];
  for (const f of files) {
    const name = enc.encode(f.name), crc = crc32(f.data), sz = f.data.length;
    const lh = new DataView(new ArrayBuffer(30));
    lh.setUint32(0, 0x04034b50, true);
    lh.setUint16(4, 20, true);
    lh.setUint32(14, crc, true);
    lh.setUint32(18, sz, true); lh.setUint32(22, sz, true);
    lh.setUint16(26, name.length, true);
    chunks.push(new Uint8Array(lh.buffer), name, f.data);
    const cd = new DataView(new ArrayBuffer(46));
    cd.setUint32(0, 0x02014b50, true);
    cd.setUint16(4, 20, true); cd.setUint16(6, 20, true);
    cd.setUint32(16, crc, true);
    cd.setUint32(20, sz, true); cd.setUint32(24, sz, true);
    cd.setUint16(28, name.length, true);
    cd.setUint32(42, offset, true);
    central.push(new Uint8Array(cd.buffer), name);
    offset += 30 + name.length + sz;
  }
  const cdSize = central.reduce((s, c) => s + c.length, 0);
  const end = new DataView(new ArrayBuffer(22));
  end.setUint32(0, 0x06054b50, true);
  end.setUint16(8, files.length, true); end.setUint16(10, files.length, true);
  end.setUint32(12, cdSize, true); end.setUint32(16, offset, true);
  return new Blob([...chunks, ...central, new Uint8Array(end.buffer)], { type: 'application/zip' });
}

/* 尺寸欄位：🔗 開啟時鎖定長寬比連動（Photoshop 式） */
const expWEl = document.getElementById('expW'), expHEl = document.getElementById('expH');
const linkBtn = document.getElementById('linkBtn');
let linkOn = true, linkRatio = 1;
linkBtn.addEventListener('click', () => {
  linkOn = !linkOn;
  linkBtn.classList.toggle('off', !linkOn);
  if (linkOn) linkRatio = (parseFloat(expWEl.value) || 1) / (parseFloat(expHEl.value) || 1);
});
expWEl.addEventListener('input', () => {
  const w = parseFloat(expWEl.value);
  if (linkOn && w > 0) expHEl.value = Math.max(16, Math.round(w / linkRatio));
});
expHEl.addEventListener('input', () => {
  const h = parseFloat(expHEl.value);
  if (linkOn && h > 0) expWEl.value = Math.max(16, Math.round(h * linkRatio));
});

document.getElementById('syncLoopBtn').addEventListener('click', () => {
  document.getElementById('exportSec').value = P.loopSec.toFixed(1);
});

document.getElementById('exportBtn').addEventListener('click', async () => {
  if (exporting) return;
  const btn = document.getElementById('exportBtn');
  const status = document.getElementById('exportStatus');
  exporting = true;
  btn.disabled = true;
  try {
    const fps = Math.max(1, Math.round(P.fps || 60));
    // 循環秒數對齊幀數：四捨五入到整數幀，差異通常 <半幀時長，不可察覺，
    // 但能保證「幀數 ÷ fps」剛好等於循環秒數，不會因為除不盡而在接縫處留下極小的跳動
    const framesPerLoop = Math.max(1, Math.round((P.loopSec || 5) * fps));
    const correctedLoopSec = framesPerLoop / fps;
    // 輸出秒數可以是循環秒數的整數倍（例如想要 3 個循環接在一起），四捨五入取最接近的整數倍
    const loopsRequested = Math.max(1, Math.round((P.exportSec || P.loopSec || 5) / (P.loopSec || 5)));
    const total = framesPerLoop * loopsRequested;
    const ew = Math.min(4096, Math.max(16, Math.round(parseFloat(expWEl.value) || 1080)));
    const eh = Math.min(4096, Math.max(16, Math.round(parseFloat(expHEl.value) || 1080)));

    // 匯出快照：把當下所有參數複製一份給 Q 讀取，跟使用者接下來在面板上的操作完全隔離，
    // 匯出途中調整滑桿只會改到 P，不會污染正在進行中的這次匯出
    const snapshot = { ...P, loopSec: correctedLoopSec };
    Q = snapshot;

    const ec = document.createElement('canvas');
    ec.width = ew; ec.height = eh;
    const ectx = ec.getContext('2d');
    const files = [];

    // 暖機：完整渲染「前一個循環」（用負數時間，靠三角函數天生的週期性直接銜接），
    // 而不是渲染任意 N 幀再假設拖尾已經穩定 —— 這樣暖機後的狀態保證跟無限循環播放時完全一致
    for (let i = -framesPerLoop; i < 0; i++) {
      renderFrame(ectx, ew, eh, 1 / fps, true, i / fps);
    }
    for (let i = 0; i < total; i++) {
      renderFrame(ectx, ew, eh, 1 / fps, true, i / fps);
      const blob = await new Promise(r => ec.toBlob(r, 'image/png'));
      files.push({ name: `frame_${String(i).padStart(4, '0')}.png`, data: new Uint8Array(await blob.arrayBuffer()) });
      status.textContent = `輸出中… ${i + 1}/${total}`;
      if (i % 5 === 0) await new Promise(r => setTimeout(r)); // 讓 UI 有機會更新
    }
    const url = URL.createObjectURL(makeZip(files));
    const a = document.createElement('a');
    a.href = url;
    a.download = `energy-ring_${ew}x${eh}_${fps}fps_${total}f.zip`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    status.textContent = `完成：${total} 張去背 PNG（${ew}×${eh}，${loopsRequested} 個循環）`;
  } catch (e) {
    status.textContent = '輸出失敗：' + e.message;
  } finally {
    Q = P; // 還原即時預覽讀取的來源
    btn.disabled = false;
    exporting = false;
    last = performance.now(); // 避免恢復播放時 dt 暴衝
  }
});
</script>

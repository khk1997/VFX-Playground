<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole VFX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "SF Pro", "PingFang TC", "Microsoft JhengHei", sans-serif; }
  #stage { position: absolute; inset: 0; display: block; cursor: grab; }
  #stage.dragging { cursor: grabbing; }

  /* ===== 控制面板：左側縱向抽屜（沿用 energy-ring 樣式，改為吸積盤的暖橙色調）===== */
  #panel {
    position: fixed; left: 12px; top: 64px; bottom: 12px; width: 340px;
    overflow-y: auto;
    background: rgba(16, 12, 8, 0.86); backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 170, 60, 0.25); border-radius: 12px;
    color: #e8dccf; padding: 14px 16px 18px; z-index: 10;
    box-shadow: 4px 0 30px rgba(0,0,0,0.6);
    transition: transform .25s ease, opacity .25s ease;
  }
  #panel.collapsed { transform: translateX(calc(-100% - 24px)); opacity: 0; pointer-events: none; }
  #panel::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-thumb { background: rgba(255,170,60,.3); border-radius: 3px; }

  #toggleBtn {
    position: fixed; top: 12px; right: 12px; z-index: 11;
    background: rgba(16,12,8,.85); color: #ffb45e;
    border: 1px solid rgba(255,170,60,.35); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
  }
  #toggleBtn:hover { background: rgba(255,170,60,.15); }

  #homeBtn {
    position: fixed; top: 12px; left: 12px; z-index: 11;
    background: rgba(16,12,8,.85); color: #ffb45e; text-decoration: none;
    border: 1px solid rgba(255,170,60,.35); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  #homeBtn:hover { background: rgba(255,170,60,.15); }

  /* ===== 獨立浮動的播放/暫停 —— 隨時可點，不跟著設定面板一起收合 ===== */
  #playCtl {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 11;
    background: rgba(16,12,8,.85); color: #ffd9a0;
    border: 1px solid rgba(255,170,60,.35); border-radius: 999px;
    padding: 8px 20px; cursor: pointer; font-size: 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #playCtl:hover { background: rgba(255,170,60,.18); }

  html.preview-mode #homeBtn,
  html.preview-mode #toggleBtn,
  html.preview-mode #playCtl,
  html.preview-mode #panel { display: none !important; }
  @media (max-width: 760px) {
    #panel { left: 8px; top: 56px; bottom: 8px; width: calc(100vw - 16px); max-width: 340px; }
  }

  #panel h2 { font-size: 14px; letter-spacing: 2px; color: #ffc478; margin-bottom: 4px; font-weight: 600; }
  #panel .sub { font-size: 11px; color: #8f7f6b; margin-bottom: 12px; }
  .groups { display: block; }
  .group { margin-bottom: 8px; border-top: 1px solid rgba(255,170,60,.12); padding-top: 6px; }
  .group h3 { font-size: 11px; color: #d99a4a; letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
  .group .note { font-size: 10px; color: #7e6f5c; margin: -4px 0 8px; line-height: 1.4; }
  .row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; min-width: 0; }
  .row label { flex: 0 0 78px; font-size: 12px; color: #d6c4ab; white-space: nowrap; }
  .row input[type=range] { flex: 1 1 110px; min-width: 60px; accent-color: #e0902e; height: 14px; cursor: pointer; }
  .row .val { flex: 0 0 44px; text-align: right; font-size: 11px; color: #ffc478; font-variant-numeric: tabular-nums; }
  .btns { display: flex; gap: 8px; margin-top: 12px; }
  .btns button {
    flex: 1; background: rgba(255,170,60,.1); color: #ffd9a0;
    border: 1px solid rgba(255,170,60,.3); border-radius: 7px;
    padding: 7px 0; font-size: 12px; cursor: pointer;
  }
  .btns button:hover { background: rgba(255,170,60,.22); }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<a id="homeBtn" href="../index.html">← 首頁</a>

<div id="panel">
  <h2>BLACK HOLE</h2>
  <div class="sub">黑洞 — 吸積盤、重力透鏡與愛因斯坦環</div>

  <div class="groups">
  <div class="group">
    <h3>黑洞 Hole</h3>
    <div class="row"><label>視界半徑</label><input type="range" id="horizonR" min="0.04" max="0.22" step="0.005" value="0.09"><span class="val" id="horizonR_v"></span></div>
    <div class="row"><label>光子環亮度</label><input type="range" id="photonGlow" min="0" max="2" step="0.02" value="1"><span class="val" id="photonGlow_v"></span></div>
    <div class="row"><label>透鏡強度</label><input type="range" id="lens" min="0" max="2" step="0.02" value="1"><span class="val" id="lens_v"></span></div>
  </div>

  <div class="group">
    <h3>吸積盤 Disk</h3>
    <div class="note">粒子沿壓扁的橢圓軌道公轉，靠近側因都卜勒射束效應更亮更藍，遠離側偏暗偏紅；粒子緩慢向內螺旋，越過視界時閃光</div>
    <div class="row"><label>粒子數</label><input type="range" id="diskCount" min="100" max="3000" step="20" value="1600"><span class="val" id="diskCount_v"></span></div>
    <div class="row"><label>傾角</label><input type="range" id="tilt" min="0.05" max="0.9" step="0.01" value="0.22"><span class="val" id="tilt_v"></span></div>
    <div class="row"><label>轉速</label><input type="range" id="diskSpeed" min="0.1" max="3" step="0.05" value="1"><span class="val" id="diskSpeed_v"></span></div>
    <div class="row"><label>內縮速度</label><input type="range" id="inspiral" min="0" max="2" step="0.02" value="0.45"><span class="val" id="inspiral_v"></span></div>
    <div class="row"><label>都卜勒對比</label><input type="range" id="doppler" min="0" max="1" step="0.01" value="0.72"><span class="val" id="doppler_v"></span></div>
  </div>

  <div class="group">
    <h3>星空 Stars</h3>
    <div class="note">背景星空被重力透鏡向外推擠，貼近光子環的星星會被抹成短弧；偶爾有星星被捕獲、拉成麵條後吞噬</div>
    <div class="row"><label>數量</label><input type="range" id="starCount" min="0" max="800" step="10" value="380"><span class="val" id="starCount_v"></span></div>
    <div class="row"><label>透鏡拖影</label><input type="range" id="smear" min="0" max="1" step="0.01" value="0.7"><span class="val" id="smear_v"></span></div>
    <div class="row"><label>捕獲頻率</label><input type="range" id="captureRate" min="0" max="1" step="0.01" value="0.3"><span class="val" id="captureRate_v"></span></div>
  </div>

  <div class="group">
    <h3>色彩 Color</h3>
    <div class="row"><label>盤面色相</label><input type="range" id="hue" min="0" max="360" step="1" value="30"><span class="val" id="hue_v"></span></div>
    <div class="row"><label>飽和度</label><input type="range" id="sat" min="0" max="100" step="1" value="88"><span class="val" id="sat_v"></span></div>
  </div>

  <div class="group">
    <h3>光感 Glow</h3>
    <div class="row"><label>光暈強度</label><input type="range" id="glow" min="0" max="2" step="0.02" value="1"><span class="val" id="glow_v"></span></div>
    <div class="row"><label>拖尾</label><input type="range" id="trail" min="0" max="0.95" step="0.01" value="0.45"><span class="val" id="trail_v"></span></div>
  </div>
  </div>

  <div class="btns">
    <button id="resetBtn">↺ 重設</button>
  </div>
</div>
<button id="toggleBtn">⚙ 面板</button>
<button id="playCtl">⏸ 暫停</button>

<script>
'use strict';

// 預覽嵌入模式（?preview=1）：供首頁卡片用 iframe 嵌入，隱藏面板與導覽按鈕，並降載粒子/星星數量
const PREVIEW = new URLSearchParams(location.search).has('preview');
if (PREVIEW) document.documentElement.classList.add('preview-mode');
const PREVIEW_SCALE = PREVIEW ? 0.35 : 1; // 預覽模式的粒子/星星數量縮放

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.max(1, Math.round(W * DPR));
  canvas.height = Math.max(1, Math.round(H * DPR));
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

/* ===== 參數 ===== */
const DEFAULTS = {
  horizonR: 0.09, photonGlow: 1, lens: 1,
  diskCount: 1600, tilt: 0.22, diskSpeed: 1, inspiral: 0.45, doppler: 0.72,
  starCount: 380, smear: 0.7, captureRate: 0.3,
  hue: 30, sat: 88,
  glow: 1, trail: 0.45,
};
const P = { ...DEFAULTS };
let paramsDirty = false; // 暫停中調參數時，用凍結的時間點重畫一張靜態畫面

const fmt = {
  horizonR: v => v.toFixed(3), tilt: v => v.toFixed(2),
  hue: v => v + '°', sat: v => v + '%',
  diskCount: v => '' + Math.round(v), starCount: v => '' + Math.round(v),
};
function bindControls() {
  for (const key of Object.keys(DEFAULTS)) {
    const el = document.getElementById(key);
    const valEl = document.getElementById(key + '_v');
    const update = () => {
      P[key] = parseFloat(el.value);
      if (valEl) valEl.textContent = (fmt[key] || (v => v.toFixed ? +v.toFixed(2) : v))(P[key]);
      paramsDirty = true;
    };
    el.addEventListener('input', update);
    el.value = P[key];
    update();
  }
}
bindControls();

document.getElementById('resetBtn').addEventListener('click', () => {
  Object.assign(P, DEFAULTS);
  bindControls();
});

/* ===== 播放 / 暫停 =====
   三種來源共同決定：使用者按鈕（userPaused）、首頁 iframe 的 postMessage（msgPaused）、
   分頁隱藏（document.hidden）。任一為真就停止 rAF 迴圈，恢復時重新啟動並重設時間基準。 */
let userPaused = false, msgPaused = false;
let rafId = null, last = 0;
const pauseBtn = document.getElementById('playCtl');

function shouldRun() { return !userPaused && !msgPaused && !document.hidden; }
function startLoop() {
  if (rafId === null && shouldRun()) {
    last = performance.now();
    rafId = requestAnimationFrame(frame);
  }
}
function stopLoop() {
  if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
}
function syncLoop() { if (shouldRun()) startLoop(); else stopLoop(); }

pauseBtn.addEventListener('click', () => {
  userPaused = !userPaused;
  pauseBtn.textContent = userPaused ? '▶ 播放' : '⏸ 暫停';
  syncLoop();
});
window.addEventListener('message', e => {
  if (e.data === 'vfx-pause') { msgPaused = true; syncLoop(); }
  else if (e.data === 'vfx-play') { msgPaused = false; syncLoop(); }
});
document.addEventListener('visibilitychange', syncLoop);

/* ===== 面板開合：畫面中心平滑往右偏，避開面板 ===== */
const panel = document.getElementById('panel');
let panelOpen = !PREVIEW, panelInsetX = 0, panelInsetTarget = 0;
const PANEL_OCCUPIED_W = 340 + 12 + 24;
function updatePanelInset() {
  panelInsetTarget = (panelOpen && !PREVIEW && window.innerWidth > 760) ? PANEL_OCCUPIED_W / 2 : 0;
}
document.getElementById('toggleBtn').addEventListener('click', () => {
  panelOpen = !panelOpen;
  panel.classList.toggle('collapsed');
  updatePanelInset();
});
window.addEventListener('resize', updatePanelInset);
updatePanelInset();
panelInsetX = panelInsetTarget; // 啟動時直接就定位，不做開場滑移

/* ===== 滑鼠拖曳視差 ===== */
let panX = 0, panY = 0, panTX = 0, panTY = 0;
let dragging = false, dragSX = 0, dragSY = 0, dragBX = 0, dragBY = 0;
canvas.addEventListener('pointerdown', e => {
  dragging = true; canvas.classList.add('dragging');
  dragSX = e.clientX; dragSY = e.clientY; dragBX = panTX; dragBY = panTY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const lim = Math.min(W, H) * 0.18;
  panTX = Math.max(-lim, Math.min(lim, dragBX + (e.clientX - dragSX) * 0.5));
  panTY = Math.max(-lim, Math.min(lim, dragBY + (e.clientY - dragSY) * 0.5));
});
function endDrag() { dragging = false; canvas.classList.remove('dragging'); }
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

/* ===== 確定性亂數 ===== */
function mulberry32(seed) {
  let a = seed >>> 0;
  return () => {
    a = (a + 0x6D2B79F5) >>> 0;
    let t = a;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ===== 背景星空池：預先產生固定分佈（單位化座標，繪製時再乘畫面尺寸與透鏡位移）===== */
let starPool = [], starPoolKey = -1;
function getStarPool(count) {
  count = Math.max(0, Math.round(count * PREVIEW_SCALE));
  if (starPoolKey === count) return starPool;
  starPoolKey = count;
  const rnd = mulberry32(7654321);
  starPool = Array.from({ length: count }, () => ({
    // 以畫面對角為尺度的極座標分佈（面積均勻），繞著黑洞中心
    ang: rnd() * Math.PI * 2,
    rT: Math.sqrt(rnd()),            // 0..1 → 乘上最大半徑
    size: 0.4 + Math.pow(rnd(), 2.5) * 1.9,
    bri: 0.3 + rnd() * 0.7,
    warmT: rnd(),                    // 星色微暖/微冷
    twPhase: rnd() * Math.PI * 2,    // 閃爍相位
    twSpeed: 0.5 + rnd() * 1.5,
  }));
  return starPool;
}

/* ===== 吸積盤粒子池 ===== */
let diskPool = [], diskPoolKey = -1;
function getDiskPool(count) {
  count = Math.max(1, Math.round(count * PREVIEW_SCALE));
  if (diskPoolKey === count) return diskPool;
  diskPoolKey = count;
  const rnd = mulberry32(1234567);
  diskPool = Array.from({ length: count }, () => ({
    ang: rnd() * Math.PI * 2,
    // 軌道半徑因子：1（內緣，貼著光子環）到 ~3.2（外緣），偏向內側密集
    a: 1.05 + Math.pow(rnd(), 1.6) * 2.2,
    size: 0.6 + rnd() * 1.6,
    bri: 0.35 + rnd() * 0.65,
    wob: rnd() * Math.PI * 2,        // 微小的垂直厚度抖動相位
    thick: (rnd() - 0.5) * 2,        // 盤厚偏移 -1..1
  }));
  return diskPool;
}
function respawnDiskParticle(p) {
  p.ang = Math.random() * Math.PI * 2;
  p.a = 2.6 + Math.random() * 0.7;   // 從外緣重新進場
  p.size = 0.6 + Math.random() * 1.6;
  p.bri = 0.35 + Math.random() * 0.65;
}

/* ===== 視界閃光（粒子越過視界時）與星體捕獲事件 ===== */
const flashes = [];   // {x, y, t, max, s}
const captures = [];  // {ang0, r0, t, dur, size, bri}
let captureTimer = 2.5; // 下一次捕獲倒數

function hsla(h, s, l, a) { return `hsla(${h},${s}%,${l}%,${a})`; }

/* ===== 主渲染 ===== */
let simT = 0;

function renderFrame(dt) {
  if (W <= 0 || H <= 0) return;
  simT += dt;
  const t = simT;

  // 視差平滑
  panX += (panTX - panX) * Math.min(1, dt * 6);
  panY += (panTY - panY) * Math.min(1, dt * 6);
  panelInsetX += (panelInsetTarget - panelInsetX) * Math.min(1, dt * 10);

  const minDim = Math.min(W, H);
  const cx = W / 2 + panelInsetX + panX * 0.6;
  const cy = H / 2 + panY * 0.6;
  const Rh = P.horizonR * minDim;          // 事件視界半徑
  const Rph = Rh * 1.12;                   // 光子環半徑（略大於視界）
  const tilt = P.tilt;
  const hue = P.hue, sat = P.sat;

  /* --- 拖尾：以半透明黑覆蓋 --- */
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgba(0,0,0,${Math.max(0.05, 1 - P.trail)})`;
  ctx.fillRect(0, 0, W, H);

  ctx.globalCompositeOperation = 'lighter';

  /* --- 1. 背景星空（重力透鏡位移 + 近環拖影弧）--- */
  const stars = getStarPool(P.starCount);
  const maxR = Math.hypot(W, H) * 0.62;
  const lensK = P.lens * Rph * Rph * 1.6;  // 偏折 ~ k / r
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    // 星星以視差 0.3 的緩慢係數跟著拖曳（比前景少動 → 深度感）
    const r0 = s.rT * maxR;
    if (r0 < 1) continue;
    const defl = lensK / Math.max(r0, Rph * 0.6);
    const rd = r0 + defl;                  // 向外推擠的視位置
    if (rd < Rph * 1.02) continue;         // 落入光子環內側 → 被黑洞遮蔽
    const sx = cx + Math.cos(s.ang) * rd - panX * 0.35;
    const sy = cy + Math.sin(s.ang) * rd - panY * 0.35;
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;
    const tw = 0.75 + 0.25 * Math.sin(t * s.twSpeed * 2 + s.twPhase);
    const alpha = s.bri * tw;
    const sh = 40 + s.warmT * 180;         // 微暖黃到微冷藍的星色
    // 貼近光子環的星：被剪切抹成沿切線方向的短弧
    const closeness = Math.max(0, 1 - (rd - Rph) / (Rph * 2.2));
    if (P.smear > 0.01 && closeness > 0.12) {
      const arcHalf = closeness * closeness * P.smear * 0.55; // 弧長（弧度的一半）
      ctx.strokeStyle = hsla(sh, 30, 85, alpha * (0.4 + 0.6 * closeness));
      ctx.lineWidth = Math.max(0.6, s.size * (1 - closeness * 0.5));
      ctx.beginPath();
      ctx.arc(cx, cy, rd, s.ang - arcHalf, s.ang + arcHalf);
      ctx.stroke();
    } else {
      ctx.fillStyle = hsla(sh, 25, 88, alpha);
      ctx.beginPath();
      ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /* --- 2. 星體捕獲：星星漂進來 → 麵條化拉伸 → 吞噬閃光 --- */
  if (P.captureRate > 0.005) {
    captureTimer -= dt;
    if (captureTimer <= 0) {
      captureTimer = 1.5 + Math.random() * 14 * (1.05 - P.captureRate);
      captures.push({
        ang0: Math.random() * Math.PI * 2,
        r0: minDim * (0.45 + Math.random() * 0.2),
        t: 0, dur: 2.2 + Math.random() * 1.6,
        size: 1.2 + Math.random() * 1.6,
        bri: 0.7 + Math.random() * 0.3,
        swirl: (Math.random() < 0.5 ? -1 : 1) * (1.5 + Math.random() * 2),
      });
    }
  }
  for (let i = captures.length - 1; i >= 0; i--) {
    const c = captures[i];
    c.t += dt;
    const u = c.t / c.dur;                 // 0..1 進度
    if (u >= 1) {
      flashes.push({ x: cx + Math.cos(c.ang0 + c.swirl) * Rh, y: cy + Math.sin(c.ang0 + c.swirl) * Rh * Math.max(tilt, 0.35), t: 0, max: 0.5, s: Rh * 0.5 });
      captures.splice(i, 1);
      continue;
    }
    // 加速墜落 + 螺旋
    const fall = u * u;
    const r = c.r0 + (Rh - c.r0) * fall;
    const ang = c.ang0 + c.swirl * fall;
    const px = cx + Math.cos(ang) * r, py = cy + Math.sin(ang) * r;
    // 麵條化：越近越長的徑向拉伸線段（頭朝黑洞）
    const stretch = Math.min(1, (Rh * 6) / Math.max(r, Rh)) * (0.15 + u * 0.85);
    const len = c.size * 3 + stretch * Rh * 1.4;
    const dirx = (cx - px), diry = (cy - py);
    const dl = Math.hypot(dirx, diry) || 1;
    const grad = ctx.createLinearGradient(px, py, px + dirx / dl * len, py + diry / dl * len);
    grad.addColorStop(0, hsla(50, 30, 90, 0));
    grad.addColorStop(1, hsla(50, 60, 85, c.bri * (0.5 + u * 0.5)));
    ctx.strokeStyle = grad;
    ctx.lineWidth = Math.max(0.7, c.size * (1 - u * 0.6));
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + dirx / dl * len, py + diry / dl * len);
    ctx.stroke();
  }

  /* --- 3. 吸積盤 --- */
  const disk = getDiskPool(P.diskCount);
  const omegaBase = P.diskSpeed * 1.1;
  const aMax = 3.3;
  // 遮擋判斷用的視界輪廓（略小於光子環）
  const occlR = Rh * 0.99;

  // 遠側（畫在黑洞圓盤後面）與近側分兩趟畫；遠側同時投影出上/下拱起的「愛因斯坦環」影像
  for (let pass = 0; pass < 2; pass++) {
    for (let i = 0; i < disk.length; i++) {
      const p = disk[i];
      if (pass === 0) {
        // 只在第一趟推進物理狀態（角速度 ~ 開普勒 a^-1.5，內縮速度隨半徑靠近而加快）
        const omega = omegaBase / Math.pow(p.a, 1.5);
        p.ang += omega * dt;
        p.a -= P.inspiral * dt * (0.055 + 0.12 / p.a);
        if (p.a < 0.98) {
          // 越過視界：閃光 + 重生於外緣
          const fx = cx + Math.cos(p.ang) * Rph * 1.02;
          const fy = cy + Math.sin(p.ang) * Rph * 1.02 * tilt;
          if (flashes.length < 60) flashes.push({ x: fx, y: fy, t: 0, max: 0.35, s: 2 + p.size * 2.5 });
          respawnDiskParticle(p);
        }
      }
      const sinA = Math.sin(p.ang), cosA = Math.cos(p.ang);
      const nearSide = sinA > 0;           // 畫面下半 = 靠近觀察者的一側
      if ((pass === 1) !== nearSide) {
        if (pass === 1) continue;
        // pass 0 且為遠側 → 先畫本體（稍後被黑洞圓盤遮住中央），再畫透鏡拱像
      } else if (pass === 0) {
        continue; // pass 0 只畫遠側
      }

      const orbR = p.a * Rph;
      const thickOff = p.thick * Rph * 0.05 * (1 + (p.a - 1) * 0.4);
      const px = cx + cosA * orbR;
      const py = cy + sinA * orbR * tilt + thickOff * (1 - tilt);

      // 都卜勒射束假象：切向速度朝向觀察者的一側（cos 分量）更亮更藍
      const approach = -cosA;              // 逆時針公轉：畫面左側遠離、右側靠近（取負讓右側 approach>0）
      const dopp = approach * P.doppler;
      const bri = p.bri * Math.max(0.12, 1 + dopp * 1.35);
      const hueP = hue + dopp * 26 + (p.a - 1) * 4;   // 靠近側偏藍白、外圈微偏紅
      const lightP = 55 + dopp * 22 + (1.6 - Math.min(p.a, 1.6)) * 14; // 內圈更熾熱
      const heat = Math.max(0, 1.35 - p.a * 0.32);    // 內緣白熱化

      // 遠側粒子被視界圓盤遮擋 → 跳過本體，但透鏡拱像仍要畫
      const behindHole = !nearSide && Math.abs(px - cx) < occlR && Math.abs(py - cy) < occlR &&
                         (px - cx) * (px - cx) + (py - cy) * (py - cy) * 2.2 < occlR * occlR;

      if (!behindHole) {
        ctx.fillStyle = hsla(hueP, sat * (1 - heat * 0.5), Math.min(92, lightP), Math.min(1, bri) * 0.85);
        ctx.beginPath();
        ctx.arc(px, py, p.size * (0.8 + heat * 0.5), 0, Math.PI * 2);
        ctx.fill();
      }

      // 愛因斯坦環拱像：遠側盤面被彎折到黑洞上/下方（Interstellar 式，弧線近似不需光線追蹤）
      if (!nearSide && P.lens > 0.02) {
        const spreadT = Math.min(1, (p.a - 1) / (aMax - 1));
        const archR = Rph * (1.18 + spreadT * 0.55);   // 外圈粒子映到離環稍遠的拱
        // 將遠側角度（sin<0，即 PI..2PI）壓縮映射到頂部拱（以 -PI/2 為中心）
        const spanU = cosA;                             // -1..1 沿遠側帶的位置
        const archAng = -Math.PI / 2 + spanU * (1.15 + 0.35 * spreadT);
        const ax = cx + Math.cos(archAng) * archR;
        const ay = cy + Math.sin(archAng) * archR;
        const archA = Math.min(1, bri) * 0.75 * Math.min(1, P.lens) * (1 - spreadT * 0.6);
        ctx.fillStyle = hsla(hueP, sat * (1 - heat * 0.4), Math.min(90, lightP + 5), archA);
        ctx.beginPath();
        ctx.arc(ax, ay, p.size * 0.75, 0, Math.PI * 2);
        ctx.fill();
        // 下方較小、較暗的次級像
        const ax2 = cx + Math.cos(-archAng) * archR * 0.92;
        const ay2 = cy + Math.sin(-archAng) * archR * 0.92;
        ctx.fillStyle = hsla(hueP, sat * (1 - heat * 0.4), lightP, archA * 0.45);
        ctx.beginPath();
        ctx.arc(ax2, ay2, p.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    if (pass === 0) {
      /* --- 4. 事件視界：純黑圓盤 + 光子環（畫在遠側盤與近側盤之間）--- */
      ctx.globalCompositeOperation = 'source-over';
      // 周圍光暈（先畫，讓黑盤蓋住內側）
      if (P.glow > 0.01) {
        const g = ctx.createRadialGradient(cx, cy, Rph * 0.9, cx, cy, Rph * 3.2);
        g.addColorStop(0, hsla(hue, sat, 55, 0.14 * P.glow));
        g.addColorStop(0.35, hsla(hue, sat, 45, 0.05 * P.glow));
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = g;
        ctx.fillRect(cx - Rph * 3.4, cy - Rph * 3.4, Rph * 6.8, Rph * 6.8);
        ctx.globalCompositeOperation = 'source-over';
      }
      // 黑盤
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx, cy, Rh, 0, Math.PI * 2);
      ctx.fill();
      // 光子環：細亮圈 + 柔光
      if (P.photonGlow > 0.01) {
        ctx.globalCompositeOperation = 'lighter';
        const pg = P.photonGlow;
        ctx.strokeStyle = hsla(hue + 8, Math.min(100, sat * 0.55), 82, 0.85 * Math.min(1, pg));
        ctx.lineWidth = Math.max(1, Rh * 0.022);
        ctx.beginPath(); ctx.arc(cx, cy, Rph, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = hsla(hue, sat * 0.7, 65, 0.28 * pg);
        ctx.lineWidth = Math.max(2, Rh * 0.085);
        ctx.beginPath(); ctx.arc(cx, cy, Rph * 1.02, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = hsla(hue, sat * 0.8, 55, 0.10 * pg);
        ctx.lineWidth = Math.max(3, Rh * 0.2);
        ctx.beginPath(); ctx.arc(cx, cy, Rph * 1.08, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.globalCompositeOperation = 'lighter';
    }
  }

  /* --- 5. 視界閃光 --- */
  for (let i = flashes.length - 1; i >= 0; i--) {
    const f = flashes[i];
    f.t += dt;
    const u = f.t / f.max;
    if (u >= 1) { flashes.splice(i, 1); continue; }
    const a = (1 - u) * (1 - u);
    const rr = f.s * (0.6 + u * 2.2);
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, rr);
    g.addColorStop(0, hsla(hue + 20, 40, 92, a * 0.9));
    g.addColorStop(0.4, hsla(hue, sat, 60, a * 0.4));
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(f.x, f.y, rr, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalCompositeOperation = 'source-over';
}

/* ===== 主迴圈：時間制動畫，dt 上限 50ms ===== */
function frame(now) {
  rafId = null;
  if (!shouldRun()) return;
  rafId = requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  paramsDirty = false;
  renderFrame(dt);
}
// 暫停中調整參數 → 用 dt=0 重畫一張靜態畫面
setInterval(() => {
  if (paramsDirty && !shouldRun()) { paramsDirty = false; renderFrame(0); }
}, 120);

startLoop();
</script>
</body>

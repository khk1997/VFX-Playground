<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFX Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; background: #0a0d0b; overflow: hidden;
    font-family: "SF Pro", "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: #e8f5ec;
  }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 40px;
  }

  /* 背景微光氛圍 */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 30% 20%, rgba(0,255,140,.08), transparent 60%),
      radial-gradient(ellipse 50% 40% at 75% 80%, rgba(0,200,255,.06), transparent 60%),
      #050706;
  }

  header { position: relative; z-index: 1; text-align: center; }
  header h1 {
    font-size: 30px; letter-spacing: 6px; font-weight: 700;
    background: linear-gradient(90deg, #7bffb0, #d6ff7b, #7bffb0);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    background-size: 200% auto; animation: shine 6s linear infinite;
  }
  @keyframes shine { to { background-position: 200% center; } }
  header p { margin-top: 6px; font-size: 12px; letter-spacing: 3px; color: #5c7a68; text-transform: uppercase; }

  /* ===== 選單列 ===== */
  #rail {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 26px;
    padding: 10px 10px;
  }
  #cards { display: flex; align-items: center; gap: 26px; }

  .card {
    position: relative;
    width: 220px; height: 300px;
    border-radius: 20px;
    background: linear-gradient(160deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
    border: 1px solid rgba(255,255,255,.08);
    overflow: hidden;
    cursor: pointer;
    transform: scale(0.88);
    opacity: .55;
    transition: transform .35s cubic-bezier(.2,.9,.25,1), opacity .35s ease, border-color .35s ease, box-shadow .35s ease;
    display: flex; flex-direction: column;
    text-decoration: none; color: inherit;
  }
  .card.active {
    transform: scale(1);
    opacity: 1;
    border-color: rgba(123,255,176,.55);
    box-shadow: 0 0 0 1px rgba(123,255,176,.15), 0 20px 60px rgba(0,0,0,.55), 0 0 40px rgba(80,255,150,.12);
  }
  .card.disabled { cursor: default; }
  .card.disabled:hover { opacity: .55; }

  .card-preview {
    position: relative; flex: 1; background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card-preview canvas { width: 100%; height: 100%; display: block; }
  .card-preview .soon { font-size: 12px; letter-spacing: 2px; color: #3d5347; }

  .card-body { padding: 12px 14px 14px; background: rgba(0,0,0,.35); }
  .card-title { font-size: 15px; font-weight: 600; letter-spacing: .5px; margin-bottom: 8px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 10px; padding: 3px 7px; border-radius: 20px; letter-spacing: .3px;
    background: rgba(123,255,176,.1); color: #8fffbe; border: 1px solid rgba(123,255,176,.25);
    white-space: nowrap;
  }
  .card.disabled .tag { background: rgba(255,255,255,.05); color: #566; border-color: rgba(255,255,255,.1); }

  /* 導覽箭頭 */
  .navBtn {
    position: relative; z-index: 1;
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.14);
    color: #cfe8d8; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s ease, transform .15s ease;
    flex: 0 0 auto;
  }
  .navBtn:hover { background: rgba(123,255,176,.15); transform: scale(1.06); }
  .navBtn:active { transform: scale(0.94); }

  footer { position: relative; z-index: 1; font-size: 11px; color: #45594d; letter-spacing: 1px; }
  footer kbd {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15);
    border-radius: 4px; padding: 1px 6px; font-family: inherit; margin: 0 2px;
  }
</style>
</head>
<body>
<div id="bg"></div>

<header>
  <h1>VFX PLAYGROUND</h1>
  <p>Interactive Visual Effects Collection</p>
</header>

<div id="rail">
  <button class="navBtn" id="prevBtn" aria-label="上一個">‹</button>

  <div id="cards"></div>

  <button class="navBtn" id="nextBtn" aria-label="下一個">›</button>
</div>

<footer>使用 <kbd>←</kbd> <kbd>→</kbd> 切換　或滑鼠點擊卡片　<kbd>Enter</kbd> 進入</footer>

<script>
'use strict';

/* ===== 特效清單 =====
   href 為 null 代表尚未開放（顯示 敬請期待）。
   preview 是一個小型自繪函式，用來畫出卡片內的縮圖動畫（輕量版，不依賴主特效程式碼）。 */
const EFFECTS = [
  {
    title: '能量光環 Energy Ring',
    href: 'energy-ring/index.html',
    tags: ['Canvas 2D', 'Additive Blending', 'Value Noise', 'Domain Warping', 'PNG 序列輸出'],
    preview: previewEnergyRing,
  },
  { title: '敬請期待', href: null, tags: ['Coming Soon'], preview: null },
  { title: '敬請期待', href: null, tags: ['Coming Soon'], preview: null },
];

const cardsEl = document.getElementById('cards');
let active = 0;
const cardEls = [];

function buildCards() {
  EFFECTS.forEach((fx, i) => {
    const el = document.createElement(fx.href ? 'a' : 'div');
    el.className = 'card' + (fx.href ? '' : ' disabled');
    if (fx.href) el.href = fx.href;

    const preview = document.createElement('div');
    preview.className = 'card-preview';
    if (fx.preview) {
      const canvas = document.createElement('canvas');
      canvas.width = 220; canvas.height = 190;
      preview.appendChild(canvas);
      fx.preview(canvas);
    } else {
      const soon = document.createElement('div');
      soon.className = 'soon';
      soon.textContent = 'COMING SOON';
      preview.appendChild(soon);
    }

    const body = document.createElement('div');
    body.className = 'card-body';
    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = fx.title;
    const tagWrap = document.createElement('div');
    tagWrap.className = 'card-tags';
    fx.tags.forEach(t => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = t;
      tagWrap.appendChild(tag);
    });
    body.appendChild(title);
    body.appendChild(tagWrap);

    el.appendChild(preview);
    el.appendChild(body);
    el.addEventListener('click', (e) => {
      if (!fx.href) { e.preventDefault(); return; }
      if (i !== active) { e.preventDefault(); setActive(i); }
    });
    cardsEl.appendChild(el);
    cardEls.push(el);
  });
}

function setActive(i) {
  active = (i + EFFECTS.length) % EFFECTS.length;
  cardEls.forEach((el, idx) => el.classList.toggle('active', idx === active));
}

document.getElementById('prevBtn').addEventListener('click', () => setActive(active - 1));
document.getElementById('nextBtn').addEventListener('click', () => setActive(active + 1));
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') setActive(active - 1);
  else if (e.key === 'ArrowRight') setActive(active + 1);
  else if (e.key === 'Enter') {
    const fx = EFFECTS[active];
    if (fx.href) window.location.href = fx.href;
  }
});

buildCards();
setActive(0);

/* ===== 卡片縮圖：能量光環的輕量版即時預覽 ===== */
function previewEnergyRing(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  let rot = 0, last = performance.now();

  function n1(x) {
    return Math.sin(x) * 0.55 + Math.sin(x * 2.13 + 1.7) * 0.3 + Math.sin(x * 4.7 + 0.4) * 0.15;
  }

  function frame(now) {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    rot += dt * 0.6 * Math.PI * 2;

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'lighter';

    const cx = W / 2, cy = H / 2, R = Math.min(W, H) * 0.28;
    const SEGS = 60, segA = (Math.PI * 2) / SEGS;
    for (let ring = 0; ring < 2; ring++) {
      const rr = R + (ring - 0.5) * 8;
      const hue = ring === 0 ? 128 : 80;
      for (let i = 0; i < SEGS; i++) {
        const t = i * segA;
        const a0 = t + rot * (ring === 0 ? 1 : 0.8);
        let b = 0.5 + 0.5 * Math.sin(t * 3 + ring * 2);
        b *= 0.6 + 0.4 * n1(t * 3 + now * 0.001);
        if (b < 0.1) continue;
        const x0 = cx + Math.cos(a0) * rr, y0 = cy + Math.sin(a0) * rr;
        const x1 = cx + Math.cos(a0 + segA * 1.3) * rr, y1 = cy + Math.sin(a0 + segA * 1.3) * rr;
        ctx.strokeStyle = `hsla(${hue},100%,60%,${b * 0.7})`;
        ctx.lineWidth = 2.2;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
      }
    }
    if (canvas.isConnected) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
</script>
</body>
</html>

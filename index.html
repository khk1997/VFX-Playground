<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFX Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; background: #0a0d0b; overflow: hidden;
    font-family: "SF Pro", "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: #e8f5ec;
  }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 40px;
  }

  /* 背景微光氛圍 */
  #bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 30% 20%, rgba(0,255,140,.08), transparent 60%),
      radial-gradient(ellipse 50% 40% at 75% 80%, rgba(0,200,255,.06), transparent 60%),
      #050706;
  }

  header { position: relative; z-index: 1; text-align: center; }
  header h1 {
    font-size: 30px; letter-spacing: 6px; font-weight: 700;
    background: linear-gradient(90deg, #7bffb0, #d6ff7b, #7bffb0);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    background-size: 200% auto; animation: shine 6s linear infinite;
  }
  @keyframes shine { to { background-position: 200% center; } }
  header p { margin-top: 6px; font-size: 12px; letter-spacing: 3px; color: #5c7a68; text-transform: uppercase; }

  /* ===== 選單列：卡片可超出畫面，active 卡片永遠移到中央 ===== */
  #rail {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 14px;
    width: 100%;
    padding: 10px 0;
  }
  #viewport {
    flex: 1;
    overflow: hidden;
    /* 讓卡片放大時的陰影不被裁掉 */
    padding: 18px 0;
  }
  #cards {
    display: flex; align-items: center; gap: 26px;
    width: max-content;
    transition: transform .45s cubic-bezier(.25,.9,.3,1);
    will-change: transform;
  }

  .card {
    position: relative;
    width: 220px; height: 300px;
    flex: 0 0 auto;
    border-radius: 20px;
    background: linear-gradient(160deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
    border: 1px solid rgba(255,255,255,.08);
    overflow: hidden;
    cursor: pointer;
    transform: scale(0.88);
    opacity: .55;
    transition: transform .35s cubic-bezier(.2,.9,.25,1), opacity .35s ease, border-color .35s ease, box-shadow .35s ease;
    display: flex; flex-direction: column;
    text-decoration: none; color: inherit;
  }
  .card.active {
    transform: scale(1);
    opacity: 1;
    border-color: rgba(123,255,176,.55);
    box-shadow: 0 0 0 1px rgba(123,255,176,.15), 0 20px 60px rgba(0,0,0,.55), 0 0 40px rgba(80,255,150,.12);
  }
  .card.disabled { cursor: default; }
  .card.disabled:hover { opacity: .55; }

  /* 進入特效頁時的放大轉場 */
  .card.launching {
    transform: scale(1.5);
    opacity: 0;
    transition: transform .38s cubic-bezier(.5,0,.8,.4), opacity .32s ease .06s;
    z-index: 5;
  }
  body.leaving header, body.leaving footer, body.leaving .navBtn,
  body.leaving .card:not(.launching) { opacity: 0 !important; transition: opacity .3s ease; }

  .card-preview {
    position: relative; flex: 1; background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .card-preview canvas { width: 100%; height: 100%; display: block; }
  .card-preview .soon { font-size: 12px; letter-spacing: 2px; color: #3d5347; }
  /* 真實效果頁用 iframe 嵌入並縮放，畫面跟點進去的預設狀態完全一致 */
  .card-preview iframe {
    position: absolute; top: 0; left: 0;
    border: 0; pointer-events: none;
    transform-origin: top left;
    background: #000;
  }

  .card-body { padding: 12px 14px 14px; background: rgba(0,0,0,.35); }
  .card-title { font-size: 15px; font-weight: 600; letter-spacing: .5px; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 10px; padding: 3px 7px; border-radius: 20px; letter-spacing: .3px;
    background: rgba(123,255,176,.1); color: #8fffbe; border: 1px solid rgba(123,255,176,.25);
    white-space: nowrap;
  }
  .card.disabled .tag { background: rgba(255,255,255,.05); color: #566; border-color: rgba(255,255,255,.1); }

  /* 導覽箭頭 */
  .navBtn {
    position: relative; z-index: 2;
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.14);
    color: #cfe8d8; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s ease, transform .15s ease;
    flex: 0 0 auto;
    margin: 0 14px;
  }
  .navBtn:hover { background: rgba(123,255,176,.15); transform: scale(1.06); }
  .navBtn:active { transform: scale(0.94); }

  /* 進度小圓點 */
  #dots { position: relative; z-index: 1; display: flex; gap: 8px; }
  #dots .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,.14); cursor: pointer;
    transition: background .25s ease, transform .25s ease;
  }
  #dots .dot.on { background: #7bffb0; transform: scale(1.25); }

  footer { position: relative; z-index: 1; font-size: 11px; color: #45594d; letter-spacing: 1px; text-align: center; padding: 0 12px; }
  footer kbd {
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15);
    border-radius: 4px; padding: 1px 6px; font-family: inherit; margin: 0 2px;
  }

  /* 音效開關 */
  #sndBtn {
    position: fixed; top: 14px; right: 14px; z-index: 3;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.14);
    color: #cfe8d8; border-radius: 8px; padding: 6px 10px;
    font-size: 12px; cursor: pointer; font-family: inherit;
  }
  #sndBtn:hover { background: rgba(123,255,176,.15); }

  @media (max-width: 700px) {
    body { gap: 22px; }
    header h1 { font-size: 22px; letter-spacing: 4px; }
    .navBtn { display: none; }
    .card { width: 180px; height: 250px; }
    footer .kbHint { display: none; }
  }
</style>
<link rel="stylesheet" href="switch2-theme.css">
</head>
<body>
<div id="bg" aria-hidden="true">
  <div class="bg-banner-image"></div>
  <div class="bg-theme-layer active"></div>
  <div class="bg-theme-layer"></div>
</div>

<button id="sndBtn" aria-label="音效開關">🔊 音效</button>

<header>
  <h1>VFX PLAYGROUND</h1>
  <p>Interactive Visual Effects Collection</p>
</header>

<div id="rail">
  <button class="navBtn" id="prevBtn" aria-label="上一個"><span class="navGlyph">‹</span><span class="navLabel">L</span></button>
  <div id="viewport"><div id="cards"></div></div>
  <button class="navBtn" id="nextBtn" aria-label="下一個"><span class="navGlyph">›</span><span class="navLabel">R</span></button>
</div>

<div id="selectionInfo" aria-live="polite">
  <span id="selectionIndex">01 / 09</span>
  <span id="selectionCategory">PARTICLE SYSTEM</span>
  <span id="selectionDescription">風場驅動的櫻花粒子場景</span>
  <span id="selectionAction"><span class="actionKey">A</span> OPEN</span>
</div>

<div id="dots"></div>

<footer>
  <span class="controlItem"><kbd>←</kbd><kbd>→</kbd><span>SELECT</span></span>
  <span class="controlItem"><kbd class="keyA">A</kbd><kbd>Enter</kbd><span>OPEN</span></span>
  <span class="controlItem"><kbd>S</kbd><span>SOUND</span></span>
</footer>

<script>
'use strict';

/* ===== 特效清單 =====
   href 為 null 代表尚未開放（顯示 敬請期待）。
   previewSrc 用 iframe 嵌入實際特效頁（?preview=1 隱藏 UI）。
   為了效能，只有 active 卡片附近的 iframe 會播放，其餘會收到 'vfx-pause' postMessage。 */
const EFFECTS = [
  {
    title: '櫻吹雪 Sakura Blizzard',
    category: 'PARTICLE SYSTEM',
    description: '風場驅動的櫻花粒子場景',
    theme: ['239, 105, 143', '119, 171, 255'],
    href: 'sakura-blizzard/index.html',
    tags: ['Canvas 2D', 'Particles', 'Wind Field'],
    previewSrc: 'sakura-blizzard/index.html?preview=1',
  },
  {
    title: '能量光環 Energy Ring',
    category: 'ENERGY SIMULATION',
    description: '多層電弧構成的旋轉能量核心',
    theme: ['85, 255, 121', '36, 178, 107'],
    href: 'energy-ring/index.html',
    tags: ['HTML5 Canvas', 'CSS', 'JavaScript'],
    previewSrc: 'energy-ring/index.html?preview=1',
  },
  {
    title: '電漿閃電 Lightning',
    category: 'ELECTRIC STORM',
    description: '具有分支與殘影的程序閃電',
    theme: ['104, 173, 255', '92, 111, 255'],
    href: 'lightning/index.html',
    tags: ['HTML5 Canvas', 'CSS', 'JavaScript'],
    previewSrc: 'lightning/index.html?preview=1',
  },
  {
    title: '粒子星雲 Nebula',
    category: 'FLOW FIELD',
    description: '流場驅動的深空粒子星雲',
    theme: ['80, 153, 255', '130, 91, 255'],
    href: 'nebula/index.html',
    tags: ['HTML5 Canvas', 'CSS', 'JavaScript'],
    previewSrc: 'nebula/index.html?preview=1',
  },
  {
    title: '流體墨水 Fluid Ink',
    category: 'FLUID DYNAMICS',
    description: '可互動的彩色墨流模擬',
    theme: ['39, 192, 213', '64, 108, 255'],
    href: 'fluid-ink/index.html',
    tags: ['HTML5 Canvas', 'CSS', 'JavaScript'],
    previewSrc: 'fluid-ink/index.html?preview=1',
  },
  {
    title: '文字粒子 Text Particles',
    category: 'TYPOGRAPHIC VFX',
    description: '文字聚合、爆散與重新組構',
    theme: ['70, 240, 180', '44, 146, 255'],
    href: 'text-particles/index.html',
    tags: ['HTML5 Canvas', 'CSS', 'JavaScript'],
    previewSrc: 'text-particles/index.html?preview=1',
  },
  {
    title: '璀璨烟火 Fireworks',
    category: 'PYROTECHNICS',
    description: '多種爆炸型態的夜空煙火',
    theme: ['255, 167, 73', '255, 79, 92'],
    href: 'fireworks/index.html',
    tags: ['HTML5 Canvas', 'CSS', 'JavaScript'],
    previewSrc: 'fireworks/index.html?preview=1',
  },
  {
    title: '極光 Aurora',
    category: 'AUDIO REACTIVE',
    description: '隨音訊頻率起伏的極光簾幕',
    theme: ['63, 233, 179', '80, 138, 255'],
    href: 'aurora/index.html',
    tags: ['HTML5 Canvas', 'Web Audio API', 'JavaScript'],
    previewSrc: 'aurora/index.html?preview=1',
  },
  {
    title: '薄膜水滴 Thin Film Droplets',
    category: 'RAYMARCHING',
    description: '具有薄膜干涉色彩的融合水滴',
    theme: ['91, 181, 255', '238, 117, 204'],
    href: 'bubble/index.html',
    tags: ['Three.js', 'Raymarching', 'Metaballs'],
    previewSrc: 'bubble/index.html?preview=1',
  },
];

// iframe 內部渲染解析度（與卡片預覽框同比例 220:190，放大 3 倍後縮小顯示以求清晰）
const PREVIEW_W = 660, PREVIEW_H = 570;

const cardsEl = document.getElementById('cards');
const viewportEl = document.getElementById('viewport');
const dotsEl = document.getElementById('dots');
const bgEl = document.getElementById('bg');
const bgThemeLayers = Array.from(bgEl.querySelectorAll('.bg-theme-layer'));
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const selectionIndexEl = document.getElementById('selectionIndex');
const selectionCategoryEl = document.getElementById('selectionCategory');
const selectionDescriptionEl = document.getElementById('selectionDescription');
let active = 0;
let position = EFFECTS.length; // 三組完整清單中的中間組起點
let snapTimer = null;
let motionTimer = null;
let activeThemeLayer = 0;
const cardEls = [];
const iframes = [];   // 實體卡片順序，可為 null
const dotEls = [];
const mobilePreviewQuery = window.matchMedia('(max-width: 760px)');
const PREVIEW_CACHE_LIMIT = 7;
let previewUseTick = 0;

/* ===== WebAudio 合成音效（Switch 風的嗶啵聲，不用音檔） ===== */
let audioCtx = null;
let soundOn = (localStorage.getItem('vfx-sound') ?? '1') === '1';
function blip(freq, dur = 0.07, type = 'sine', gain = 0.12) {
  if (!soundOn) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(gain, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t); o.stop(t + dur + 0.02);
  } catch (e) { /* 音效失敗不影響操作 */ }
}
const sndMove = () => blip(880, 0.06, 'sine', 0.10);
const sndEnter = () => { blip(660, 0.09, 'triangle', 0.14); setTimeout(() => blip(990, 0.12, 'triangle', 0.12), 70); };

const sndBtn = document.getElementById('sndBtn');
function renderSndBtn() { sndBtn.textContent = soundOn ? '🔊 音效' : '🔇 音效'; }
sndBtn.addEventListener('click', () => {
  soundOn = !soundOn;
  localStorage.setItem('vfx-sound', soundOn ? '1' : '0');
  renderSndBtn();
  if (soundOn) sndMove();
});
renderSndBtn();

function buildCards() {
  // 三組完整清單首尾相接，確保畫面兩側始終都有足夠的前後卡片。
  const sequence = [-1, 0, 1].flatMap(copy =>
    EFFECTS.map((fx, logicalIndex) => ({
      fx,
      logicalIndex,
      clone: copy !== 0,
    }))
  );

  sequence.forEach(({ fx, logicalIndex: i, clone }) => {
    const el = document.createElement(fx.href ? 'a' : 'div');
    el.className = 'card' + (fx.href ? '' : ' disabled');
    if (fx.href) el.href = fx.href;
    if (clone) el.setAttribute('aria-hidden', 'true');

    const preview = document.createElement('div');
    preview.className = 'card-preview';
    if (fx.previewSrc) {
      const iframe = document.createElement('iframe');
      iframe.dataset.src = fx.previewSrc;
      iframe.dataset.loaded = '0';
      iframe.width = PREVIEW_W;
      iframe.height = PREVIEW_H;
      iframe.tabIndex = -1;
      iframe.loading = 'lazy';
      iframe.setAttribute('scrolling', 'no');
      iframe.setAttribute('aria-hidden', 'true');
      iframe.dataset.index = String(iframes.length);
      iframe.addEventListener('load', () => syncPreviewState(iframe, Number(iframe.dataset.index)));
      const scale = 220 / PREVIEW_W;
      iframe.style.transform = `scale(${scale})`;
      preview.appendChild(iframe);
      iframes.push(iframe);
    } else {
      const soon = document.createElement('div');
      soon.className = 'soon';
      soon.textContent = 'COMING SOON';
      preview.appendChild(soon);
      iframes.push(null);
    }

    const body = document.createElement('div');
    body.className = 'card-body';
    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = fx.title;
    const tagWrap = document.createElement('div');
    tagWrap.className = 'card-tags';
    fx.tags.forEach(t => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.textContent = t;
      tagWrap.appendChild(tag);
    });
    body.appendChild(title);
    body.appendChild(tagWrap);

    el.appendChild(preview);
    el.appendChild(body);
    el.addEventListener('click', (e) => {
      if (!fx.href) { e.preventDefault(); return; }
      e.preventDefault();
      if (i !== active) { setActive(i); }
      else launch(i);
    });
    cardsEl.appendChild(el);
    cardEls.push(el);

    if (!clone) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.addEventListener('click', () => setActive(i, false, true));
      dotsEl.appendChild(dot);
      dotEls.push(dot);
    }
  });
}

function syncPreviewState(frame, index) {
  if (!frame || frame.dataset.loaded !== '1' || !frame.contentWindow) return;
  const distance = Math.abs(index - position);
  const shouldPlay = distance <= 1 && !document.hidden;
  const fps = distance === 0 ? 60 : distance === 1 ? 24 : 12;
  const dpr = mobilePreviewQuery.matches ? 1.15 : 1.5;
  try { frame.contentWindow.postMessage({ type: 'vfx-quality', fps, dpr }, '*'); } catch (e) {}
  try { frame.contentWindow.postMessage(shouldPlay ? 'vfx-play' : 'vfx-pause', '*'); } catch (e) {}
}

function ensurePreviewLoaded(frame, index) {
  if (!frame) return;
  frame.dataset.lastUsed = String(++previewUseTick);
  if (frame.dataset.loaded === '1') return;
  frame.src = frame.dataset.src;
  frame.dataset.loaded = '1';
  frame.dataset.index = String(index);
}

function unloadPreview(frame) {
  if (!frame || frame.dataset.loaded !== '1') return;
  try { frame.contentWindow && frame.contentWindow.postMessage('vfx-pause', '*'); } catch (e) {}
  frame.src = 'about:blank';
  frame.dataset.loaded = '0';
}

function trimPreviewCache(protectedIndices) {
  const loaded = iframes
    .map((frame, index) => ({ frame, index }))
    .filter(item => item.frame && item.frame.dataset.loaded === '1');
  if (loaded.length <= PREVIEW_CACHE_LIMIT) return;

  loaded
    .filter(item => !protectedIndices.has(item.index))
    .sort((a, b) => Number(a.frame.dataset.lastUsed || 0) - Number(b.frame.dataset.lastUsed || 0))
    .slice(0, loaded.length - PREVIEW_CACHE_LIMIT)
    .forEach(item => unloadPreview(item.frame));
}

/* 中心附近立即載入，其餘使用最多 7 個項目的 LRU 緩存，避免來回切換反覆初始化。 */
function updatePreviewPlayback() {
  const protectedIndices = new Set();
  iframes.forEach((f, i) => {
    if (!f) return;
    const distance = Math.abs(i - position);
    const shouldLoad = distance <= 2;

    if (shouldLoad) {
      protectedIndices.add(i);
      ensurePreviewLoaded(f, i);
    }
    if (f.dataset.loaded === '1') syncPreviewState(f, i);
  });
  trimPreviewCache(protectedIndices);
}

function updateCardDepth() {
  cardEls.forEach((el, idx) => {
    const distance = idx - position;
    el.classList.remove('depth-near-left', 'depth-near-right', 'depth-far-left', 'depth-far-right');
    if (distance === -1) el.classList.add('depth-near-left');
    else if (distance === 1) el.classList.add('depth-near-right');
    else if (distance < -1) el.classList.add('depth-far-left');
    else if (distance > 1) el.classList.add('depth-far-right');
  });
}

function updateSelectionUI(instant = false) {
  const fx = EFFECTS[active];
  selectionIndexEl.textContent = `${String(active + 1).padStart(2, '0')} / ${String(EFFECTS.length).padStart(2, '0')}`;
  selectionCategoryEl.textContent = fx.category;
  selectionDescriptionEl.textContent = fx.description;
  if (instant) {
    bgEl.classList.add('theme-instant');
    bgThemeLayers[activeThemeLayer].style.setProperty('--theme-left', fx.theme[0]);
    bgThemeLayers[activeThemeLayer].style.setProperty('--theme-right', fx.theme[1]);
    bgThemeLayers[activeThemeLayer].classList.add('active');
  } else {
    const nextLayer = activeThemeLayer === 0 ? 1 : 0;
    bgThemeLayers[nextLayer].style.setProperty('--theme-left', fx.theme[0]);
    bgThemeLayers[nextLayer].style.setProperty('--theme-right', fx.theme[1]);
    bgThemeLayers[nextLayer].classList.add('active');
    bgThemeLayers[activeThemeLayer].classList.remove('active');
    activeThemeLayer = nextLayer;
  }
  prevBtn.style.setProperty('--theme-left', fx.theme[0]);
  nextBtn.style.setProperty('--theme-right', fx.theme[1]);
  dotsEl.style.setProperty('--theme-left', fx.theme[0]);
  dotsEl.style.setProperty('--theme-right', fx.theme[1]);
  selectionIndexEl.style.color = `rgb(${fx.theme[0]})`;
  if (instant) requestAnimationFrame(() => bgEl.classList.remove('theme-instant'));
}

/* 將 active 卡片捲動置中 */
function centerActive(instant = false) {
  const card = cardEls[position];
  if (!card) return;
  if (instant) cardsEl.classList.add('no-transition');
  const target = card.offsetLeft + card.offsetWidth / 2 - viewportEl.clientWidth / 2;
  cardsEl.style.transform = `translateX(${-target}px)`;
  if (instant) {
    cardsEl.getBoundingClientRect();
    requestAnimationFrame(() => cardsEl.classList.remove('no-transition'));
  }
}

function startCarouselMotion(direction, instant) {
  clearTimeout(motionTimer);
  cardsEl.classList.remove('is-moving', 'moving-forward', 'moving-backward');
  if (instant || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  cardsEl.classList.add('is-moving', direction >= 0 ? 'moving-forward' : 'moving-backward');
  motionTimer = setTimeout(() => {
    cardsEl.classList.remove('is-moving', 'moving-forward', 'moving-backward');
  }, 460);
}

function setActive(i, silent, direct = false, instant = false) {
  const next = (i + EFFECTS.length) % EFFECTS.length;
  if (next !== active && !silent) sndMove();

  clearTimeout(snapTimer);
  const previousPosition = position;
  if (direct) {
    position = EFFECTS.length + next;
  } else if (active === EFFECTS.length - 1 && next === 0) {
    position += 1;
  } else if (active === 0 && next === EFFECTS.length - 1) {
    position -= 1;
  } else {
    position += next - active;
  }

  active = next;
  startCarouselMotion(position - previousPosition, instant);
  cardEls.forEach((el, idx) => el.classList.toggle('active', idx === position));
  dotEls.forEach((d, idx) => d.classList.toggle('on', idx === active));
  updateCardDepth();
  updateSelectionUI(instant);
  centerActive(instant);
  updatePreviewPlayback();

  // 滑過接續卡後，無動畫跳回中間那組完全相同的卡片。
  if (position < EFFECTS.length || position >= EFFECTS.length * 2) {
    const targetPosition = EFFECTS.length + active;
    ensurePreviewLoaded(iframes[targetPosition], targetPosition);
    snapTimer = setTimeout(() => {
      position = targetPosition;
      cardEls.forEach((el, idx) => el.classList.toggle('active', idx === position));
      updateCardDepth();
      centerActive(true);
      updatePreviewPlayback();
    }, 450);
  }
}

/* 進場轉場：卡片放大 + 其他元素淡出，再跳頁 */
let launching = false;
function launch(i) {
  const fx = EFFECTS[i];
  if (!fx.href || launching) return;
  launching = true;
  sndEnter();
  document.body.classList.add('leaving');
  cardEls[position].classList.add('launching');
  setTimeout(() => { window.location.href = fx.href; }, 380);
}

prevBtn.addEventListener('click', () => setActive(active - 1));
nextBtn.addEventListener('click', () => setActive(active + 1));
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') setActive(active - 1);
  else if (e.key === 'ArrowRight') setActive(active + 1);
  else if (e.key === 'Enter') launch(active);
  else if (e.key.toLowerCase() === 's') sndBtn.click();
});

/* 觸控滑動切換 */
let touchX = null;
window.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; }, { passive: true });
window.addEventListener('touchend', (e) => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) setActive(active + (dx < 0 ? 1 : -1));
  touchX = null;
}, { passive: true });

window.addEventListener('resize', centerActive);
mobilePreviewQuery.addEventListener('change', updatePreviewPlayback);
/* iframe 載入完成後再同步一次播放狀態（load 前 postMessage 會沒人聽） */
iframesReady();
function iframesReady() {
  window.addEventListener('load', () => { updatePreviewPlayback(); setTimeout(updatePreviewPlayback, 1500); });
}
/* 頁面不可見時全部暫停 */
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    iframes.forEach(f => { try { f && f.contentWindow.postMessage('vfx-pause', '*'); } catch (e) {} });
  } else updatePreviewPlayback();
});

buildCards();
active = 0;
position = EFFECTS.length;
cardEls[position].classList.add('active');
dotEls[0].classList.add('on');
updateCardDepth();
updateSelectionUI(true);
centerActive(true);
updatePreviewPlayback();
</script>
</body>
</html>

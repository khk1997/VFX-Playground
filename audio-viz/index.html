<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Visualizer VFX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: "SF Pro", "PingFang TC", "Microsoft JhengHei", sans-serif; }
  #stage { position: absolute; inset: 0; display: block; }

  /* ===== 控制面板：左側縱向抽屜 ===== */
  #panel {
    position: fixed; left: 12px; top: 64px; bottom: 12px; width: 340px;
    overflow-y: auto;
    background: rgba(10, 12, 18, 0.86); backdrop-filter: blur(10px);
    border: 1px solid rgba(80, 180, 255, 0.25); border-radius: 12px;
    color: #cfe0e8; padding: 14px 16px 18px; z-index: 10;
    box-shadow: 4px 0 30px rgba(0,0,0,0.6);
    transition: transform .25s ease, opacity .25s ease;
  }
  #panel.collapsed { transform: translateX(calc(-100% - 24px)); opacity: 0; pointer-events: none; }
  #panel::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-thumb { background: rgba(80,180,255,.3); border-radius: 3px; }

  #toggleBtn {
    position: fixed; top: 12px; right: 12px; z-index: 11;
    background: rgba(10,12,18,.85); color: #6cc8f3;
    border: 1px solid rgba(80,180,255,.35); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
  }
  #toggleBtn:hover { background: rgba(80,180,255,.15); }

  #homeBtn {
    position: fixed; top: 12px; left: 12px; z-index: 11;
    background: rgba(10,12,18,.85); color: #6cc8f3; text-decoration: none;
    border: 1px solid rgba(80,180,255,.35); border-radius: 8px;
    padding: 6px 12px; cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  #homeBtn:hover { background: rgba(80,180,255,.15); }

  /* ===== 獨立浮動的播放/暫停 ===== */
  #playCtl {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 11;
    background: rgba(10,12,18,.85); color: #8fdcff;
    border: 1px solid rgba(80,180,255,.35); border-radius: 999px;
    padding: 8px 20px; cursor: pointer; font-size: 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #playCtl:hover { background: rgba(80,180,255,.18); }

  /* ===== 開始播放遮罩（AudioContext 需要使用者手勢）===== */
  #startOverlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.55); backdrop-filter: blur(3px);
  }
  #startOverlay button {
    background: rgba(10,20,30,.9); color: #aee6ff;
    border: 1px solid rgba(80,180,255,.5); border-radius: 999px;
    padding: 18px 44px; font-size: 20px; cursor: pointer; font-family: inherit;
    box-shadow: 0 0 40px rgba(80,180,255,.35);
    letter-spacing: 2px;
  }
  #startOverlay button:hover { background: rgba(80,180,255,.2); box-shadow: 0 0 60px rgba(80,180,255,.55); }
  #startOverlay .hint { position: absolute; bottom: 22%; color: #7ba4b8; font-size: 12px; letter-spacing: 1px; }

  /* ===== Toast 訊息（例如麥克風被拒絕）===== */
  #toast {
    position: fixed; left: 50%; top: 60px; transform: translateX(-50%) translateY(-8px); z-index: 30;
    background: rgba(20,14,10,.92); color: #ffd0a0;
    border: 1px solid rgba(255,160,80,.4); border-radius: 8px;
    padding: 8px 18px; font-size: 13px; pointer-events: none;
    opacity: 0; transition: opacity .3s ease, transform .3s ease;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  html.preview-mode #homeBtn,
  html.preview-mode #toggleBtn,
  html.preview-mode #playCtl,
  html.preview-mode #startOverlay,
  html.preview-mode #toast,
  html.preview-mode #panel { display: none !important; }
  @media (max-width: 760px) {
    #panel { left: 8px; top: 56px; bottom: 8px; width: calc(100vw - 16px); max-width: 340px; }
  }

  #panel h2 { font-size: 14px; letter-spacing: 2px; color: #7bd0ff; margin-bottom: 4px; font-weight: 600; }
  #panel .sub { font-size: 11px; color: #6f838f; margin-bottom: 12px; }
  .groups { display: block; }
  .group { margin-bottom: 8px; border-top: 1px solid rgba(80,180,255,.12); padding-top: 6px; }
  .group h3 { font-size: 11px; color: #55a8d9; letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
  .group .note { font-size: 10px; color: #5f6f7e; margin: -4px 0 8px; line-height: 1.4; }
  .row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; min-width: 0; }
  .row label { flex: 0 0 78px; font-size: 12px; color: #b8c9d6; white-space: nowrap; }
  .row input[type=range] { flex: 1 1 110px; min-width: 60px; accent-color: #2e9de0; height: 14px; cursor: pointer; }
  .row .val { flex: 0 0 44px; text-align: right; font-size: 11px; color: #7bd0ff; font-variant-numeric: tabular-nums; }
  .row input[type=checkbox] { accent-color: #2e9de0; width: 15px; height: 15px; cursor: pointer; }
  .srcBtns { display: flex; gap: 6px; margin-bottom: 8px; }
  .srcBtns button {
    flex: 1; background: rgba(80,180,255,.08); color: #8fdcff;
    border: 1px solid rgba(80,180,255,.3); border-radius: 7px;
    padding: 6px 0; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .srcBtns button:hover { background: rgba(80,180,255,.2); }
  .srcBtns button.active { background: rgba(80,180,255,.3); color: #fff; border-color: rgba(140,210,255,.7); }
  .btns { display: flex; gap: 8px; margin-top: 12px; }
  .btns button {
    flex: 1; background: rgba(80,180,255,.1); color: #8fdcff;
    border: 1px solid rgba(80,180,255,.3); border-radius: 7px;
    padding: 7px 0; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .btns button:hover { background: rgba(80,180,255,.22); }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<a id="homeBtn" href="../index.html">← 首頁</a>

<div id="panel">
  <h2>AUDIO VISUALIZER</h2>
  <div class="sub">音訊視覺化特效 — 環形頻譜 + 節拍震波</div>

  <div class="groups">
  <div class="group">
    <h3>音源 Source</h3>
    <div class="srcBtns">
      <button id="srcSynth" class="active">內建合成</button>
      <button id="srcMic">麥克風</button>
      <button id="srcFile">音樂檔</button>
    </div>
    <div class="note">麥克風模式不外放（避免回授）；音樂檔會循環播放</div>
    <div class="row"><label>音量</label><input type="range" id="vol" min="0" max="1" step="0.01" value="0.7"><span class="val" id="vol_v"></span></div>
    <input type="file" id="fileInput" accept="audio/*" style="display:none">
  </div>

  <div class="group">
    <h3>頻譜 Spectrum</h3>
    <div class="row"><label>條數</label><input type="range" id="bars" min="16" max="180" step="2" value="96"><span class="val" id="bars_v"></span></div>
    <div class="row"><label>平滑</label><input type="range" id="smooth" min="0" max="0.95" step="0.01" value="0.72"><span class="val" id="smooth_v"></span></div>
    <div class="row"><label>半徑</label><input type="range" id="radius" min="0.08" max="0.4" step="0.005" value="0.2"><span class="val" id="radius_v"></span></div>
    <div class="row"><label>條長增益</label><input type="range" id="barGain" min="0.2" max="3" step="0.05" value="1.25"><span class="val" id="barGain_v"></span></div>
    <div class="row"><label>鏡像</label><input type="checkbox" id="mirror" checked><span class="val"></span></div>
  </div>

  <div class="group">
    <h3>節拍 Beat</h3>
    <div class="row"><label>靈敏度</label><input type="range" id="beatSens" min="1" max="2.5" step="0.02" value="1.35"><span class="val" id="beatSens_v"></span></div>
    <div class="row"><label>震波強度</label><input type="range" id="waveAmt" min="0" max="2" step="0.02" value="1"><span class="val" id="waveAmt_v"></span></div>
    <div class="row"><label>粒子爆發量</label><input type="range" id="burstAmt" min="0" max="80" step="1" value="28"><span class="val" id="burstAmt_v"></span></div>
  </div>

  <div class="group">
    <h3>色彩 Color</h3>
    <div class="row"><label>主色相</label><input type="range" id="hue" min="0" max="360" step="1" value="195"><span class="val" id="hue_v"></span></div>
    <div class="row"><label>依頻率漸層</label><input type="range" id="hueSpan" min="0" max="360" step="1" value="130"><span class="val" id="hueSpan_v"></span></div>
    <div class="row"><label>飽和度</label><input type="range" id="sat" min="0" max="100" step="1" value="92"><span class="val" id="sat_v"></span></div>
  </div>

  <div class="group">
    <h3>光感 Glow</h3>
    <div class="row"><label>光暈</label><input type="range" id="glow" min="0" max="2" step="0.02" value="0.9"><span class="val" id="glow_v"></span></div>
    <div class="row"><label>拖尾</label><input type="range" id="trail" min="0" max="0.95" step="0.01" value="0.4"><span class="val" id="trail_v"></span></div>
  </div>
  </div>

  <div class="btns">
    <button id="resetBtn">↺ 重設</button>
  </div>
</div>
<button id="toggleBtn">⚙ 面板</button>
<button id="playCtl">⏸ 暫停</button>

<div id="startOverlay">
  <button id="startBtn">▶ 點擊開始</button>
  <div class="hint">啟動內建合成音樂（瀏覽器需要使用者手勢才能播放音訊）</div>
</div>
<div id="toast"></div>

<script>
'use strict';

/* 預覽嵌入模式（?preview=1）：首頁卡片 iframe 用。隱藏 UI，且不啟動真實音訊
   （iframe 內沒有使用者手勢），改用程序化假頻譜驅動同一套視覺。 */
const PREVIEW = new URLSearchParams(location.search).has('preview');
if (PREVIEW) document.documentElement.classList.add('preview-mode');

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

/* ===== 參數 ===== */
const DEFAULTS = {
  vol: 0.7,
  bars: 96, smooth: 0.72, radius: 0.2, barGain: 1.25,
  beatSens: 1.35, waveAmt: 1, burstAmt: 28,
  hue: 195, hueSpan: 130, sat: 92,
  glow: 0.9, trail: 0.4,
};
const P = { ...DEFAULTS, mirror: true };

const fmt = {
  vol: v => Math.round(v * 100) + '%', hue: v => v + '°', hueSpan: v => v + '°', sat: v => v + '%',
  radius: v => v.toFixed(3), smooth: v => v.toFixed(2),
};
function bindControls() {
  for (const key of Object.keys(DEFAULTS)) {
    const el = document.getElementById(key);
    const valEl = document.getElementById(key + '_v');
    const update = () => {
      P[key] = parseFloat(el.value);
      if (valEl) valEl.textContent = (fmt[key] || (v => v.toFixed ? +v.toFixed(2) : v))(P[key]);
      onParamChange(key);
    };
    el.addEventListener('input', update);
    el.value = P[key];
    update();
  }
}
document.getElementById('mirror').addEventListener('change', e => { P.mirror = e.target.checked; });
function onParamChange(key) {
  if (key === 'vol' && inputGain && actx) inputGain.gain.setTargetAtTime(P.vol, actx.currentTime, 0.03);
}
// 注意：bindControls() 在音訊狀態變數宣告之後才呼叫（見下方），
// 因為 onParamChange 會讀取 inputGain / actx（let 宣告有暫時性死區）。

document.getElementById('resetBtn').addEventListener('click', () => {
  Object.assign(P, DEFAULTS);
  document.getElementById('mirror').checked = P.mirror = true;
  bindControls();
});

/* ===== Toast ===== */
const toastEl = document.getElementById('toast');
let toastTimer = 0;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3200);
}

/* =====================================================================
   音訊引擎：AudioContext 需要使用者手勢，因此全部延遲到第一次點擊才建立。
   路由：各音源 → inputGain(音量) → analyser → outGain → destination
   麥克風模式把 outGain 靜音（避免喇叭回授），但 analyser 依然收得到訊號。
   ===================================================================== */
let actx = null, analyser = null, inputGain = null, outGain = null;
let sourceMode = 'synth'; // synth | mic | file
let micStream = null, micNode = null;
let fileNode = null, fileBuffer = null;
const FFT_SIZE = 2048;
let freqData = new Uint8Array(FFT_SIZE / 2);
let timeData = new Uint8Array(FFT_SIZE);

bindControls(); // 此時 inputGain / actx 已完成宣告，onParamChange 可以安全讀取

function ensureAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  inputGain = actx.createGain(); inputGain.gain.value = P.vol;
  analyser = actx.createAnalyser();
  analyser.fftSize = FFT_SIZE;
  analyser.smoothingTimeConstant = 0.55; // 基礎平滑；視覺層還有自己的平滑滑桿
  outGain = actx.createGain(); outGain.gain.value = 1;
  inputGain.connect(analyser);
  analyser.connect(outGain);
  outGain.connect(actx.destination);
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
}

/* ---- (a) 內建合成：程序化生成循環音樂 ----
   前瞻排程器（lookahead scheduler）：setInterval 每 30ms 把接下來 0.12s 內
   該發生的 16 分音符事件排進 WebAudio 時間軸 → 節奏精準不受主執行緒卡頓影響。 */
let synth = null;
function makeNoiseBuffer(ac) {
  const len = Math.floor(ac.sampleRate * 0.2);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
const PENTA = [0, 3, 5, 7, 10, 12, 15]; // 小調五聲音階（半音數）
function startSynth() {
  if (synth) return;
  const bus = actx.createGain(); bus.gain.value = 0.9;
  bus.connect(inputGain);
  const noiseBuf = makeNoiseBuffer(actx);
  const bpm = 112, spb = 60 / bpm, step16 = spb / 4;
  const s = synth = {
    bus, noiseBuf, step: 0, nextTime: actx.currentTime + 0.06,
    timer: setInterval(schedule, 30),
  };
  function playKick(t) {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(45, t + 0.12);
    g.gain.setValueAtTime(0.9, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    o.connect(g); g.connect(bus);
    o.start(t); o.stop(t + 0.25);
  }
  function playBass(t, semi, dur) {
    const o = actx.createOscillator(), g = actx.createGain(), f = actx.createBiquadFilter();
    o.type = 'sawtooth';
    o.frequency.value = 55 * Math.pow(2, semi / 12);
    f.type = 'lowpass'; f.frequency.setValueAtTime(600, t);
    f.frequency.exponentialRampToValueAtTime(120, t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.32, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(f); f.connect(g); g.connect(bus);
    o.start(t); o.stop(t + dur + 0.05);
  }
  function playArp(t, semi) {
    const o = actx.createOscillator(), g = actx.createGain(), f = actx.createBiquadFilter();
    o.type = 'square';
    o.frequency.value = 440 * Math.pow(2, semi / 12);
    f.type = 'lowpass'; f.frequency.value = 2600;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.11, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.24);
    o.connect(f); f.connect(g); g.connect(bus);
    o.start(t); o.stop(t + 0.3);
    // 一點延遲感的回聲
    const g2 = actx.createGain(); g2.gain.value = 0.35;
    g.connect(g2); // 疊一次八度上方的殘響感（簡化：直接衰減複製）
    g2.connect(bus);
  }
  function playHat(t, open) {
    const src = actx.createBufferSource(), g = actx.createGain(), f = actx.createBiquadFilter();
    src.buffer = noiseBuf;
    f.type = 'highpass'; f.frequency.value = 7000;
    const dur = open ? 0.14 : 0.05;
    g.gain.setValueAtTime(open ? 0.22 : 0.16, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(f); f.connect(g); g.connect(bus);
    src.start(t); src.stop(t + dur + 0.02);
  }
  // 以 mulberry 類似的簡單 hash 讓琶音有變化但可預期
  function pick(step, salt) {
    let x = (step * 2654435761 + salt * 40503) >>> 0;
    x ^= x >> 13; x = (x * 1274126177) >>> 0;
    return (x >>> 8) / 16777216;
  }
  function schedule() {
    while (s.nextTime < actx.currentTime + 0.12) {
      const t = s.nextTime, i = s.step;
      const in16 = i % 16, bar = Math.floor(i / 16) % 8;
      // 大鼓：每拍；第 4 小節尾加一個切分
      if (in16 % 4 === 0 || (bar % 4 === 3 && in16 === 14)) playKick(t);
      // 貝斯：根音進行 0 → -2 → 3 → -4，兩拍一音
      if (in16 % 8 === 0) {
        const prog = [0, -2, 3, -4][Math.floor(i / 32) % 4];
        playBass(t, prog, spb * 1.6);
      }
      // 琶音：8 分音符為主，偶爾 16 分裝飾
      if (in16 % 2 === 0 || pick(i, 7) < 0.18) {
        const r = pick(i, 3);
        const idx = Math.floor(r * PENTA.length);
        const oct = pick(i, 11) < 0.3 ? 12 : 0;
        if (pick(i, 5) < 0.82) playArp(t, PENTA[idx] + oct - 12);
      }
      // Hi-hat：反拍，偶爾開鈸
      if (in16 % 4 === 2) playHat(t, pick(i, 13) < 0.2);
      else if (pick(i, 17) < 0.25) playHat(t, false);
      s.step++;
      s.nextTime += step16;
    }
  }
}
function stopSynth() {
  if (!synth) return;
  clearInterval(synth.timer);
  try { synth.bus.disconnect(); } catch (e) {}
  synth = null;
}

/* ---- (b) 麥克風 ---- */
async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micNode = actx.createMediaStreamSource(micStream);
    micNode.connect(inputGain);
    outGain.gain.setTargetAtTime(0, actx.currentTime, 0.02); // 靜音輸出避免回授
    return true;
  } catch (err) {
    toast('無法取得麥克風權限，已改回內建合成');
    return false;
  }
}
function stopMic() {
  if (micNode) { try { micNode.disconnect(); } catch (e) {} micNode = null; }
  if (micStream) { micStream.getTracks().forEach(tr => tr.stop()); micStream = null; }
  if (outGain) outGain.gain.setTargetAtTime(1, actx.currentTime, 0.02);
}

/* ---- (c) 音樂檔 ---- */
function stopFile() {
  if (fileNode) { try { fileNode.stop(); fileNode.disconnect(); } catch (e) {} fileNode = null; }
}
function playFileBuffer() {
  stopFile();
  fileNode = actx.createBufferSource();
  fileNode.buffer = fileBuffer;
  fileNode.loop = true;
  fileNode.connect(inputGain);
  fileNode.start();
}
document.getElementById('fileInput').addEventListener('change', async e => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  try {
    const ab = await file.arrayBuffer();
    fileBuffer = await actx.decodeAudioData(ab);
    stopAllSources();
    setSourceMode('file');
    playFileBuffer();
    toast('已載入：' + file.name);
  } catch (err) {
    toast('音訊檔解碼失敗，請換一個檔案');
  }
  e.target.value = '';
});

function stopAllSources() {
  stopSynth(); stopMic(); stopFile();
}
function setSourceMode(mode) {
  sourceMode = mode;
  for (const [id, m] of [['srcSynth', 'synth'], ['srcMic', 'mic'], ['srcFile', 'file']]) {
    document.getElementById(id).classList.toggle('active', m === mode);
  }
}
document.getElementById('srcSynth').addEventListener('click', () => {
  if (!audioStarted) return startAll();
  stopAllSources(); setSourceMode('synth'); startSynth();
});
document.getElementById('srcMic').addEventListener('click', async () => {
  if (!audioStarted) await startAll();
  stopAllSources();
  setSourceMode('mic');
  const ok = await startMic();
  if (!ok) { setSourceMode('synth'); startSynth(); }
});
document.getElementById('srcFile').addEventListener('click', async () => {
  if (!audioStarted) await startAll();
  document.getElementById('fileInput').click();
});

/* ---- 啟動（需要手勢）---- */
let audioStarted = false;
async function startAll() {
  if (audioStarted) return;
  ensureAudio();
  await actx.resume();
  audioStarted = true;
  startSynth();
  document.getElementById('startOverlay').style.display = 'none';
}
document.getElementById('startBtn').addEventListener('click', startAll);
if (PREVIEW) document.getElementById('startOverlay').style.display = 'none';

/* =====================================================================
   假分析器（preview 模式）：正弦疊加 + 噪聲 + 週期性假節拍，
   驅動與真實 analyser 完全相同的 freqData / timeData 介面。
   ===================================================================== */
const FAKE_BPS = 1.85; // 假節拍頻率（拍/秒）
function fakeAnalyse(t) {
  const N = freqData.length;
  const beatPhase = (t * FAKE_BPS) % 1;
  const pump = Math.pow(Math.max(0, 1 - beatPhase * 3.2), 2); // 每拍瞬間衝高再快速衰減
  const sway = Math.sin(t * 0.31) * 0.5 + 0.5;
  for (let i = 0; i < N; i++) {
    const f = i / N;
    let v = 0;
    v += pump * 235 * Math.exp(-f * 26);                                  // 低頻節拍能量
    v += (Math.sin(t * 1.7 + f * 34) * 0.5 + 0.5) * 110 * Math.exp(-f * 4);   // 中頻起伏
    v += (Math.sin(t * 2.6 + f * 90 + Math.sin(t * 0.7) * 5) * 0.5 + 0.5) * 70 * Math.exp(-f * 2.2);
    v += (Math.sin(t * 5.3 + i * 0.9) * 0.5 + 0.5) * (18 + 26 * sway);    // 高頻閃爍
    v += Math.random() * 14;
    freqData[i] = Math.max(0, Math.min(255, v));
  }
  const M = timeData.length;
  for (let i = 0; i < M; i++) {
    const x = i / M;
    const w = Math.sin(x * 22 + t * 6) * (0.25 + pump * 0.5) +
              Math.sin(x * 53 - t * 9.5) * 0.14 +
              Math.sin(x * 7 + t * 2.2) * 0.2;
    timeData[i] = 128 + w * 100;
  }
}

/* =====================================================================
   視覺狀態
   ===================================================================== */
let barVals = [];            // 視覺層自己的平滑條值（0..1）
let bassEnv = 0, trebEnv = 0;
const bassHist = [];         // 節拍偵測用的低頻能量滾動視窗
let beatCooldown = 0, beatFlash = 0;
const shockwaves = [];       // {r, alpha, speed, width, hue}
const burstParts = [];       // {x,y,vx,vy,life,maxLife,size,hue}
const floaters = Array.from({ length: 70 }, () => ({
  x: Math.random(), y: Math.random(),
  size: 0.6 + Math.random() * 2.2,
  drift: (Math.random() - 0.5) * 12,
  speed: 0.4 + Math.random() * 0.9,
  tw: Math.random() * Math.PI * 2,
}));

function sampleBar(i, N) {
  // 對數取樣：低頻分得細、高頻壓縮，只用前 ~72% 的頻譜（更高頻多半是空的）
  const usable = Math.floor(freqData.length * 0.72);
  const t0 = Math.pow(i / N, 1.6) * usable;
  const t1 = Math.pow((i + 1) / N, 1.6) * usable;
  const a = Math.floor(t0), b = Math.max(a + 1, Math.ceil(t1));
  let sum = 0;
  for (let k = a; k < b && k < usable; k++) sum += freqData[k];
  return sum / ((b - a) * 255);
}

function detectBeat(dt) {
  // 低頻能量（前 ~90Hz-180Hz 區段的 bin）
  let e = 0; const nb = 10;
  for (let i = 1; i <= nb; i++) e += freqData[i];
  e /= nb * 255;
  bassEnv += (e - bassEnv) * Math.min(1, dt * 12);
  bassHist.push(e);
  if (bassHist.length > 50) bassHist.shift();
  let avg = 0;
  for (const v of bassHist) avg += v;
  avg /= bassHist.length || 1;
  beatCooldown -= dt;
  beatFlash = Math.max(0, beatFlash - dt * 4);
  if (bassHist.length > 20 && beatCooldown <= 0 && e > 0.16 && e > avg * P.beatSens) {
    beatCooldown = 0.22;
    beatFlash = 1;
    onBeat(e);
  }
  // 高頻能量
  let te = 0; const from = Math.floor(freqData.length * 0.12), to = Math.floor(freqData.length * 0.55);
  for (let i = from; i < to; i++) te += freqData[i];
  te /= (to - from) * 255;
  trebEnv += (te - trebEnv) * Math.min(1, dt * 8);
}

function onBeat(strength) {
  const cx = W / 2, cy = H / 2;
  const R = P.radius * Math.min(W, H);
  if (P.waveAmt > 0.01) {
    shockwaves.push({
      r: R * 1.05, alpha: 0.85 * Math.min(1.5, strength * 2) * Math.min(1, P.waveAmt),
      speed: (260 + strength * 500) * (0.5 + P.waveAmt * 0.5),
      width: 2 + strength * 8 + P.waveAmt * 3,
      hue: P.hue,
    });
  }
  const n = Math.round(P.burstAmt * (0.6 + strength));
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (60 + Math.random() * 260) * (0.6 + strength);
    burstParts.push({
      x: cx + Math.cos(a) * R, y: cy + Math.sin(a) * R,
      vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0, maxLife: 0.5 + Math.random() * 0.9,
      size: 1 + Math.random() * 2.6,
      hue: P.hue + (Math.random() - 0.5) * P.hueSpan * 0.6,
    });
  }
  if (burstParts.length > 900) burstParts.splice(0, burstParts.length - 900);
}

/* =====================================================================
   渲染
   ===================================================================== */
function render(dt, t) {
  const cx = W / 2, cy = H / 2;
  const minDim = Math.min(W, H);
  const R = P.radius * minDim;

  // 取得頻譜資料
  if (PREVIEW || !audioStarted) fakeAnalyse(t);
  else { analyser.getByteFrequencyData(freqData); analyser.getByteTimeDomainData(timeData); }

  detectBeat(dt);

  // 拖尾：半透明黑覆蓋
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgba(0,0,0,${1 - P.trail * 0.92})`;
  ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'lighter';

  const N = Math.round(P.bars);
  if (barVals.length !== N) barVals = new Array(N).fill(0);
  const k = 1 - Math.pow(P.smooth, dt * 60); // 幀率無關的平滑係數
  for (let i = 0; i < N; i++) {
    const v = sampleBar(i, N);
    barVals[i] += (v - barVals[i]) * Math.max(0.02, k);
  }

  /* --- 背景漂浮粒子：高頻能量越強升得越快 --- */
  const rise = 12 + trebEnv * 320;
  for (const p of floaters) {
    p.y -= (rise * p.speed * dt) / H;
    p.x += (p.drift * dt) / W;
    if (p.y < -0.02) { p.y = 1.02; p.x = Math.random(); }
    if (p.x < 0) p.x += 1; else if (p.x > 1) p.x -= 1;
    const tw = 0.4 + 0.6 * (Math.sin(t * 2 + p.tw) * 0.5 + 0.5);
    ctx.fillStyle = `hsla(${P.hue + 20},${P.sat}%,70%,${0.12 + trebEnv * 0.4 * tw})`;
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.size * (0.8 + trebEnv * 1.2), 0, Math.PI * 2);
    ctx.fill();
  }

  /* --- 中心圓：隨低頻能量脈動 --- */
  const pulse = R * (0.55 + bassEnv * 0.32 + beatFlash * 0.08);
  const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse * 1.9);
  const coreA = 0.25 + bassEnv * 0.55 + beatFlash * 0.3;
  cg.addColorStop(0, `hsla(${P.hue},${P.sat}%,${70 + beatFlash * 25}%,${Math.min(1, coreA)})`);
  cg.addColorStop(0.45, `hsla(${P.hue},${P.sat}%,50%,${coreA * 0.35})`);
  cg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = cg;
  ctx.beginPath();
  ctx.arc(cx, cy, pulse * 1.9, 0, Math.PI * 2);
  ctx.fill();
  // 內圈細環
  ctx.strokeStyle = `hsla(${P.hue},${P.sat}%,75%,${0.5 + beatFlash * 0.5})`;
  ctx.lineWidth = 1.5 + bassEnv * 3;
  ctx.beginPath();
  ctx.arc(cx, cy, pulse, 0, Math.PI * 2);
  ctx.stroke();

  /* --- 環形頻譜條 --- */
  const maxLen = minDim * 0.30 * P.barGain;
  const slowRot = t * 0.05; // 整體緩慢旋轉
  const drawBar = (ang, v, hue) => {
    const len = 2 + v * v * maxLen + v * beatFlash * 12;
    const x0 = cx + Math.cos(ang) * R, y0 = cy + Math.sin(ang) * R;
    const x1 = cx + Math.cos(ang) * (R + len), y1 = cy + Math.sin(ang) * (R + len);
    const light = 52 + v * 28;
    if (P.glow > 0.02) {
      ctx.strokeStyle = `hsla(${hue},${P.sat}%,${light}%,${0.10 * P.glow * (0.3 + v)})`;
      ctx.lineWidth = 7 + P.glow * 6;
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    }
    ctx.strokeStyle = `hsla(${hue},${P.sat}%,${light}%,${0.45 + v * 0.55})`;
    ctx.lineWidth = Math.max(1.2, (Math.PI * R / (P.mirror ? N * 2 : N)) * 0.55);
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    // 尖端亮點
    if (v > 0.35) {
      ctx.fillStyle = `hsla(${hue},${P.sat}%,85%,${(v - 0.35) * 1.2})`;
      ctx.beginPath(); ctx.arc(x1, y1, 1.6 + v * 1.6, 0, Math.PI * 2); ctx.fill();
    }
  };
  ctx.lineCap = 'round';
  if (P.mirror) {
    // 鏡像：頻譜從頂端沿兩側往下對稱展開
    for (let i = 0; i < N; i++) {
      const v = barVals[i];
      const hue = P.hue + (i / N) * P.hueSpan;
      const frac = i / N;
      drawBar(-Math.PI / 2 + frac * Math.PI + slowRot, v, hue);
      drawBar(-Math.PI / 2 - frac * Math.PI + slowRot, v, hue);
    }
  } else {
    for (let i = 0; i < N; i++) {
      drawBar(-Math.PI / 2 + (i / N) * Math.PI * 2 + slowRot, barVals[i], P.hue + (i / N) * P.hueSpan);
    }
  }

  /* --- 節拍震波環 --- */
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    const s = shockwaves[i];
    s.r += s.speed * dt;
    s.alpha -= dt * 1.4;
    if (s.alpha <= 0 || s.r > minDim) { shockwaves.splice(i, 1); continue; }
    ctx.strokeStyle = `hsla(${s.hue},${P.sat}%,70%,${Math.max(0, s.alpha)})`;
    ctx.lineWidth = s.width * Math.max(0.25, s.alpha);
    ctx.beginPath();
    ctx.arc(cx, cy, s.r, 0, Math.PI * 2);
    ctx.stroke();
    if (P.glow > 0.02) {
      ctx.strokeStyle = `hsla(${s.hue},${P.sat}%,60%,${Math.max(0, s.alpha) * 0.25 * P.glow})`;
      ctx.lineWidth = s.width * 3;
      ctx.beginPath(); ctx.arc(cx, cy, s.r, 0, Math.PI * 2); ctx.stroke();
    }
  }

  /* --- 節拍爆發粒子 --- */
  for (let i = burstParts.length - 1; i >= 0; i--) {
    const p = burstParts[i];
    p.life += dt;
    if (p.life >= p.maxLife) { burstParts.splice(i, 1); continue; }
    p.vx *= Math.pow(0.4, dt); p.vy *= Math.pow(0.4, dt);
    p.x += p.vx * dt; p.y += p.vy * dt;
    const lifeT = 1 - p.life / p.maxLife;
    ctx.fillStyle = `hsla(${p.hue},${P.sat}%,${60 + lifeT * 25}%,${lifeT * 0.9})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (0.4 + lifeT * 0.8), 0, Math.PI * 2);
    ctx.fill();
  }

  /* --- 波形絲帶：沿底部流動 --- */
  const wy = H - Math.min(120, H * 0.16);
  const amp = Math.min(70, H * 0.09) * (0.5 + bassEnv * 1.2);
  const M = timeData.length;
  const stepX = Math.max(2, W / 240);
  ctx.save();
  if (P.glow > 0.02) {
    ctx.shadowBlur = 14 * P.glow;
    ctx.shadowColor = `hsla(${P.hue + P.hueSpan * 0.5},${P.sat}%,60%,0.9)`;
  }
  const wg = ctx.createLinearGradient(0, 0, W, 0);
  wg.addColorStop(0, `hsla(${P.hue},${P.sat}%,60%,0)`);
  wg.addColorStop(0.15, `hsla(${P.hue},${P.sat}%,62%,0.75)`);
  wg.addColorStop(0.85, `hsla(${P.hue + P.hueSpan},${P.sat}%,62%,0.75)`);
  wg.addColorStop(1, `hsla(${P.hue + P.hueSpan},${P.sat}%,60%,0)`);
  ctx.strokeStyle = wg;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = 0; x <= W; x += stepX) {
    const idx = Math.floor((x / W) * (M - 1));
    const v = (timeData[idx] - 128) / 128;
    const y = wy + v * amp;
    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.restore();
}

/* =====================================================================
   主迴圈：時間驅動、dt 上限 50ms。
   暫停來源三個：使用者按鈕 / 首頁 postMessage(vfx-pause) / 分頁隱藏。
   任一成立就真正停掉 rAF；恢復時重啟。
   ===================================================================== */
let userPaused = false, msgPaused = false;
let rafId = 0, running = false;
let last = performance.now(), simT = 0;

function effectivePaused() { return userPaused || msgPaused || document.hidden; }

function frame(now) {
  rafId = requestAnimationFrame(frame);
  const dt = Math.min((now - last) / 1000, 0.05); // dt 上限 50ms
  last = now;
  simT += dt;
  render(dt, simT);
}
function startLoop() {
  if (running) return;
  running = true;
  last = performance.now();
  rafId = requestAnimationFrame(frame);
}
function stopLoop() {
  if (!running) return;
  running = false;
  cancelAnimationFrame(rafId);
}
function syncLoopState() {
  if (effectivePaused()) {
    stopLoop();
    if (actx && actx.state === 'running') actx.suspend();
  } else {
    startLoop();
    if (actx && audioStarted && actx.state === 'suspended') actx.resume();
  }
}

const pauseBtn = document.getElementById('playCtl');
pauseBtn.addEventListener('click', () => {
  userPaused = !userPaused;
  pauseBtn.textContent = userPaused ? '▶ 播放' : '⏸ 暫停';
  syncLoopState();
});
window.addEventListener('message', e => {
  if (e.data === 'vfx-pause') { msgPaused = true; syncLoopState(); }
  else if (e.data === 'vfx-play') { msgPaused = false; syncLoopState(); }
});
document.addEventListener('visibilitychange', syncLoopState);

const panel = document.getElementById('panel');
document.getElementById('toggleBtn').addEventListener('click', () => {
  panel.classList.toggle('collapsed');
});

startLoop();
</script>
</body>
